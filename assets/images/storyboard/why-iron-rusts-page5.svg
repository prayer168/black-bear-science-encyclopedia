    <rect x="150" y="140" width="14" height="8" fill="#9aa4ad"/>
    <text x="157" y="230" text-anchor="middle" font-size="11" fill="#5aa469">A ✔不鏽</text>
    <rect x="215" y="100" width="34" height="110" rx="16" fill="#bfe0f7" stroke="#2f7fc1" stroke-width="2"/>
    <rect x="215" y="135" width="34" height="75" fill="#a9d3ef"/><rect x="222" y="150" width="14" height="8" fill="#9aa4ad"/>
