  <image href="../characters/drop.svg" x="400" y="150" width="80" height="80"/>
  <rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
  <text x="16" y="298" font-size="14" fill="#fff">📖 第6頁：用實驗，找出哪種表面摩擦力最大。</text>
  <text x="16" y="314" font-size="12" fill="#f4d9a8">🦊「砂紙上要用最大的力！」💧「其他條件都要一樣才公平！」</text>
