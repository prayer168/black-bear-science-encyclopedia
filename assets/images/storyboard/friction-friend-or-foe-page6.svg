  <g stroke="#8a5a30" stroke-width="2"><line x1="110" y1="200" x2="106" y2="192"/><line x1="150" y1="200" x2="146" y2="192"/><line x1="210" y1="200" x2="206" y2="192"/><line x1="270" y1="200" x2="266" y2="192"/></g>
  <rect x="150" y="165" width="70" height="35" rx="4" fill="#e8a94a" stroke="#c98a3a" stroke-width="2"/>
  <!-- spring scale -->
  <rect x="230" y="175" width="46" height="16" rx="4" fill="#cfe4f5" stroke="#2f7fc1" stroke-width="2"/>
  <line x1="220" y1="183" x2="230" y2="183" stroke="#6b4f3a" stroke-width="3"/>
  <defs><marker id="p6" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2f7fc1"/></marker></defs>
