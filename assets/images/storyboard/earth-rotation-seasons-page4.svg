<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
<rect width="520" height="320" fill="#f3eee4"/>
<rect x="0" y="0" width="520" height="278" fill="#faf6ec" opacity="0.6"/>
<ellipse cx="260" cy="252" rx="230" ry="22" fill="#00000010"/>
<line x1="290" y1="60" x2="290" y2="250" stroke="#d9cdb5" stroke-width="2" stroke-dasharray="5 4"/>
<!-- direct summer -->
<text x="210" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#d0451b">夏·直射</text>
<circle cx="210" cy="100" r="14" fill="#ffd24a"/>
<g stroke="#f2b30a" stroke-width="2.5"><line x1="200" y1="114" x2="200" y2="200"/><line x1="210" y1="114" x2="210" y2="200"/><line x1="220" y1="114" x2="220" y2="200"/></g>
<rect x="165" y="200" width="90" height="18" fill="#c9a06a"/>
<ellipse cx="210" cy="200" rx="14" ry="4" fill="#ffec99"/>
<text x="210" y="240" text-anchor="middle" font-size="11" fill="#666">集中→熱</text>
<!-- oblique winter -->
<text x="380" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#2a6ab0">冬·斜射</text>
<circle cx="330" cy="100" r="14" fill="#ffd24a"/>
<g stroke="#f2b30a" stroke-width="2.5"><line x1="340" y1="112" x2="420" y2="200"/><line x1="352" y1="108" x2="435" y2="200"/><line x1="364" y1="104" x2="450" y2="200"/></g>
<rect x="330" y="200" width="150" height="18" fill="#c9a06a"/>
<ellipse cx="435" cy="200" rx="30" ry="4" fill="#fff4cc" opacity="0.7"/>
<text x="415" y="240" text-anchor="middle" font-size="11" fill="#666">分散→冷</text>
<!-- bear -->
<g transform="translate(40,150)"><image xlink:href="../characters/bear.svg" href="../characters/bear.svg" x="0" y="0" width="90" height="90"/></g>
<circle cx="40" cy="40" r="22" fill="#6b4f3a"/><text x="40" y="47" text-anchor="middle" font-size="19" fill="#fff" font-weight="bold">4</text>
<rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
<text x="14" y="297" font-size="13" fill="#fff">📖 第4頁：朝向太陽直射就熱，偏離斜射就冷。</text>
<text x="14" y="314" font-size="12" fill="#f4d9a8">🐻：「直射又集中又熱！」</text>
</svg>
