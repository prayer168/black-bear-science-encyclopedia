<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="520" height="320" fill="#fffdf9"/>
  <!-- battery -->
  <rect x="120" y="180" width="70" height="34" rx="4" fill="#f4b400" stroke="#c98f00" stroke-width="2"/>
  <text x="155" y="202" text-anchor="middle" font-size="11" fill="#6b4f3a">電池</text>
  <!-- single wire to dim bulb, other end loose -->
  <path d="M190 190 q60 -30 100 -30" stroke="#c0392b" stroke-width="4" fill="none"/>
  <circle cx="300" cy="155" r="22" fill="#e6e0cf" stroke="#b8a878" stroke-width="3"/>
  <text x="300" y="195" text-anchor="middle" font-size="11" fill="#8a795c">暗（不亮）</text>
  <!-- loose wire end -->
  <path d="M322 160 q40 10 55 40" stroke="#c0392b" stroke-width="4" fill="none"/>
  <circle cx="378" cy="202" r="5" fill="#c0392b"/>
  <text x="400" y="205" font-size="11" fill="#b5462a">線的另一頭空著</text>
  <!-- fox -->
  <image href="../characters/fox.svg" x="30" y="100" width="76" height="76"/>
  <rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
  <text x="16" y="298" font-size="14" fill="#fff">📖 第1頁：小狐同學等了又等，燈泡就是不亮。</text>
  <text x="16" y="314" font-size="12" fill="#f4d9a8">🦊「電池有電，怎麼不亮？」（電路明顯不完整、燈泡暗）</text>
</svg>
