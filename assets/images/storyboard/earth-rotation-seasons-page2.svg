<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
<rect width="520" height="320" fill="#1a2647"/>
<rect x="0" y="0" width="520" height="278" fill="#101a38" opacity="0.5"/>
<ellipse cx="260" cy="255" rx="230" ry="20" fill="#00000030"/>
<!-- sun small left -->
<circle cx="150" cy="120" r="26" fill="#ffd24a"/>
<g stroke="#ffd24a" stroke-width="2" opacity="0.6"><line x1="176" y1="120" x2="300" y2="140"/><line x1="176" y1="135" x2="300" y2="175"/></g>
<!-- globe day/night -->
<g transform="translate(360,160)">
  <clipPath id="lit2"><rect x="-70" y="-70" width="70" height="140"/></clipPath>
  <circle r="62" fill="#1b3a6b"/>
  <circle r="62" fill="#4a90d9" clip-path="url(#lit2)"/>
  <line x1="8" y1="-72" x2="-8" y2="72" stroke="#fff" stroke-width="2" stroke-dasharray="4 3"/>
  <circle cx="-44" cy="-8" r="4" fill="#ff5a5a"/>
  <path d="M0 -76 a76 76 0 0 1 26 8" fill="none" stroke="#ffe08a" stroke-width="2.5" marker-end="url(#r)"/>
</g>
<defs><marker id="r" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0 0 L6 4 L0 8 z" fill="#ffe08a"/></marker></defs>
<text x="360" y="240" text-anchor="middle" font-size="11" fill="#9fb8e0">一半白天·一半黑夜</text>
<!-- bear -->
<g transform="translate(45,150)"><image xlink:href="../characters/bear.svg" href="../characters/bear.svg" x="0" y="0" width="92" height="92"/></g>
<circle cx="40" cy="40" r="22" fill="#6b4f3a"/><text x="40" y="47" text-anchor="middle" font-size="19" fill="#fff" font-weight="bold">2</text>
<rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
<text x="14" y="297" font-size="13" fill="#fff">📖 第2頁：地球自轉，白天黑夜輪流。</text>
<text x="14" y="314" font-size="12" fill="#f4d9a8">🐻：「朝太陽是白天，背對是黑夜。」</text>
