<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
<rect width="520" height="320" fill="#1a2647"/>
<rect x="0" y="0" width="520" height="278" fill="#101a38" opacity="0.5"/>
<ellipse cx="260" cy="255" rx="230" ry="20" fill="#00000030"/>
<!-- sun center-right -->
<circle cx="330" cy="150" r="30" fill="#ffd24a"/>
<text x="330" y="155" text-anchor="middle" font-size="11" fill="#7a5a10">太陽</text>
<ellipse cx="330" cy="150" rx="130" ry="80" fill="none" stroke="#3a4a75" stroke-width="2" stroke-dasharray="5 5"/>
<!-- tilted earth orbiting -->
<g transform="translate(200,150)"><circle r="22" fill="#4a90d9"/><line x1="8" y1="-26" x2="-8" y2="26" stroke="#fff" stroke-width="2"/></g>
<g transform="translate(460,150)"><circle r="22" fill="#4a90d9"/><line x1="8" y1="-26" x2="-8" y2="26" stroke="#fff" stroke-width="2"/></g>
<path d="M330 55 a30 30 0 0 1 20 8" fill="none" stroke="#ffe08a" stroke-width="2.5" marker-end="url(#r)"/>
<text x="330" y="245" text-anchor="middle" font-size="11" fill="#9fb8e0">繞太陽一圈＝一年</text>
<defs><marker id="r" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0 0 L6 4 L0 8 z" fill="#ffe08a"/></marker></defs>
<!-- beetle -->
<g transform="translate(40,150)"><image xlink:href="../characters/beetle.svg" href="../characters/beetle.svg" x="0" y="0" width="90" height="90"/></g>
<circle cx="40" cy="40" r="22" fill="#6b4f3a"/><text x="40" y="47" text-anchor="middle" font-size="19" fill="#fff" font-weight="bold">3</text>
<rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
<text x="14" y="297" font-size="13" fill="#fff">📖 第3頁：地球歪著身子繞太陽一年一圈。</text>
<text x="14" y="314" font-size="12" fill="#f4d9a8">🪲：「傾斜約 23.5 度，是四季關鍵！」</text>
</svg>
