<text x="14" y="297" font-size="13" fill="#fff">📖 第6頁：省力不省距離，越緩才越省力。</text>
<text x="14" y="314" font-size="12" fill="#f4d9a8">👾「越陡越好！」🐻「越陡越費力喔！」</text>
