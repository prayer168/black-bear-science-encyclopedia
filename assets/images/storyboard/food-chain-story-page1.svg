<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="520" height="320" fill="#eef8ee"/>
  <!-- homework paper with WRONG (reversed) arrows -->
  <rect x="130" y="55" width="260" height="150" rx="8" fill="#fff" stroke="#c0392b" stroke-width="3"/>
  <text x="260" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#6b4f3a">我的食物鏈作業</text>
  <!-- reversed chain: arrows point from predator to prey (wrong) -->
  <text x="160" y="120" font-size="18">🌱</text><text x="215" y="120" font-size="18">🦗</text><text x="270" y="120" font-size="18">🐸</text><text x="325" y="120" font-size="18">🐍</text>
  <defs><marker id="w" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#c0392b"/></marker></defs>
  <g stroke="#c0392b" stroke-width="2.5">
    <line x1="210" y1="115" x2="182" y2="115" marker-end="url(#w)"/>
    <line x1="265" y1="115" x2="237" y2="115" marker-end="url(#w)"/>
    <line x1="320" y1="115" x2="292" y2="115" marker-end="url(#w)"/>
  </g>
  <text x="260" y="160" text-anchor="middle" font-size="12" fill="#c0392b">「箭頭＝我要吃你」（畫反了！）</text>
  <!-- fox proud -->
  <image href="../characters/fox.svg" x="400" y="120" width="82" height="82"/>
  <text x="441" y="115" font-size="16">😎</text>
  <!-- caption -->
  <rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
  <text x="16" y="298" font-size="14" fill="#fff">📖 第1頁：小狐同學覺得食物鏈超簡單——不就是誰吃誰？</text>
  <text x="16" y="314" font-size="12" fill="#f4d9a8">🦊「箭頭就是『我要吃你』！」（此頁刻意畫反，呈現迷思）</text>
</svg>
