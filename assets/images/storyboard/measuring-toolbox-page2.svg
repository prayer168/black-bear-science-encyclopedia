<rect x="270" y="150" width="180" height="22" fill="#ffe9a8" stroke="#c0a040" stroke-width="1.5"/>
<g stroke="#8a6a20" stroke-width="1"><line x1="280" y1="150" x2="280" y2="162"/><line x1="320" y1="150" x2="320" y2="162"/><line x1="360" y1="150" x2="360" y2="162"/><line x1="400" y1="150" x2="400" y2="162"/><line x1="440" y1="150" x2="440" y2="162"/></g>
<text x="280" y="185" text-anchor="middle" font-size="10" fill="#c0402a">0</text>
