  <line x1="0" y1="0" x2="0" y2="50" stroke="#8a6a4a" stroke-width="5"/>
  <g fill="#f2c94c" stroke="#c99a1a"><path d="M0 0 l16 -16 l6 16 Z"/><path d="M0 0 l16 16 l-16 6 Z"/><path d="M0 0 l-16 16 l-6 -16 Z"/><path d="M0 0 l-16 -16 l16 -6 Z"/></g>
