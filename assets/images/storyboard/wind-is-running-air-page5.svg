</g>
<text x="410" y="235" text-anchor="middle" font-size="11" fill="#6a6a6a">風車</text>
<!-- drop -->
<g transform="translate(45,145)"><image xlink:href="../characters/drop.svg" href="../characters/drop.svg" x="0" y="0" width="92" height="92"/></g>
<circle cx="40" cy="40" r="22" fill="#6b4f3a"/><text x="40" y="47" text-anchor="middle" font-size="19" fill="#fff" font-weight="bold">5</text>
<rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
<text x="14" y="297" font-size="13" fill="#fff">📖 第5頁：自己動手做，觀察風的方向與大小。</text>
<text x="14" y="314" font-size="12" fill="#f4d9a8">💧：「在空曠安全的地方觀察喔！」</text>
