<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
<rect width="520" height="320" fill="#dcecf7"/>
<rect x="0" y="200" width="520" height="78" fill="#a8c878" opacity="0.7"/>
<ellipse cx="260" cy="252" rx="230" ry="22" fill="#00000010"/>
<!-- weather vane -->
<line x1="300" y1="110" x2="300" y2="210" stroke="#8a8a8a" stroke-width="4"/>
<path d="M270 128 h40 l16 -10 l-16 -10 h-40 l-12 10 Z" fill="#e2554d" stroke="#a8352d"/>
<text x="300" y="230" text-anchor="middle" font-size="11" fill="#6a6a6a">風向計</text>
<!-- pinwheel -->
