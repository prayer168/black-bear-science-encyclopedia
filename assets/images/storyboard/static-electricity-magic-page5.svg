<!-- humid side -->
<text x="415" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="#2a6ab0">潮溼·不明顯</text>
<g fill="#7fb0d6"><circle cx="390" cy="115" r="5"/><circle cx="415" cy="128" r="4"/></g>
<ellipse cx="415" cy="175" rx="24" ry="30" fill="#f2a0b8" stroke="#d06888"/>
<rect x="405" y="235" width="10" height="8" fill="#fff" stroke="#ccc"/>
<text x="415" y="222" text-anchor="middle" font-size="11" fill="#c0392b">紙片不動</text>
<defs><marker id="a" markerWidth="9" markerHeight="9" refX="4" refY="2" orient="auto"><path d="M0 8 L4 0 L8 8 z" fill="#1f9d55"/></marker></defs>
<!-- beetle -->
<g transform="translate(45,145)"><image xlink:href="../characters/beetle.svg" href="../characters/beetle.svg" x="0" y="0" width="92" height="92"/></g>
<circle cx="40" cy="40" r="22" fill="#6b4f3a"/><text x="40" y="47" text-anchor="middle" font-size="19" fill="#fff" font-weight="bold">5</text>
<rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
<text x="14" y="297" font-size="13" fill="#fff">📖 第5頁：愈乾燥，靜電愈明顯。</text>
<text x="14" y="314" font-size="12" fill="#f4d9a8">🪲：「潮溼時水氣會把靜電帶走！」</text>
