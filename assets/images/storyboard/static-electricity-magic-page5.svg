<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
<rect width="520" height="320" fill="#eef4f7"/>
<rect x="0" y="0" width="520" height="278" fill="#e2eef2" opacity="0.6"/>
<ellipse cx="260" cy="252" rx="230" ry="22" fill="#00000010"/>
<line x1="330" y1="70" x2="330" y2="250" stroke="#cdd8de" stroke-width="2" stroke-dasharray="5 4"/>
<!-- dry side -->
<text x="245" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="#e07a1e">乾燥·明顯</text>
