<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="520" height="320" fill="#eef8ee"/>
  <!-- ground with fallen leaves + mushroom (decomposer) -->
  <rect x="0" y="200" width="520" height="60" fill="#c9a36a" opacity="0.5"/>
  <path d="M160 205 q10 -8 22 0 M200 210 q10 -8 22 0" stroke="#8a5a34" stroke-width="3" fill="none"/>
  <text x="180" y="200" font-size="18">🍂</text><text x="215" y="205" font-size="16">🍂</text>
  <!-- mushroom -->
  <ellipse cx="255" cy="185" rx="26" ry="14" fill="#c0392b"/><rect x="248" y="185" width="14" height="26" rx="4" fill="#f0e6d2"/>
  <circle cx="245" cy="182" r="3" fill="#fff"/><circle cx="265" cy="180" r="3" fill="#fff"/>
  <text x="255" y="228" text-anchor="middle" font-size="11" fill="#8a5a34" font-weight="bold">分解者</text>
  <!-- dashed nutrient arrow back to soil/plant -->
  <defs><marker id="dc5" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8a5a3a"/></marker></defs>
  <path d="M285 195 q60 -30 130 0" fill="none" stroke="#8a5a3a" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#dc5)"/>
  <text x="360" y="150" text-anchor="middle" font-size="11" fill="#8a5a3a">養分回到土壤</text>
  <text x="425" y="200" font-size="20">🌱</text>
  <!-- beetle -->
  <image href="../characters/beetle.svg" x="40" y="110" width="86" height="86"/>
  <rect x="130" y="70" width="230" height="34" rx="14" fill="#fff" stroke="#3a7d5d" stroke-width="2"/>
  <text x="245" y="92" text-anchor="middle" font-size="12" fill="#2f5d43">「分解者讓養分循環回環境！」</text>
  <!-- caption -->
  <rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
  <text x="16" y="298" font-size="14" fill="#fff">📖 第5頁：甲蟲博士介紹分解者，養分回到土壤。</text>
  <text x="16" y="314" font-size="12" fill="#f4d9a8">🪲「分解者把遺體分解，養分才能循環！」（虛線＝物質循環）</text>
</svg>
