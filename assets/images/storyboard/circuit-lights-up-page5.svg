<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="520" height="320" fill="#eef8ee"/>
  <!-- switch circuit demo -->
  <rect x="150" y="80" width="150" height="100" rx="8" fill="none" stroke="#c0392b" stroke-width="4"/>
  <rect x="200" y="168" width="50" height="22" rx="3" fill="#f4b400"/>
  <circle cx="225" cy="80" r="18" fill="#fff2b0" stroke="#c98f00" stroke-width="2"/>
  <!-- switch -->
  <line x1="300" y1="115" x2="300" y2="145" stroke="#c0392b" stroke-width="4"/>
  <text x="315" y="135" font-size="11" fill="#5aa469">開關</text>
  <!-- wire cross-section (beetle) -->
  <circle cx="410" cy="130" r="26" fill="#e08bbf"/>
  <circle cx="410" cy="130" r="12" fill="#c98a3a"/>
  <text x="410" y="175" text-anchor="middle" font-size="10" fill="#2d2a26">金屬芯＋塑膠皮</text>
  <!-- bear + beetle -->
  <image href="../characters/bear.svg" x="40" y="120" width="80" height="80"/>
  <image href="../characters/beetle.svg" x="440" y="200" width="72" height="72"/>
  <rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
  <text x="16" y="298" font-size="14" fill="#fff">📖 第5頁：原來電要走完整一圈才肯工作。</text>
  <text x="16" y="314" font-size="12" fill="#f4d9a8">🐻「開關接通就亮，斷開就滅！」🪲「電線裡是金屬導體！」</text>
</svg>
