<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
<rect width="520" height="320" fill="#cfe4f2"/>
<rect x="0" y="200" width="520" height="78" fill="#a8c878" opacity="0.7"/>
<ellipse cx="260" cy="252" rx="230" ry="22" fill="#00000010"/>
<!-- cirrus top -->
<g stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round"><path d="M280 60 q30 -10 60 -2"/></g>
<text x="400" y="62" font-size="10" fill="#3a7a9a">捲雲</text>
<!-- stratus mid -->
<rect x="240" y="95" width="230" height="18" rx="8" fill="#b8c4cc" opacity="0.9"/>
<text x="490" y="108" font-size="10" fill="#4a5a64" text-anchor="end">層雲</text>
<!-- cumulus low -->
<g fill="#ffffff" stroke="#c8d8e4" stroke-width="2"><ellipse cx="330" cy="150" rx="44" ry="24"/><ellipse cx="298" cy="160" rx="26" ry="16"/></g>
<text x="400" y="160" font-size="10" fill="#3a6a8a">積雲</text>
<!-- beetle -->
<g transform="translate(50,150)"><image xlink:href="../characters/beetle.svg" href="../characters/beetle.svg" x="0" y="0" width="92" height="92"/></g>
<circle cx="40" cy="40" r="22" fill="#6b4f3a"/><text x="40" y="47" text-anchor="middle" font-size="19" fill="#fff" font-weight="bold">4</text>
<rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
<text x="14" y="297" font-size="13" fill="#fff">📖 第4頁：看雲的形狀，就能猜天氣。</text>
<text x="14" y="314" font-size="12" fill="#f4d9a8">🪲：「棉花是積雲、羽毛是捲雲！」</text>
</svg>
