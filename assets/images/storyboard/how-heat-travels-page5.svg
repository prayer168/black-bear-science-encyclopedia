<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="520" height="320" fill="#eaf3fb"/>
  <!-- convection pot -->
  <path d="M60 220 L200 220 L188 150 L72 150 Z" fill="#cfe4f5" stroke="#2f7fc1" stroke-width="2"/>
  <defs>
    <marker id="up5" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#c0392b"/></marker>
    <marker id="dn5" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2f7fc1"/></marker>
  </defs>
  <path d="M130 210 C130 185 130 170 130 158" fill="none" stroke="#c0392b" stroke-width="3" marker-end="url(#up5)"/>
  <path d="M100 158 C92 178 96 200 122 210" fill="none" stroke="#2f7fc1" stroke-width="3" marker-end="url(#dn5)"/>
  <text x="130" y="245" text-anchor="middle" font-size="11" fill="#2f7fc1">對流（翻滾）</text>
  <!-- sun radiation to cheek -->
  <circle cx="430" cy="80" r="24" fill="#f4b400"/><g stroke="#f4b400" stroke-width="3" stroke-linecap="round"><line x1="430" y1="48" x2="430" y2="40"/><line x1="462" y1="80" x2="470" y2="80"/></g>
  <path d="M410 95 q-15 8 -30 18 M415 105 q-15 8 -30 18" stroke="#f4b400" stroke-width="2.5" fill="none"/>
  <text x="430" y="130" text-anchor="middle" font-size="11" fill="#c98f00">輻射（不需介質）</text>
  <!-- fox with warm cheek + beetle -->
  <image href="../characters/fox.svg" x="300" y="150" width="78" height="78"/>
  <text x="300" y="160" font-size="14">🔥</text>
  <image href="../characters/beetle.svg" x="200" y="150" width="76" height="76"/>
  <!-- caption -->
  <rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
  <text x="16" y="298" font-size="14" fill="#fff">📖 第5頁：可可翻滾（對流），站在旁邊臉暖暖（輻射）。</text>
  <text x="16" y="314" font-size="12" fill="#f4d9a8">💧「翻滾是對流！」🪲「臉暖暖是輻射，太陽也這樣送熱！」</text>
</svg>
