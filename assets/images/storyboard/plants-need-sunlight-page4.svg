<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="520" height="320" fill="#f3eefa"/>
  <!-- speech bubble -->
  <rect x="150" y="40" width="330" height="70" rx="16" fill="#fff" stroke="#8a56c2" stroke-width="2.5"/>
  <path d="M170 108 l-14 26 l34 -14 z" fill="#fff" stroke="#8a56c2" stroke-width="2.5"/>
  <text x="315" y="72" text-anchor="middle" font-size="15" fill="#6f3fb0">「植物是吃土長大的啦，</text>
  <text x="315" y="94" text-anchor="middle" font-size="15" fill="#6f3fb0">陽光只是拿來曬暖暖！」</text>
  <!-- monster -->
  <image href="../characters/monster.svg" x="40" y="120" width="96" height="96"/>
  <!-- pot with soil, monster pointing -->
  <path d="M330 250 l10 -44 h60 l10 44 z" fill="#c98a5a"/><rect x="326" y="200" width="80" height="12" rx="3" fill="#a86f3f"/>
  <ellipse cx="370" cy="212" rx="34" ry="8" fill="#6b4a2e"/>
  <path d="M370 206 v-46" stroke="#c9b24a" stroke-width="5"/><path d="M370 178 q-18 -6 -24 -18 q16 2 24 12" fill="#cbbf6a"/>
  <text x="370" y="278" text-anchor="middle" font-size="12" fill="#8a795c" font-weight="bold">土 ≠ 植物的主食</text>
  <!-- caption -->
  <rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
  <text x="16" y="298" font-size="14" fill="#fff">📖 第4頁：迷思怪獸最愛說錯話了，指著花盆裡的土。</text>
  <text x="16" y="314" font-size="12" fill="#f4d9a8">👾「植物是吃土長大的！」（怪獸表情俏皮不兇惡）</text>
</svg>
