<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
<rect width="520" height="320" fill="#e6f2f7"/>
<rect x="0" y="0" width="520" height="278" fill="#dff1f8" opacity="0.5"/>
<ellipse cx="260" cy="252" rx="230" ry="22" fill="#00000010"/>
<!-- record sheet -->
<g transform="translate(250,80)">
  <rect x="0" y="0" width="180" height="140" rx="8" fill="#fff" stroke="#7fb0d6" stroke-width="2"/>
  <text x="90" y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f7a8c">浮蛋紀錄</text>
  <line x1="12" y1="38" x2="168" y2="38" stroke="#cfe0e6"/>
  <text x="16" y="58" font-size="11" fill="#555">0匙　→ 沉</text>
  <text x="16" y="82" font-size="11" fill="#555">4匙　→ 懸浮</text>
  <text x="16" y="106" font-size="11" fill="#555">8匙　→ 浮到水面</text>
  <ellipse cx="140" cy="100" rx="14" ry="11" fill="#f5e6c8" stroke="#c9a24a"/>
</g>
<!-- fox -->
<g transform="translate(45,150)"><image xlink:href="../characters/fox.svg" href="../characters/fox.svg" x="0" y="0" width="88" height="88"/></g>
<circle cx="40" cy="40" r="22" fill="#6b4f3a"/><text x="40" y="47" text-anchor="middle" font-size="19" fill="#fff" font-weight="bold">6</text>
<rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
<text x="14" y="297" font-size="13" fill="#fff">📖 第6頁：原來死海就是超濃的鹽水！</text>
<text x="14" y="314" font-size="12" fill="#f4d9a8">🦊：「密度愈大浮力愈大，我懂了！」</text>
</svg>
