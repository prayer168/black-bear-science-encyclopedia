<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
<rect width="520" height="320" fill="#eaf4fb"/>
<rect x="0" y="0" width="520" height="278" fill="#dbeaf5" opacity="0.6"/>
<ellipse cx="260" cy="250" rx="230" ry="24" fill="#00000010"/>
<!-- three beaks -->
<g text-anchor="middle" font-size="12" fill="#5a4632">
  <!-- eagle hook -->
  <g transform="translate(210,110)">
    <circle cx="0" cy="0" r="22" fill="#8a6a4a" stroke="#5f4630" stroke-width="2"/>
    <circle cx="-6" cy="-4" r="3.5" fill="#fff"/><circle cx="-6" cy="-4" r="1.5" fill="#000"/>
    <path d="M20 -6 l20 2 q6 6 -2 14 q-4 -8 -18 -6z" fill="#d99a2a" stroke="#a8721a"/>
    <text x="0" y="44" fill="#5f4630">老鷹·鉤嘴撕肉</text>
  </g>
  <!-- hummingbird thin -->
  <g transform="translate(340,110)">
    <circle cx="0" cy="0" r="18" fill="#4fae7a" stroke="#2f7d52" stroke-width="2"/>
    <circle cx="-5" cy="-3" r="3" fill="#fff"/><circle cx="-5" cy="-3" r="1.5" fill="#000"/>
    <path d="M16 -1 l40 2 l-40 2z" fill="#333"/>
    <circle cx="66" cy="1" r="9" fill="#f0788f" stroke="#c85272"/>
    <text x="10" y="44" fill="#2f7d52">蜂鳥·細嘴吸蜜</text>
  </g>
  <!-- woodpecker on tree -->
  <g transform="translate(450,150)">
    <rect x="20" y="-40" width="16" height="120" fill="#a07840" stroke="#6f5228"/>
    <circle cx="0" cy="0" r="18" fill="#d94f4f" stroke="#a03535" stroke-width="2"/>
    <circle cx="-5" cy="-3" r="3" fill="#fff"/><circle cx="-5" cy="-3" r="1.5" fill="#000"/>
    <path d="M16 -1 l20 1 l-20 3z" fill="#444"/>
    <text x="4" y="70" fill="#a03535">啄木鳥·敲樹</text>
  </g>
</g>
<g transform="translate(55,120)"><image xlink:href="../characters/beetle.svg" href="../characters/beetle.svg" x="0" y="0" width="90" height="90"/></g>
<circle cx="40" cy="40" r="22" fill="#6b4f3a"/><text x="40" y="47" text-anchor="middle" font-size="19" fill="#fff" font-weight="bold">4</text>
<rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
<text x="14" y="297" font-size="13" fill="#fff">📖 第4頁：每種喙都是量身訂做。</text>
<text x="14" y="314" font-size="12" fill="#f4d9a8">🪲：「鉤子、吸管、鑿子都有！」</text>
</svg>
