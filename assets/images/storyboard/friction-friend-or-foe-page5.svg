<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="520" height="320" fill="#eef8ee"/>
  <!-- friend: shoe sole -->
  <path d="M150 100 q30 -10 70 0 l0 22 q-35 10 -70 0 z" fill="#6b4f3a"/>
  <g stroke="#3a2c20" stroke-width="3"><line x1="165" y1="104" x2="165" y2="120"/><line x1="185" y1="102" x2="185" y2="122"/><line x1="205" y1="104" x2="205" y2="120"/></g>
  <text x="185" y="145" text-anchor="middle" font-size="11" fill="#5aa469">增加摩擦（防滑）</text>
  <!-- foe: wheel -->
  <circle cx="330" cy="115" r="30" fill="#4a4a4a"/><circle cx="330" cy="115" r="10" fill="#9aa4ad"/>
  <g stroke="#9aa4ad" stroke-width="3"><line x1="330" y1="90" x2="330" y2="140"/><line x1="305" y1="115" x2="355" y2="115"/></g>
  <text x="330" y="165" text-anchor="middle" font-size="11" fill="#b5462a">減少摩擦（輪子）</text>
  <!-- bear + beetle -->
  <image href="../characters/bear.svg" x="40" y="180" width="80" height="80"/>
  <image href="../characters/beetle.svg" x="410" y="150" width="76" height="76"/>
  <rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
  <text x="16" y="298" font-size="14" fill="#fff">📖 第5頁：原來摩擦力可以增加也可以減少。</text>
  <text x="16" y="314" font-size="12" fill="#f4d9a8">🐻「止滑就增加、想滑順就減少！」🪲「輪子把滑動變滾動！」</text>
</svg>
