<rect x="308" y="96" width="74" height="16" rx="4" fill="#bfe4ef" stroke="#7fb0d6"/>
<g fill="#dff1f8" stroke="#a8cbe0"><rect x="314" y="98" width="12" height="12"/><rect x="332" y="98" width="12" height="12"/><rect x="350" y="98" width="12" height="12"/></g>
<!-- fog inside -->
