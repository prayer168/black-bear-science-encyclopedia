<rect width="520" height="320" fill="#dcecf7"/>
<rect x="0" y="0" width="520" height="278" fill="#e6f0f7" opacity="0.6"/>
<ellipse cx="260" cy="252" rx="230" ry="22" fill="#00000010"/>
