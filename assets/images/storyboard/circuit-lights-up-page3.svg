<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="520" height="320" fill="#fffdf9"/>
  <!-- complete circuit loop, lit -->
  <rect x="140" y="90" width="230" height="140" rx="10" fill="none" stroke="#c0392b" stroke-width="5"/>
  <rect x="215" y="215" width="80" height="30" rx="4" fill="#f4b400" stroke="#c98f00" stroke-width="2"/>
  <text x="255" y="235" text-anchor="middle" font-size="11" fill="#6b4f3a">電池</text>
  <circle cx="255" cy="90" r="26" fill="#fff2b0" stroke="#c98f00" stroke-width="3"/>
  <g stroke="#f4b400" stroke-width="3" stroke-linecap="round"><line x1="255" y1="52" x2="255" y2="42"/><line x1="288" y1="66" x2="296" y2="58"/><line x1="222" y1="66" x2="214" y2="58"/></g>
  <text x="255" y="145" text-anchor="middle" font-size="12" fill="#c98f00" font-weight="bold">亮了！</text>
  <!-- cheer -->
  <text x="410" y="120" font-size="22">🎉</text>
  <text x="420" y="160" font-size="12" fill="#5aa469">隔壁組用兩條線<tspan x="420" dy="16">接成完整一圈</tspan></text>
  <rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
  <text x="16" y="298" font-size="14" fill="#fff">📖 第3頁：隔壁組的燈泡亮了！</text>
  <text x="16" y="314" font-size="12" fill="#f4d9a8">隔壁：「亮了亮了！」（迴路完整、燈發光）</text>
</svg>
