  <text x="16" y="298" font-size="14" fill="#fff">📖 第5頁：原來磁鐵有兩張臉。</text>
  <text x="16" y="314" font-size="12" fill="#f4d9a8">🐻「同極相斥、異極相吸！」🪲「地球是大磁鐵，指南針靠它！」</text>
