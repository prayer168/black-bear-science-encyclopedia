  <rect x="180" y="130" width="45" height="40" fill="#c0392b"/><rect x="225" y="130" width="45" height="40" fill="#2f7fc1"/>
  <text x="202" y="156" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">N</text><text x="247" y="156" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">S</text>
  <text x="225" y="195" text-anchor="middle" font-size="11" fill="#6b4f3a">同極相斥、異極相吸</text>
  <!-- compass -->
  <circle cx="330" cy="150" r="24" fill="#fff" stroke="#6b4f3a" stroke-width="2"/><line x1="330" y1="130" x2="330" y2="170" stroke="#c0392b" stroke-width="3"/><text x="330" y="195" text-anchor="middle" font-size="10" fill="#2d2a26">指南針</text>
  <image href="../characters/bear.svg" x="40" y="130" width="80" height="80"/>
  <image href="../characters/beetle.svg" x="410" y="140" width="76" height="76"/>
