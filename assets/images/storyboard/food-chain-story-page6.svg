<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="520" height="320" fill="#eaf5ff"/>
  <!-- food web cards on a poster -->
  <rect x="120" y="50" width="280" height="170" rx="10" fill="#fff" stroke="#2f7fc1" stroke-width="2"/>
  <text x="175" y="90" font-size="20">🌱</text><text x="255" y="80" font-size="20">🦗</text><text x="335" y="95" font-size="20">🕷️</text>
  <text x="215" y="140" font-size="20" opacity="0.4">🐸</text><text x="320" y="150" font-size="20">🐦</text><text x="175" y="185" font-size="20">🐍</text>
  <!-- web links -->
  <g stroke="#7aa0b8" stroke-width="1.5">
    <line x1="190" y1="85" x2="252" y2="78"/><line x1="272" y1="80" x2="332" y2="90"/><line x1="335" y1="100" x2="330" y2="140"/>
  </g>
  <!-- frog card being pulled out (red) -->
  <line x1="205" y1="130" x2="225" y2="150" stroke="#c0392b" stroke-width="4" stroke-linecap="round"/>
  <line x1="225" y1="130" x2="205" y2="150" stroke="#c0392b" stroke-width="4" stroke-linecap="round"/>
  <g stroke="#c0392b" stroke-width="2.5"><line x1="230" y1="95" x2="220" y2="130"/><line x1="200" y1="150" x2="182" y2="175"/></g>
  <!-- drop leading -->
  <image href="../characters/drop.svg" x="410" y="130" width="82" height="82"/>
  <image href="../characters/fox.svg" x="30" y="140" width="76" height="76"/>
  <!-- caption -->
  <rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
  <text x="16" y="298" font-size="14" fill="#fff">📖 第6頁：大家玩食物網卡片，抽掉青蛙看連動。</text>
  <text x="16" y="314" font-size="12" fill="#f4d9a8">💧「抽掉青蛙，蛇會餓、蟲會爆多！」🦊「食物鏈是能量的地圖！」</text>
</svg>
