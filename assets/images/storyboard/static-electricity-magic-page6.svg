<text x="14" y="297" font-size="13" fill="#fff">📖 第6頁：讓頭髮站、紙片飛的是靜電，不是熱。</text>
<text x="14" y="314" font-size="12" fill="#f4d9a8">👾「是摩擦生熱啦！」🐻「熱不能讓水流轉彎喔！」</text>
