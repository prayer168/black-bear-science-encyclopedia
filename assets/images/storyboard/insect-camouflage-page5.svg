<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
<rect width="520" height="320" fill="#e6efdc"/>
<rect x="0" y="0" width="520" height="278" fill="#d6e6c6" opacity="0.6"/>
<ellipse cx="260" cy="252" rx="230" ry="22" fill="#00000010"/>
<!-- generations: three sticks getting more like branch -->
<g transform="translate(220,150)">
  <text x="70" y="-40" text-anchor="middle" font-size="11" fill="#5a7a3a">一代一代越來越像枝</text>
  <rect x="0" y="0" width="40" height="8" rx="3" fill="#9a8a6a" stroke="#7a5a2a"/>
  <text x="20" y="26" text-anchor="middle" font-size="16">→</text>
  <rect x="50" y="-2" width="52" height="7" rx="3" fill="#a2824e" stroke="#7a5a2a"/>
  <text x="86" y="26" text-anchor="middle" font-size="16">→</text>
  <rect x="112" y="-3" width="66" height="6" rx="3" fill="#a2824e" stroke="#7a5a2a"/>
  <line x1="118" y1="-3" x2="100" y2="-10" stroke="#7a5a2a" stroke-width="1"/>
</g>
<!-- bear -->
<g transform="translate(50,140)"><image xlink:href="../characters/bear.svg" href="../characters/bear.svg" x="0" y="0" width="92" height="92"/></g>
<circle cx="40" cy="40" r="22" fill="#6b4f3a"/><text x="40" y="47" text-anchor="middle" font-size="19" fill="#fff" font-weight="bold">5</text>
<rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
<text x="14" y="297" font-size="13" fill="#fff">📖 第5頁：偽裝是慢慢「適應」出來的。</text>
<text x="14" y="314" font-size="12" fill="#f4d9a8">🐻：「像的比較不會被吃、留下較多後代。」</text>
</svg>
