<rect width="520" height="320" fill="#eaf4fb"/>
<rect x="0" y="0" width="520" height="278" fill="#cfe8c4" opacity="0.5"/>
<ellipse cx="260" cy="250" rx="230" ry="24" fill="#00000010"/>
<!-- sparrow pressing seed -->
<g transform="translate(140,150)" text-anchor="middle" font-size="12" fill="#8a5a2b">
  <circle cx="0" cy="0" r="28" fill="#b3763f" stroke="#8a5a2b" stroke-width="2"/>
  <circle cx="-8" cy="-6" r="4" fill="#fff"/><circle cx="-8" cy="-6" r="2" fill="#000"/>
