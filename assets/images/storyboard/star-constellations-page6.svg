<circle cx="45" cy="40" r="22" fill="#6b4f3a"/><text x="45" y="47" text-anchor="middle" font-size="19" fill="#fff" font-weight="bold">6</text>
<rect x="0" y="278" width="520" height="42" fill="#3a2f20"/>
<text x="14" y="297" font-size="13" fill="#fff">📖 第6頁：沒有線，北極星靠位置不是最亮。</text>
<text x="14" y="314" font-size="12" fill="#f4d9a8">👾「北極星最亮！」🐻「它靠位置指北喔！」</text>
