<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
<rect width="520" height="320" fill="#181e38"/>
<rect x="0" y="205" width="520" height="73" fill="#2a3050"/>
<!-- monster -->
<g transform="translate(40,140)"><image xlink:href="../characters/monster.svg" href="../characters/monster.svg" x="0" y="0" width="92" height="92"/></g>
<text x="150" y="118" font-size="22" fill="#c07ad0" font-weight="bold">?!</text>
<!-- a normal polaris and a brighter sirius -->
<circle cx="270" cy="90" r="4" fill="#fff8d0"/>
<text x="270" y="75" text-anchor="middle" font-size="10" fill="#ffe07a">北極星（普通亮）</text>
<circle cx="340" cy="140" r="7" fill="#fffbe0"/>
<g stroke="#fffbe0" stroke-width="1"><line x1="340" y1="128" x2="340" y2="122"/><line x1="340" y1="152" x2="340" y2="158"/></g>
<text x="345" y="170" text-anchor="middle" font-size="10" fill="#c8d4f0">天狼星（最亮）</text>
<!-- bear -->
