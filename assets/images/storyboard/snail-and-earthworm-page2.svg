<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
<rect width="520" height="320" fill="#e8f2ea"/>
<rect x="0" y="0" width="520" height="278" fill="#cfe6d2" opacity="0.5"/>
<ellipse cx="260" cy="250" rx="230" ry="22" fill="#00000010"/>
<!-- big snail center-right, tentacle retracting -->
<g transform="translate(320,175)">
  <circle r="50" fill="#d9a15a" stroke="#a9743a" stroke-width="3"/>
  <path d="M0 0 a16 16 0 1 1 -0.1 0 M0 0 a32 32 0 1 1 -0.1 0" fill="none" stroke="#a9743a" stroke-width="2.5"/>
  <path d="M-46 14 q-18 2 -26 -12" stroke="#e7c9a0" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- short retracted tentacles -->
  <line x1="-70" y1="-2" x2="-78" y2="-16" stroke="#e7c9a0" stroke-width="4" stroke-linecap="round"/>
  <path d="M-78 -18 q-4 -6 -2 -12" stroke="#8a3f38" stroke-width="2" fill="none" marker-end="url(#a)"/>
</g>
<!-- finger from fox -->
<path d="M205 150 l24 20" stroke="#f0c0a0" stroke-width="13" stroke-linecap="round"/>
<circle cx="202" cy="147" r="9" fill="#f0c0a0"/>
<defs><marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0 0 L6 4 L0 8 z" fill="#8a3f38"/></marker></defs>
<!-- fox -->
<g transform="translate(60,120)"><image xlink:href="../characters/fox.svg" href="../characters/fox.svg" x="0" y="0" width="86" height="86"/></g>
<circle cx="40" cy="40" r="22" fill="#6b4f3a"/><text x="40" y="47" text-anchor="middle" font-size="19" fill="#fff" font-weight="bold">2</text>
<rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
<text x="14" y="297" font-size="13" fill="#fff">📖 第2頁：一碰，觸角就縮回去了。</text>
<text x="14" y="314" font-size="12" fill="#f4d9a8">🦊：「牠會縮耶！眼睛在哪裡？」</text>
</svg>
