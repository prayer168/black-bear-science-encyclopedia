<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="520" height="320" fill="#fdf6e6"/>
  <!-- snack plate -->
  <ellipse cx="150" cy="200" rx="55" ry="18" fill="#e7ddcd"/>
  <rect x="120" y="175" width="30" height="24" rx="3" fill="#e0b878"/><ellipse cx="170" cy="185" rx="14" ry="10" fill="#f4d97a"/>
  <text x="150" y="230" text-anchor="middle" font-size="11" fill="#6b4f3a">早餐：吐司加蛋</text>
  <!-- bear pointing to fox belly, energy arrow -->
  <image href="../characters/bear.svg" x="220" y="120" width="86" height="86"/>
  <image href="../characters/fox.svg" x="380" y="130" width="82" height="82"/>
  <defs><marker id="e3" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#e8743b"/></marker></defs>
  <path d="M200 200 q90 30 175 -20" fill="none" stroke="#e8743b" stroke-width="3" stroke-dasharray="6 4" marker-end="url(#e3)"/>
  <text x="290" y="240" text-anchor="middle" font-size="12" fill="#e8743b">能量：食物 → 吃它的人</text>
  <!-- caption -->
  <rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
  <text x="16" y="298" font-size="14" fill="#fff">📖 第3頁：黑熊老師端出點心，問了一個問題。</text>
  <text x="16" y="314" font-size="12" fill="#f4d9a8">🐻「食物被吃掉，是能量搬家到吃它的人身上。」</text>
