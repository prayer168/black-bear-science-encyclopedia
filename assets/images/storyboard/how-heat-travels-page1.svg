<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="520" height="320" fill="#fdf1e8"/>
  <!-- table -->
  <rect x="20" y="230" width="480" height="16" fill="#c99a63"/>
  <!-- pot of cocoa -->
  <path d="M180 230 L340 230 L322 150 L198 150 Z" fill="#7a4a2a"/>
  <ellipse cx="260" cy="150" rx="62" ry="12" fill="#8a5a34"/>
  <!-- steam -->
  <path d="M235 145 q-8 -16 4 -28 M260 143 q-8 -16 4 -28 M285 145 q-8 -16 4 -28" stroke="#d8b49a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <text x="260" y="200" text-anchor="middle" font-size="13" fill="#fff">熱可可</text>
  <!-- three spoons -->
  <rect x="228" y="90" width="8" height="70" rx="3" fill="#9aa4ad"/><text x="232" y="84" text-anchor="middle" font-size="10" fill="#6b4f3a">金屬</text>
  <rect x="256" y="90" width="8" height="70" rx="3" fill="#e08bbf"/><text x="260" y="84" text-anchor="middle" font-size="10" fill="#6b4f3a">塑膠</text>
  <rect x="284" y="90" width="8" height="70" rx="3" fill="#b98a5a"/><text x="288" y="84" text-anchor="middle" font-size="10" fill="#6b4f3a">木頭</text>
  <!-- drop captain -->
  <image href="../characters/drop.svg" x="380" y="130" width="86" height="86"/>
  <!-- caption -->
  <rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
  <text x="16" y="298" font-size="14" fill="#fff">📖 第1頁：香噴噴的熱可可，插著三支不同的湯匙。</text>
  <text x="16" y="314" font-size="12" fill="#f4d9a8">💧「等一下就能喝囉！」（三湯匙材質不同、插入深度一致）</text>
</svg>
