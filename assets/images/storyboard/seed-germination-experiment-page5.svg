<text x="340" y="100" text-anchor="middle" font-size="12" fill="#5a8a2a" font-weight="bold">只有「水」不同，其他全一樣</text>
<g transform="translate(60,120)"><image xlink:href="../characters/drop.svg" href="../characters/drop.svg" x="0" y="0" width="84" height="84"/></g>
<circle cx="40" cy="40" r="22" fill="#6b4f3a"/><text x="40" y="47" text-anchor="middle" font-size="19" fill="#fff" font-weight="bold">5</text>
