<circle cx="230" cy="150" r="22" fill="#ffd24a"/><text x="230" y="188" text-anchor="middle" font-size="10" fill="#ffd24a">太陽</text>
<circle cx="340" cy="150" r="20" fill="#3a7a4a" stroke="#2a5a36"/><text x="340" y="186" text-anchor="middle" font-size="10" fill="#9fd0a0">地球</text>
<circle cx="420" cy="150" r="11" fill="#d8d8d0"/><text x="420" y="176" text-anchor="middle" font-size="10" fill="#e0e0d8">月</text>
