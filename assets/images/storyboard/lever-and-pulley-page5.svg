  <!-- bear + beetle -->
  <image href="../characters/bear.svg" x="40" y="120" width="80" height="80"/>
  <image href="../characters/beetle.svg" x="460" y="180" width="56" height="56"/>
  <rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
  <text x="16" y="298" font-size="14" fill="#fff">📖 第5頁：省的力，是用多移動的距離換來的。</text>
  <text x="16" y="314" font-size="12" fill="#f4d9a8">🐻「少出的力＝多移動的距離！」🪲「滑輪也是這樣！」</text>
