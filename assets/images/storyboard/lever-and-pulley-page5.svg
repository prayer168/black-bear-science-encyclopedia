  <path d="M230 175 L260 175 L245 150 Z" fill="#6b4f3a"/>
  <rect x="130" y="160" width="230" height="8" rx="3" fill="#c9a35a"/>
  <rect x="135" y="140" width="30" height="22" fill="#8a8f96"/>
  <defs><marker id="lp5" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2f7fc1"/></marker></defs>
  <line x1="345" y1="140" x2="345" y2="160" stroke="#2f7fc1" stroke-width="3" marker-end="url(#lp5)"/>
  <text x="180" y="200" text-anchor="middle" font-size="10" fill="#c0392b">短</text>
  <text x="310" y="200" text-anchor="middle" font-size="10" fill="#2f7fc1">長（多移動距離）</text>
