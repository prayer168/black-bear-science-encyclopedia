<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="520" height="320" fill="#fdf6e6"/>
  <!-- classroom wall + window -->
  <rect x="30" y="30" width="200" height="150" rx="8" fill="#eaf6ff" stroke="#9cc2dd" stroke-width="4"/>
  <line x1="130" y1="30" x2="130" y2="180" stroke="#9cc2dd" stroke-width="4"/>
  <line x1="30" y1="105" x2="230" y2="105" stroke="#9cc2dd" stroke-width="4"/>
  <!-- sun through window -->
  <circle cx="185" cy="70" r="22" fill="#f4b400"/>
  <g stroke="#f4b400" stroke-width="3" stroke-linecap="round"><line x1="185" y1="40" x2="185" y2="30"/><line x1="215" y1="70" x2="225" y2="70"/><line x1="205" y1="50" x2="213" y2="42"/></g>
  <!-- sunbeams -->
  <path d="M170 95 L120 200 M195 95 L160 200" stroke="#f7dd9a" stroke-width="10" opacity="0.6" stroke-linecap="round"/>
  <!-- table -->
  <rect x="20" y="235" width="480" height="16" fill="#c99a63"/>
  <!-- two pots with green sprouts -->
  <g>
    <path d="M120 235 l8 -30 h34 l8 30 z" fill="#c98a5a"/><rect x="118" y="200" width="52" height="10" rx="3" fill="#a86f3f"/>
    <path d="M144 205 v-40" stroke="#5aa469" stroke-width="5"/><path d="M144 180 q-20 -8 -28 -24 q18 3 28 18" fill="#5aa469"/><path d="M144 172 q20 -8 28 -24 q-18 3 -28 18" fill="#5aa469"/>
  </g>
  <g>
    <path d="M330 235 l8 -30 h34 l8 30 z" fill="#c98a5a"/><rect x="328" y="200" width="52" height="10" rx="3" fill="#a86f3f"/>
    <path d="M354 205 v-40" stroke="#5aa469" stroke-width="5"/><path d="M354 180 q-20 -8 -28 -24 q18 3 28 18" fill="#5aa469"/><path d="M354 172 q20 -8 28 -24 q-18 3 -28 18" fill="#5aa469"/>
  </g>
  <!-- watering can -->
  <path d="M250 210 q0 -14 16 -14 h20 v22 h-20 q-16 0 -16 -8 z" fill="#7fb0d6"/>
  <path d="M286 200 l24 -8 l-18 14 z" fill="#7fb0d6"/>
  <line x1="298" y1="196" x2="308" y2="184" stroke="#7fb0d6" stroke-width="3"/>
  <path d="M255 178 q4 8 0 14 M262 178 q4 8 0 14" stroke="#2f7fc1" stroke-width="2" fill="none"/>
  <!-- fox -->
  <image href="../characters/fox.svg" x="386" y="150" width="78" height="78"/>
  <!-- caption -->
  <rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
  <text x="16" y="298" font-size="14" fill="#fff">📖 第1頁：小狐同學種了兩盆綠豆苗，每天都很認真照顧。</text>
  <text x="16" y="314" font-size="12" fill="#f4d9a8">🦊「快快長大喔！」（兩盆此時都健康翠綠）</text>
</svg>
