<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="520" height="320" fill="#eaf5ff"/>
  <!-- water basin -->
  <rect x="150" y="150" width="240" height="110" rx="10" fill="#bfe0f7" stroke="#2f7fc1" stroke-width="3"/>
  <rect x="150" y="150" width="240" height="16" fill="#9fd0ef"/>
  <!-- inverted cup pushed in with trapped air -->
  <rect x="240" y="120" width="60" height="100" rx="4" fill="#fff" stroke="#6b4f3a" stroke-width="3" opacity="0.9"/>
  <rect x="243" y="170" width="54" height="47" fill="#eaf6ff"/>
  <text x="270" y="150" text-anchor="middle" font-size="11" fill="#2f7fc1">空氣</text>
  <line x1="270" y1="95" x2="270" y2="115" stroke="#6b4f3a" stroke-width="3"/>
  <text x="285" y="108" font-size="11" fill="#6b4f3a">壓入</text>
  <!-- drop captain -->
  <image href="../characters/drop.svg" x="380" y="120" width="86" height="86"/>
  <!-- caption -->
  <rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
  <text x="16" y="298" font-size="14" fill="#fff">📖 第3頁：水滴小隊長要證明空氣會占空間。</text>
  <text x="16" y="314" font-size="12" fill="#f4d9a8">💧「猜猜看，杯子裡會不會進水？」（杯內留明顯空氣、水進不去）</text>
</svg>
