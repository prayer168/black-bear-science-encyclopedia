  <!-- caption -->
  <rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
  <text x="16" y="298" font-size="14" fill="#fff">📖 第1頁：小狐同學怎麼追都追不到那顆氣球。</text>
  <text x="16" y="314" font-size="12" fill="#f4d9a8">🦊「裡面明明什麼都沒有，怎麼跳這麼高？」（氣球鼓鼓飄在半空）</text>
</svg>
