    <rect x="245" y="110" width="34" height="120" rx="16" fill="#bfe0f7" stroke="#2f7fc1" stroke-width="2"/>
    <rect x="245" y="150" width="34" height="80" fill="#a9d3ef"/><rect x="245" y="150" width="34" height="8" fill="#f4c542"/>
    <text x="262" y="250" text-anchor="middle" font-size="11" fill="#2d2a26">B無氧</text>
