<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 520 320" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
<rect width="520" height="320" fill="#eaf5e6"/>
<rect x="0" y="0" width="520" height="278" fill="#fdf3f6" opacity="0.7"/>
<ellipse cx="260" cy="250" rx="230" ry="24" fill="#00000010"/>
<!-- dissected flower parts laid out -->
<g font-size="12" fill="#5a4632" text-anchor="middle">
  <path d="M300 120 l-16 12 M300 120 l16 12 M300 122 l0 16" stroke="#5fa35f" stroke-width="4" fill="none" stroke-linecap="round"/>
  <text x="300" y="160" fill="#4d8c4d">花萼</text>
  <ellipse cx="360" cy="120" rx="20" ry="12" fill="#f0788f" stroke="#c85272"/>
  <text x="360" y="160" fill="#c85272">花瓣</text>
  <line x1="415" y1="100" x2="415" y2="140" stroke="#e0a52a" stroke-width="3"/><circle cx="415" cy="98" r="7" fill="#f2c94c" stroke="#c99a1a"/>
