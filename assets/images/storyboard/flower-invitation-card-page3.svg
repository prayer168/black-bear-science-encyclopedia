  <ellipse cx="465" cy="120" rx="10" ry="18" fill="#7fbf6f" stroke="#4d8c4d"/>
  <text x="465" y="160" fill="#4d8c4d">雌蕊</text>
</g>
<!-- bear -->
<g transform="translate(70,110)"><image xlink:href="../characters/bear.svg" href="../characters/bear.svg" x="0" y="0" width="96" height="96"/></g>
<circle cx="40" cy="40" r="22" fill="#6b4f3a"/><text x="40" y="47" text-anchor="middle" font-size="19" fill="#fff" font-weight="bold">3</text>
<rect x="0" y="278" width="520" height="42" fill="#6b4f3a"/>
<text x="14" y="297" font-size="13" fill="#fff">📖 第3頁：一朵花有四個重要部位。</text>
<text x="14" y="314" font-size="12" fill="#f4d9a8">🐻：「由外到內：花萼、花瓣、雄蕊、雌蕊。」</text>
</svg>
