<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <circle cx="60" cy="60" r="60" fill="#f3e9dd"/>
  <!-- ears -->
  <circle cx="30" cy="34" r="16" fill="#2d2a26"/><circle cx="90" cy="34" r="16" fill="#2d2a26"/>
  <circle cx="30" cy="34" r="7" fill="#5a4a3a"/><circle cx="90" cy="34" r="7" fill="#5a4a3a"/>
  <!-- head -->
  <circle cx="60" cy="62" r="38" fill="#2d2a26"/>
  <!-- white crescent V (Formosan black bear mark) on lower face/chest -->
  <path d="M44 92 L60 84 L76 92 L60 118 Z" fill="#f7f3ec" opacity="0.95"/>
  <!-- muzzle -->
  <ellipse cx="60" cy="74" rx="20" ry="15" fill="#c9a77f"/>
  <ellipse cx="60" cy="68" rx="6" ry="4.5" fill="#2d2a26"/>
  <path d="M60 72 v6 M60 78 q-6 4 -11 1 M60 78 q6 4 11 1" stroke="#3a2f25" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- glasses (teacher) -->
  <circle cx="47" cy="55" r="11" fill="#eaf6ff" stroke="#6b4f3a" stroke-width="3"/>
  <circle cx="73" cy="55" r="11" fill="#eaf6ff" stroke="#6b4f3a" stroke-width="3"/>
  <line x1="58" y1="55" x2="62" y2="55" stroke="#6b4f3a" stroke-width="3"/>
  <!-- eyes -->
  <circle cx="47" cy="55" r="4" fill="#2d2a26"/><circle cx="73" cy="55" r="4" fill="#2d2a26"/>
  <circle cx="48.5" cy="53.5" r="1.3" fill="#fff"/><circle cx="74.5" cy="53.5" r="1.3" fill="#fff"/>
</svg>
