  <!-- eyes -->
  <circle cx="52" cy="40" r="3.2" fill="#2d2a26"/><circle cx="68" cy="40" r="3.2" fill="#2d2a26"/>
  <circle cx="53" cy="39" r="1" fill="#fff"/><circle cx="69" cy="39" r="1" fill="#fff"/>
  <!-- smile -->
