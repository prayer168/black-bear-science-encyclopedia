<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#f3f8ee"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">一朵花的祕密（縱剖）</text>

  <!-- receptacle & stem -->
  <rect x="335" y="330" width="16" height="50" fill="#7fa066"/>
  <path d="M320 330 q23 18 46 0 Z" fill="#9db878"/>

  <!-- sepals -->
  <path d="M315 322 q-30 8 -46 -6 q28 -2 46 -10 Z" fill="#8bbf6a"/>
  <path d="M373 322 q30 8 46 -6 q-28 -2 -46 -10 Z" fill="#8bbf6a"/>

  <!-- petals -->
  <path d="M320 300 C250 250 250 140 330 150 C300 210 300 270 344 305 Z" fill="#f6c9de" stroke="#e58fb4" stroke-width="2"/>
  <path d="M368 300 C438 250 438 140 358 150 C388 210 388 270 344 305 Z" fill="#f6c9de" stroke="#e58fb4" stroke-width="2"/>

  <!-- pistil (雌蕊) center -->
  <path d="M344 300 L344 150" stroke="#3f7d3a" stroke-width="4"/>
  <ellipse cx="344" cy="146" rx="16" ry="9" fill="#e0a84e"/>
  <!-- ovary -->
  <ellipse cx="344" cy="292" rx="26" ry="34" fill="#cfe6b8" stroke="#3f7d3a" stroke-width="2"/>
  <!-- ovules -->
  <circle cx="336" cy="292" r="5" fill="#f2e07a" stroke="#c9a94a"/>
  <circle cx="352" cy="292" r="5" fill="#f2e07a" stroke="#c9a94a"/>
  <circle cx="344" cy="305" r="5" fill="#f2e07a" stroke="#c9a94a"/>

  <!-- stamens (雄蕊) -->
  <path d="M300 300 C285 240 285 200 300 175" fill="none" stroke="#caa96a" stroke-width="3"/>
  <ellipse cx="300" cy="170" rx="11" ry="7" fill="#e8b84a"/>
  <path d="M388 300 C403 240 403 200 388 175" fill="none" stroke="#caa96a" stroke-width="3"/>
  <ellipse cx="388" cy="170" rx="11" ry="7" fill="#e8b84a"/>
  <g fill="#c98f00"><circle cx="296" cy="168" r="1.5"/><circle cx="304" cy="172" r="1.5"/><circle cx="392" cy="168" r="1.5"/><circle cx="384" cy="172" r="1.5"/></g>

  <!-- labels left (pistil) -->
  <line x1="344" y1="146" x2="470" y2="120" stroke="#6b4f3a" stroke-width="1.3"/>
  <text x="476" y="118" font-size="14" fill="#2d2a26">柱頭</text><text x="476" y="135" font-size="10" fill="#6f6a63">接收花粉</text>
  <line x1="344" y1="210" x2="470" y2="200" stroke="#6b4f3a" stroke-width="1.3"/>
  <text x="476" y="200" font-size="14" fill="#2d2a26">花柱</text>
  <line x1="368" y1="292" x2="470" y2="285" stroke="#6b4f3a" stroke-width="1.3"/>
  <text x="476" y="283" font-size="14" fill="#2d2a26">子房</text><text x="476" y="300" font-size="10" fill="#6f6a63">日後成果實</text>
  <line x1="352" y1="292" x2="470" y2="345" stroke="#6b4f3a" stroke-width="1.3"/>
  <text x="476" y="345" font-size="14" fill="#2d2a26">胚珠</text><text x="476" y="362" font-size="10" fill="#6f6a63">日後成種子</text>
  <text x="540" y="160" font-size="13" font-weight="bold" fill="#3f7d3a">雌蕊</text>

  <!-- labels left (stamen) -->
  <line x1="300" y1="170" x2="180" y2="140" stroke="#6b4f3a" stroke-width="1.3"/>
  <text x="120" y="136" font-size="14" fill="#2d2a26">花藥</text><text x="120" y="153" font-size="10" fill="#6f6a63">產生花粉</text>
  <line x1="292" y1="240" x2="180" y2="230" stroke="#6b4f3a" stroke-width="1.3"/>
  <text x="120" y="230" font-size="14" fill="#2d2a26">花絲</text>
  <text x="150" y="180" font-size="13" font-weight="bold" fill="#c98f00">雄蕊</text>
  <line x1="315" y1="230" x2="200" y2="290" stroke="#6b4f3a" stroke-width="1.3"/>
  <text x="120" y="290" font-size="14" fill="#2d2a26">花瓣</text>
  <line x1="300" y1="316" x2="200" y2="330" stroke="#6b4f3a" stroke-width="1.3"/>
  <text x="120" y="332" font-size="14" fill="#2d2a26">花萼</text>

  <text x="350" y="392" text-anchor="middle" font-size="12" fill="#8a6a3f">花不是只為了漂亮，它是植物的生殖器官。</text>
</svg>
