<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eef6ee"/>
  <text x="350" y="30" text-anchor="middle" font-size="21" font-weight="bold" fill="#3a7a4a">怎麼照顧蠶寶寶＋寫日記</text>

  <!-- 1 fresh mulberry -->
  <rect x="20" y="55" width="320" height="130" rx="10" fill="#eef7ea" stroke="#5aa070" stroke-width="2"/>
  <text x="180" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a7a4a">① 餵新鮮乾燥桑葉</text>
  <path d="M80 120 q30 -20 60 -6 q-6 34 -44 40 q-24 -8 -16 -34z" fill="#7bb046" stroke="#4a7030" stroke-width="2"/>
  <path d="M170 130 q20 -18 42 -6 q-4 20 -26 24" fill="#f5f0e0" stroke="#d0c8a8" stroke-width="2"/>
  <text x="250" y="150" font-size="12" fill="#3a7a4a">乾淨、不帶水</text>

  <!-- 2 clean box -->
  <rect x="360" y="55" width="320" height="130" rx="10" fill="#eaf5fb" stroke="#5a9ac8" stroke-width="2"/>
  <text x="520" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a6a9a">② 清理盒子・通風</text>
  <rect x="450" y="105" width="140" height="55" rx="6" fill="#fff" stroke="#88b8c8" stroke-width="2"/>
  <g stroke="#88b8c8" stroke-width="1"><line x1="470" y1="105" x2="470" y2="160"/><line x1="490" y1="105" x2="490" y2="160"/></g>
  <text x="520" y="176" text-anchor="middle" font-size="12" fill="#2a6a9a">透氣、乾淨</text>

  <!-- 3 gentle + wash hands -->
  <rect x="20" y="200" width="320" height="150" rx="10" fill="#fdf4e8" stroke="#e0a860" stroke-width="2"/>
  <text x="180" y="225" text-anchor="middle" font-size="14" font-weight="bold" fill="#a07020">③ 輕柔移動・洗手</text>
  <path d="M70 270 q26 -12 40 -2" stroke="#7bb046" stroke-width="6" fill="none"/>
  <path d="M110 268 q10 -8 20 -2 q6 8 -4 12" fill="#f5f0e0" stroke="#d0c8a8" stroke-width="1.5"/>
  <text x="130" y="255" font-size="11" fill="#a07020">桑葉輕引導</text>
  <circle cx="250" cy="290" r="20" fill="#bfe0ef" stroke="#7fb0d6" stroke-width="2"/>
  <path d="M242 290 q8 8 16 0" stroke="#3a7ab0" stroke-width="2" fill="none"/>
  <text x="250" y="330" text-anchor="middle" font-size="11" fill="#2a6a9a">摸後洗手</text>

  <!-- 4 measure + diary -->
  <rect x="360" y="200" width="320" height="150" rx="10" fill="#eef7ea" stroke="#5aa070" stroke-width="2"/>
  <text x="520" y="225" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a7a4a">④ 量體長・寫日記</text>
  <rect x="400" y="255" width="90" height="16" fill="#ffe9a8" stroke="#c0a040"/>
  <g stroke="#8a6a20" stroke-width="1"><line x1="410" y1="255" x2="410" y2="265"/><line x1="440" y1="255" x2="440" y2="265"/><line x1="470" y1="255" x2="470" y2="265"/></g>
  <path d="M405 250 q20 -6 40 0" fill="#f5f0e0" stroke="#d0c8a8" stroke-width="1.5"/>
  <rect x="520" y="245" width="130" height="90" rx="4" fill="#fff" stroke="#7aa080" stroke-width="2"/>
  <g stroke="#c0d0c0" stroke-width="1"><line x1="530" y1="270" x2="640" y2="270"/><line x1="530" y1="295" x2="640" y2="295"/><line x1="530" y1="318" x2="640" y2="318"/></g>
  <text x="585" y="238" text-anchor="middle" font-size="11" fill="#3a7a4a">觀察日記</text>

  <text x="350" y="384" text-anchor="middle" font-size="14" font-weight="bold" fill="#3a7a4a">餵新鮮桑葉、保持乾淨、溫柔對待、每天記錄。</text>
</svg>
