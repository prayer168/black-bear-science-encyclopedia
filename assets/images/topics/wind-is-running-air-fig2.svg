<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eaf4fb"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#2a7ab0">熱空氣上升，涼空氣補位</text>

  <!-- sun -->
  <circle cx="230" cy="80" r="30" fill="#ffd24a"/>
  <g stroke="#ffd24a" stroke-width="3"><line x1="230" y1="115" x2="230" y2="135"/><line x1="200" y1="100" x2="188" y2="112"/><line x1="260" y1="100" x2="272" y2="112"/></g>
  <!-- hot ground patch -->
  <rect x="150" y="300" width="160" height="20" fill="#d98a4a"/>
  <text x="230" y="340" text-anchor="middle" font-size="12" fill="#b06a2a">被曬熱的地面</text>
  <!-- cooler ground -->
  <rect x="400" y="300" width="200" height="20" fill="#c9a06a"/>
  <text x="500" y="340" text-anchor="middle" font-size="12" fill="#8a6a3a">較涼的地面</text>

  <!-- hot air rising -->
  <g stroke="#e0785a" stroke-width="4" fill="none">
    <path d="M210 295 q-8 -60 0 -120" marker-end="url(#up)"/>
    <path d="M250 295 q8 -60 0 -120" marker-end="url(#up)"/>
  </g>
  <text x="230" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">熱空氣上升</text>

  <!-- cool air moving in horizontally (wind) -->
  <g stroke="#5a95c8" stroke-width="5" fill="none">
    <path d="M560 280 q-100 -8 -240 0" marker-end="url(#h)"/>
  </g>
  <text x="440" y="260" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a7ab0">涼空氣補位＝風</text>

  <defs>
    <marker id="up" markerWidth="12" markerHeight="12" refX="4" refY="2" orient="auto"><path d="M0 8 L4 0 L8 8 z" fill="#e0785a"/></marker>
    <marker id="h" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#5a95c8"/></marker>
  </defs>

  <text x="350" y="384" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a7ab0">熱空氣往上跑，涼空氣補進來，就颳起風。</text>
</svg>
