<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe2f7"/><stop offset="1" stop-color="#eaf7fb"/>
    </linearGradient>
  </defs>
  <rect width="700" height="400" fill="url(#sky)"/>
  <text x="350" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#2f5b7c">水的旅行：水循環</text>

  <!-- sun -->
  <circle cx="80" cy="80" r="30" fill="#ffd45e"/>
  <text x="80" y="90" text-anchor="middle" font-size="24">☀️</text>

  <!-- mountain -->
  <path d="M420 300 L520 150 L620 300 Z" fill="#a9c48f" stroke="#7fa066" stroke-width="2"/>
  <path d="M500 178 L520 150 L542 180 L525 195 L512 182 Z" fill="#fff"/>

  <!-- sea -->
  <rect x="0" y="300" width="700" height="100" fill="#7fbfe6"/>
  <path d="M0 300 q30 -8 60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0" fill="none" stroke="#5aa3d6" stroke-width="2"/>

  <!-- cloud -->
  <g>
    <ellipse cx="300" cy="110" rx="70" ry="34" fill="#fff"/>
    <ellipse cx="255" cy="120" rx="40" ry="26" fill="#fff"/>
    <ellipse cx="345" cy="120" rx="42" ry="26" fill="#fff"/>
    <text x="300" y="112" text-anchor="middle" font-size="12" fill="#2f7fc1">雲＝小水滴</text>
  </g>

  <!-- rain -->
  <g stroke="#2f7fc1" stroke-width="2.5" stroke-linecap="round">
    <line x1="470" y1="150" x2="464" y2="172"/><line x1="490" y1="152" x2="484" y2="174"/>
    <line x1="510" y1="150" x2="504" y2="172"/><line x1="530" y1="152" x2="524" y2="174"/>
  </g>
  <text x="560" y="165" font-size="13" font-weight="bold" fill="#2f7fc1">降水</text>

  <!-- evaporation arrow -->
  <path d="M140 300 C150 240 200 180 250 140" fill="none" stroke="#e0803a" stroke-width="3" stroke-dasharray="6 5" marker-end="url(#ar)"/>
  <text x="150" y="230" font-size="14" font-weight="bold" fill="#e0803a">蒸發</text>
  <text x="150" y="250" font-size="10" fill="#8a6a3f">（含植物蒸散）</text>

  <!-- condensation label -->
  <path d="M255 140 C300 120 340 118 360 120" fill="none" stroke="#2f7fc1" stroke-width="3" marker-end="url(#ar2)"/>
  <text x="300" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="#2f7fc1">凝結成雲</text>

  <!-- river back to sea -->
  <path d="M520 300 C540 320 560 340 620 345" fill="none" stroke="#5aa3d6" stroke-width="6" stroke-linecap="round"/>
  <text x="590" y="330" font-size="12" fill="#2f5b7c">河流入海</text>

  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 Z" fill="#e0803a"/></marker>
    <marker id="ar2" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 Z" fill="#2f7fc1"/></marker>
  </defs>

  <text x="350" y="392" text-anchor="middle" font-size="12" fill="#2f5b7c">水一直在旅行：上天成雲、落雨、回到海，再被太陽曬得蒸發。</text>
</svg>
