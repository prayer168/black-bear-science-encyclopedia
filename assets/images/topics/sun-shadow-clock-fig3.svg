<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#fdf3e0"/>
  <text x="350" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#a8531e">自製影子時鐘（日晷）</text>

  <!-- ground disc -->
  <ellipse cx="330" cy="250" rx="230" ry="90" fill="#e8dcc0" stroke="#c9a86a" stroke-width="2"/>
  <!-- pole -->
  <rect x="324" y="170" width="12" height="82" rx="2" fill="#8a6a3f"/>
  <ellipse cx="330" cy="252" rx="12" ry="5" fill="#6a4f2f"/>

  <!-- radial shadows with time labels -->
  <g stroke="#7c6a4a" stroke-width="6" opacity="0.6" stroke-linecap="round">
    <line x1="330" y1="250" x2="140" y2="238"/>
    <line x1="330" y1="250" x2="185" y2="290"/>
    <line x1="330" y1="250" x2="300" y2="325"/>
    <line x1="330" y1="250" x2="430" y2="322"/>
    <line x1="330" y1="250" x2="500" y2="285"/>
    <line x1="330" y1="250" x2="525" y2="235"/>
  </g>
  <g font-size="11" fill="#5a4a2a">
    <text x="120" y="234">8 點</text>
    <text x="168" y="308">10 點</text>
    <text x="288" y="342">12 點</text>
    <text x="425" y="340">14 點</text>
    <text x="505" y="300">15 點</text>
    <text x="530" y="230">16 點</text>
  </g>
  <text x="330" y="150" text-anchor="middle" font-size="12" fill="#8a6a3f">晷針（直立竿子）</text>

  <!-- sun -->
  <circle cx="600" cy="70" r="26" fill="#ffd45e"/><text x="600" y="78" text-anchor="middle" font-size="20">☀️</text>

  <!-- safety box -->
  <rect x="30" y="330" width="640" height="55" rx="10" fill="#fbeae6" stroke="#e6c7a8" stroke-width="2"/>
  <text x="350" y="354" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">⚠️ 千萬不可用眼睛直視太陽！只觀察地上的影子</text>
  <text x="350" y="375" text-anchor="middle" font-size="12" fill="#2d2a26">每隔一小時描一次影子的位置與長度 · 戴帽防曬、多喝水</text>
</svg>
