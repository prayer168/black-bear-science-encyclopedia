<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="420" fill="#fffdf9"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">一個完整的電路，燈泡才會亮</text>
  <!-- wire loop -->
  <rect x="150" y="90" width="400" height="230" rx="12" fill="none" stroke="#c0392b" stroke-width="6"/>
  <!-- battery (bottom) -->
  <rect x="300" y="300" width="100" height="40" rx="4" fill="#f4b400" stroke="#c98f00" stroke-width="2"/>
  <text x="350" y="326" text-anchor="middle" font-size="13" fill="#6b4f3a" font-weight="bold">電池</text>
  <text x="308" y="296" font-size="16" fill="#c0392b" font-weight="bold">＋</text>
  <text x="384" y="296" font-size="16" fill="#2f7fc1" font-weight="bold">－</text>
  <!-- bulb (top) -->
  <circle cx="350" cy="90" r="30" fill="#fff2b0" stroke="#c98f00" stroke-width="3"/>
  <path d="M338 100 l6 -22 l6 12 l6 -12 l6 22" fill="none" stroke="#e8743b" stroke-width="2.5"/>
  <rect x="338" y="112" width="24" height="12" rx="2" fill="#9aa4ad"/>
  <!-- glow -->
  <g stroke="#f4b400" stroke-width="3" stroke-linecap="round"><line x1="350" y1="42" x2="350" y2="30"/><line x1="392" y1="60" x2="401" y2="51"/><line x1="308" y1="60" x2="299" y2="51"/></g>
  <text x="350" y="150" text-anchor="middle" font-size="13" fill="#c98f00" font-weight="bold">燈泡（亮）</text>
  <!-- switch (right side, closed) -->
  <circle cx="550" cy="180" r="5" fill="#6b4f3a"/><circle cx="550" cy="230" r="5" fill="#6b4f3a"/>
  <line x1="550" y1="180" x2="550" y2="230" stroke="#c0392b" stroke-width="6"/>
  <text x="565" y="210" font-size="12" fill="#5aa469">開關（接通）</text>
  <!-- electron flow arrows -->
  <defs><marker id="cf" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2f7fc1"/></marker></defs>
  <line x1="230" y1="90" x2="270" y2="90" stroke="#2f7fc1" stroke-width="3" marker-end="url(#cf)"/>
  <line x1="150" y1="230" x2="150" y2="190" stroke="#2f7fc1" stroke-width="3" marker-end="url(#cf)"/>
  <line x1="470" y1="320" x2="430" y2="320" stroke="#2f7fc1" stroke-width="3" marker-end="url(#cf)"/>
  <text x="350" y="230" text-anchor="middle" font-size="13" fill="#2f7fc1">電流繞一圈流動</text>
  <text x="350" y="400" text-anchor="middle" font-size="13" fill="#3f7d4f">電池 → 導線 → 燈泡 → 開關 → 回到電池，繞成一圈就會亮</text>
</svg>
