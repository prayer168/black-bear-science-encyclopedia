<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eef4f7"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#2a7a4a">水草照光冒氧氣泡</text>

  <!-- left cup: bright -->
  <rect x="60" y="70" width="90" height="30" rx="6" fill="#ffe98a"/>
  <text x="105" y="90" text-anchor="middle" font-size="13" fill="#b07a10" font-weight="bold">☀️ 亮處</text>
  <path d="M70 130 L64 320 q0 20 22 20 L164 340 q22 0 22 -20 L180 130 z" fill="#dff0f5" stroke="#88b8c8" stroke-width="2"/>
  <path d="M67 160 L183 160 L177 320 q0 20 -22 20 L86 340 q-22 0 -22 -20 z" fill="#a6d4e4" opacity="0.55"/>
  <!-- water weed -->
  <g stroke="#3a7a2a" stroke-width="4" fill="none"><path d="M125 330 q-8 -60 4 -110 q-6 -30 6 -60"/></g>
  <g fill="#5fa030"><ellipse cx="118" cy="250" rx="10" ry="4" transform="rotate(-30 118 250)"/><ellipse cx="138" cy="220" rx="10" ry="4" transform="rotate(30 138 220)"/><ellipse cx="120" cy="190" rx="10" ry="4" transform="rotate(-30 120 190)"/></g>
  <!-- bubbles many -->
  <g fill="#bfe8f2" stroke="#7fc0d8" stroke-width="1"><circle cx="140" cy="180" r="5"/><circle cx="148" cy="160" r="4"/><circle cx="138" cy="145" r="5"/><circle cx="150" cy="125" r="4"/><circle cx="142" cy="205" r="4"/><circle cx="152" cy="230" r="3"/></g>
  <text x="120" y="365" text-anchor="middle" font-size="13" fill="#2a7a4a" font-weight="bold">冒泡多（氧氣）</text>

  <!-- right cup: dark -->
  <rect x="500" y="70" width="120" height="30" rx="6" fill="#555"/>
  <text x="560" y="90" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">🌙 暗處（遮光）</text>
  <path d="M500 130 L494 320 q0 20 22 20 L594 340 q22 0 22 -20 L630 130 z" fill="#dfe4e8" stroke="#88b8c8" stroke-width="2"/>
  <path d="M497 160 L633 160 L627 320 q0 20 -22 20 L516 340 q-22 0 -22 -20 z" fill="#9aabb4" opacity="0.5"/>
  <g stroke="#3a6a2a" stroke-width="4" fill="none"><path d="M560 330 q-8 -60 4 -110 q-6 -30 6 -60"/></g>
  <g fill="#4a7a28"><ellipse cx="553" cy="250" rx="10" ry="4" transform="rotate(-30 553 250)"/><ellipse cx="573" cy="220" rx="10" ry="4" transform="rotate(30 573 220)"/><ellipse cx="555" cy="190" rx="10" ry="4" transform="rotate(-30 555 190)"/></g>
  <text x="560" y="365" text-anchor="middle" font-size="13" fill="#5a6a6a" font-weight="bold">幾乎不冒泡</text>

  <!-- vs -->
  <text x="350" y="230" text-anchor="middle" font-size="26" font-weight="bold" fill="#c0803a">VS</text>

  <text x="350" y="392" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a7a4a">有光才冒泡，泡泡裡是氧氣——光合作用需要光。</text>
</svg>
