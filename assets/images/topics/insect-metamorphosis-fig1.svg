<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="360" fill="#eef8ee"/>
  <text x="350" y="34" text-anchor="middle" font-size="21" font-weight="bold" fill="#6b4f3a">完全變態：卵 → 幼蟲 → 蛹 → 成蟲</text>
  <defs><marker id="m1" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5aa469"/></marker></defs>
  <!-- egg -->
  <circle cx="90" cy="150" r="26" fill="#fff2b0" stroke="#e0d38a" stroke-width="2"/>
  <ellipse cx="90" cy="150" rx="8" ry="12" fill="#f4e0a0"/>
  <text x="90" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#2d2a26">卵</text>
  <!-- larva (caterpillar) -->
  <g><ellipse cx="230" cy="150" rx="34" ry="14" fill="#5aa469"/><circle cx="200" cy="150" r="10" fill="#3f7d4f"/><circle cx="230" cy="150" r="12" fill="#6fbf7a"/><circle cx="255" cy="150" r="10" fill="#6fbf7a"/></g>
  <text x="230" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#2d2a26">幼蟲（毛毛蟲）</text>
  <!-- pupa -->
  <ellipse cx="380" cy="150" rx="18" ry="34" fill="#8a6a3a"/>
  <path d="M380 120 q6 30 0 60 M368 135 h24 M368 155 h24" stroke="#6b4a2a" stroke-width="1.5" fill="none"/>
  <text x="380" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#2d2a26">蛹</text>
  <!-- adult butterfly -->
  <g>
    <path d="M540 150 q-30 -28 -44 -6 q14 18 44 8 z" fill="#e8743b"/>
    <path d="M540 150 q30 -28 44 -6 q-14 18 -44 8 z" fill="#e8743b"/>
    <path d="M540 150 q-26 24 -38 42 q22 -6 38 -30 z" fill="#f4a24a"/>
    <path d="M540 150 q26 24 38 42 q-22 -6 -38 -30 z" fill="#f4a24a"/>
    <line x1="540" y1="130" x2="540" y2="180" stroke="#2d2a26" stroke-width="3"/>
  </g>
  <text x="540" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#2d2a26">成蟲（蝴蝶）</text>
  <!-- arrows -->
  <g stroke="#5aa469" stroke-width="3">
    <line x1="120" y1="150" x2="188" y2="150" marker-end="url(#m1)"/>
    <line x1="270" y1="150" x2="356" y2="150" marker-end="url(#m1)"/>
    <line x1="402" y1="150" x2="486" y2="150" marker-end="url(#m1)"/>
  </g>
  <text x="350" y="290" text-anchor="middle" font-size="13" fill="#c0392b">有「蛹」這一階段，長相變化超大！蝴蝶、甲蟲、蒼蠅、螞蟻都是</text>
  <text x="350" y="318" text-anchor="middle" font-size="12" fill="#3f7d4f">幼蟲和成蟲吃的東西、住的地方常常完全不同</text>
</svg>
