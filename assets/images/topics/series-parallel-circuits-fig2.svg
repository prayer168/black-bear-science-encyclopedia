<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#f2f2ee"/>
  <text x="350" y="32" text-anchor="middle" font-size="21" font-weight="bold" fill="#3a5a7a">亮度與拔燈泡的差別</text>

  <!-- header row -->
  <rect x="30" y="55" width="180" height="40" fill="#dfe6ee"/>
  <rect x="210" y="55" width="230" height="40" fill="#fdf2e6"/>
  <rect x="440" y="55" width="230" height="40" fill="#eaf4ef"/>
  <text x="120" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#3a5a7a">項目</text>
  <text x="325" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#b07020">串聯</text>
  <text x="555" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#2a7a5a">並聯</text>

  <!-- row1: brightness -->
  <rect x="30" y="95" width="180" height="120" fill="#eef2f6" stroke="#ccc"/>
  <rect x="210" y="95" width="230" height="120" fill="#fff" stroke="#ccc"/>
  <rect x="440" y="95" width="230" height="120" fill="#fff" stroke="#ccc"/>
  <text x="120" y="160" text-anchor="middle" font-size="14" fill="#3a5a7a">亮度</text>
  <circle cx="290" cy="150" r="20" fill="#d8c26a" stroke="#b0902a" stroke-width="2"/>
  <circle cx="360" cy="150" r="20" fill="#d8c26a" stroke="#b0902a" stroke-width="2"/>
  <text x="325" y="200" text-anchor="middle" font-size="13" fill="#b07020">比較暗</text>
  <circle cx="520" cy="150" r="20" fill="#ffe645" stroke="#c0902a" stroke-width="2"/>
  <circle cx="590" cy="150" r="20" fill="#ffe645" stroke="#c0902a" stroke-width="2"/>
  <g stroke="#f0c020" stroke-width="2"><line x1="520" y1="122" x2="520" y2="112"/><line x1="590" y1="122" x2="590" y2="112"/></g>
  <text x="555" y="200" text-anchor="middle" font-size="13" fill="#2a7a5a">比較亮</text>

  <!-- row2: remove one bulb -->
  <rect x="30" y="215" width="180" height="130" fill="#eef2f6" stroke="#ccc"/>
  <rect x="210" y="215" width="230" height="130" fill="#fff" stroke="#ccc"/>
  <rect x="440" y="215" width="230" height="130" fill="#fff" stroke="#ccc"/>
  <text x="120" y="275" text-anchor="middle" font-size="14" fill="#3a5a7a">拔掉一顆</text>
  <text x="120" y="295" text-anchor="middle" font-size="14" fill="#3a5a7a">另一顆</text>
  <!-- series: both off -->
  <circle cx="290" cy="285" r="18" fill="#b8b8b8" stroke="#888" stroke-width="2"/>
  <line x1="278" y1="273" x2="302" y2="297" stroke="#c0402a" stroke-width="3"/><line x1="302" y1="273" x2="278" y2="297" stroke="#c0402a" stroke-width="3"/>
  <circle cx="360" cy="285" r="18" fill="#b8b8b8" stroke="#888" stroke-width="2"/>
  <text x="325" y="330" text-anchor="middle" font-size="13" fill="#c0402a">全部熄滅 ✗</text>
  <!-- parallel: one off one on -->
  <circle cx="520" cy="285" r="18" fill="#b8b8b8" stroke="#888" stroke-width="2"/>
  <line x1="508" y1="273" x2="532" y2="297" stroke="#c0402a" stroke-width="3"/><line x1="532" y1="273" x2="508" y2="297" stroke="#c0402a" stroke-width="3"/>
  <circle cx="590" cy="285" r="18" fill="#ffe645" stroke="#c0902a" stroke-width="2"/>
  <g stroke="#f0c020" stroke-width="2"><line x1="590" y1="261" x2="590" y2="253"/></g>
  <text x="555" y="330" text-anchor="middle" font-size="13" fill="#2a7a5a">另一顆仍亮 ✓</text>

  <text x="350" y="384" text-anchor="middle" font-size="14" font-weight="bold" fill="#3a5a7a">並聯較亮、拔一顆其他還亮；串聯較暗、一斷全熄。</text>
</svg>
