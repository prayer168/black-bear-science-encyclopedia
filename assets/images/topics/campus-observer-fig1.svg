<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="420" fill="#eef8ee"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">科學觀察：用五官＋工具仔細看</text>
  <!-- center magnifier -->
  <circle cx="350" cy="210" r="70" fill="#fff" stroke="#6b4f3a" stroke-width="6"/>
  <line x1="400" y1="260" x2="440" y2="300" stroke="#6b4f3a" stroke-width="12" stroke-linecap="round"/>
  <text x="350" y="200" text-anchor="middle" font-size="30">🐞</text>
  <text x="350" y="228" text-anchor="middle" font-size="12" fill="#5aa469">仔細觀察</text>
  <!-- five senses around -->
  <g font-size="13" text-anchor="middle" fill="#2d2a26">
    <circle cx="160" cy="110" r="34" fill="#fdece2"/><text x="160" y="105" font-size="22">👁️</text><text x="160" y="128">看（顏色形狀）</text>
    <circle cx="540" cy="110" r="34" fill="#e4f0fa"/><text x="540" y="105" font-size="22">👂</text><text x="540" y="128">聽（聲音）</text>
    <circle cx="120" cy="290" r="34" fill="#e5f2ea"/><text x="120" y="285" font-size="22">👃</text><text x="120" y="308">聞（氣味）</text>
    <circle cx="580" cy="290" r="34" fill="#f0e8fa"/><text x="580" y="285" font-size="22">✋</text><text x="580" y="308">摸（觸感）</text>
    <circle cx="350" cy="360" r="30" fill="#fff8e6"/><text x="350" y="356" font-size="20">📏</text><text x="350" y="380">量（工具測量）</text>
  </g>
  <text x="350" y="70" text-anchor="middle" font-size="13" fill="#c0392b">安全提醒：不隨便嚐、不摸不明或危險的東西</text>
</svg>
