<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eaf2f7"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#2a6a9a">回聲是聲音的反彈</text>

  <!-- ground -->
  <rect x="0" y="330" width="700" height="70" fill="#a8c878"/>
  <!-- person left -->
  <circle cx="90" cy="235" r="24" fill="#f2c79a"/>
  <rect x="72" y="258" width="36" height="60" rx="10" fill="#e08a5a"/>
  <path d="M108 200 q22 -8 30 -2" stroke="#7a5230" stroke-width="3" fill="none"/>
  <text x="90" y="200" text-anchor="middle" font-size="13" fill="#7a5230">喊：「你好」</text>

  <!-- cliff right -->
  <rect x="560" y="120" width="140" height="210" fill="#9a8b74"/>
  <path d="M560 120 l20 30 l-20 40 l24 40 l-24 40 l20 60" fill="#8a7b64"/>
  <text x="628" y="110" text-anchor="middle" font-size="14" fill="#6a5b48" font-weight="bold">大岩壁</text>

  <!-- outgoing waves -->
  <g fill="none" stroke="#e08a3a" stroke-width="3">
    <path d="M150 230 q40 -30 80 0"/>
    <path d="M150 230 q60 -45 120 0"/>
    <path d="M150 230 q80 -60 160 0"/>
  </g>
  <text x="250" y="175" font-size="14" fill="#d0791a" font-weight="bold">聲音去 →</text>

  <!-- returning waves -->
  <g fill="none" stroke="#3a8ad0" stroke-width="3">
    <path d="M540 285 q-40 30 -80 0"/>
    <path d="M540 285 q-60 45 -120 0"/>
    <path d="M540 285 q-80 60 -160 0"/>
  </g>
  <text x="430" y="345" font-size="14" fill="#2a6aa0" font-weight="bold">← 反彈回（回聲）</text>

  <text x="350" y="392" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a6a9a">聲音撞到大岩壁彈回來，就是回聲；來回要時間，越遠越慢。</text>
</svg>
