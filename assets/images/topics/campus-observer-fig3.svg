<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="420" fill="#eaf5ff"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">自然觀察日誌怎麼記</text>
  <!-- notebook -->
  <rect x="90" y="60" width="520" height="330" rx="10" fill="#fff" stroke="#c9b99a" stroke-width="3"/>
  <line x1="160" y1="60" x2="160" y2="390" stroke="#e0a0a0" stroke-width="2"/>
  <g stroke="#dfd6c4" stroke-width="1"><line x1="170" y1="110" x2="590" y2="110"/><line x1="170" y1="150" x2="590" y2="150"/><line x1="170" y1="190" x2="590" y2="190"/><line x1="170" y1="230" x2="590" y2="230"/><line x1="170" y1="300" x2="590" y2="300"/></g>
  <!-- holes -->
  <circle cx="125" cy="120" r="6" fill="#eaf5ff" stroke="#c9b99a"/><circle cx="125" cy="230" r="6" fill="#eaf5ff" stroke="#c9b99a"/><circle cx="125" cy="330" r="6" fill="#eaf5ff" stroke="#c9b99a"/>
  <text x="180" y="100" font-size="14" fill="#2d2a26">📅 日期／時間：＿＿＿＿</text>
  <text x="180" y="140" font-size="14" fill="#2d2a26">📍 地點／天氣：＿＿＿＿</text>
  <text x="180" y="180" font-size="14" fill="#2d2a26">👁️ 我看到（畫下來＋文字）：</text>
  <rect x="400" y="120" width="160" height="90" rx="6" fill="#f6f9f0" stroke="#cde8cd" stroke-dasharray="4 3"/>
  <text x="480" y="170" text-anchor="middle" font-size="12" fill="#8a9a7a">觀察小圖區</text>
  <text x="180" y="260" font-size="14" fill="#2d2a26">📏 數量／大小：＿＿＿＿</text>
  <text x="180" y="290" font-size="14" fill="#8a56c2">🤔 我的推論／新問題：＿＿</text>
  <text x="180" y="335" font-size="13" fill="#5aa469">💡 好習慣：只記「看到的」，猜測寫在推論欄，並註明日期</text>
  <text x="180" y="365" font-size="13" fill="#c0392b">👀 用眼睛觀察，不採摘、不打擾動植物</text>
</svg>
