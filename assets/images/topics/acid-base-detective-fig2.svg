<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="380" fill="#eef8ee"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">紫甘藍汁：天然的酸鹼偵探</text>
  <!-- three beakers -->
  <g>
    <!-- acid: red/pink -->
    <path d="M110 130 L190 130 L180 250 L120 250 Z" fill="#f4a0b0" stroke="#c0392b" stroke-width="2"/>
    <ellipse cx="150" cy="130" rx="40" ry="8" fill="#e88098"/>
    <text x="150" y="200" text-anchor="middle" font-size="13" fill="#8a2030" font-weight="bold">加酸</text>
    <text x="150" y="275" text-anchor="middle" font-size="12" fill="#c0392b">變紅／粉紅</text>
    <text x="150" y="295" text-anchor="middle" font-size="11" fill="#6f6a63">（檸檬汁、醋）</text>
    <!-- neutral: purple -->
    <path d="M310 130 L390 130 L380 250 L320 250 Z" fill="#a878c0" stroke="#6f3fb0" stroke-width="2"/>
    <ellipse cx="350" cy="130" rx="40" ry="8" fill="#9868b0"/>
    <text x="350" y="200" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">中性</text>
    <text x="350" y="275" text-anchor="middle" font-size="12" fill="#6f3fb0">維持紫色</text>
    <text x="350" y="295" text-anchor="middle" font-size="11" fill="#6f6a63">（純水）</text>
    <!-- base: green/yellow -->
    <path d="M510 130 L590 130 L580 250 L520 250 Z" fill="#a8d060" stroke="#5a8a20" stroke-width="2"/>
    <ellipse cx="550" cy="130" rx="40" ry="8" fill="#98c050"/>
    <text x="550" y="200" text-anchor="middle" font-size="13" fill="#3a5a10" font-weight="bold">加鹼</text>
    <text x="550" y="275" text-anchor="middle" font-size="12" fill="#5a8a20">變綠／黃</text>
    <text x="550" y="295" text-anchor="middle" font-size="11" fill="#6f6a63">（小蘇打、肥皂）</text>
  </g>
  <text x="350" y="335" text-anchor="middle" font-size="13" fill="#c0392b">同一杯紫甘藍汁，遇到不同水溶液會變出不同顏色！</text>
</svg>
