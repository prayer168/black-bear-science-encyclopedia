<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="380" fill="#eef8ee"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">磁鐵的兩極：同極相斥、異極相吸</text>
  <line x1="350" y1="55" x2="350" y2="330" stroke="#e7ddcd" stroke-width="2" stroke-dasharray="6 6"/>
  <!-- attract (異極相吸) -->
  <text x="175" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#5aa469">異極相吸（N–S）</text>
  <g>
    <rect x="70" y="150" width="40" height="50" fill="#c0392b"/><rect x="110" y="150" width="40" height="50" fill="#2f7fc1"/>
    <text x="90" y="182" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">N</text><text x="130" y="182" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">S</text>
    <rect x="200" y="150" width="40" height="50" fill="#c0392b"/><rect x="240" y="150" width="40" height="50" fill="#2f7fc1"/>
    <text x="220" y="182" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">N</text><text x="260" y="182" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">S</text>
  </g>
  <defs>
    <marker id="at" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5aa469"/></marker>
  </defs>
  <line x1="160" y1="215" x2="185" y2="215" stroke="#5aa469" stroke-width="3" marker-end="url(#at)"/>
  <line x1="190" y1="230" x2="165" y2="230" stroke="#5aa469" stroke-width="3" marker-end="url(#at)"/>
  <text x="175" y="260" text-anchor="middle" font-size="13" fill="#5aa469" font-weight="bold">互相吸過去 →←</text>

  <!-- repel (同極相斥) -->
  <text x="525" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#c0392b">同極相斥（N–N）</text>
  <g>
    <rect x="420" y="150" width="40" height="50" fill="#2f7fc1"/><rect x="460" y="150" width="40" height="50" fill="#c0392b"/>
    <text x="440" y="182" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">S</text><text x="480" y="182" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">N</text>
    <rect x="550" y="150" width="40" height="50" fill="#c0392b"/><rect x="590" y="150" width="40" height="50" fill="#2f7fc1"/>
    <text x="570" y="182" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">N</text><text x="610" y="182" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">S</text>
  </g>
  <defs><marker id="rp" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#c0392b"/></marker></defs>
  <line x1="510" y1="215" x2="485" y2="215" stroke="#c0392b" stroke-width="3" marker-end="url(#rp)"/>
  <line x1="540" y1="230" x2="565" y2="230" stroke="#c0392b" stroke-width="3" marker-end="url(#rp)"/>
  <text x="525" y="260" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="bold">互相推開 ←→</text>

  <text x="350" y="315" text-anchor="middle" font-size="13" fill="#6b4f3a">每個磁鐵都有 N 極和 S 極，就算切成兩半也還是有兩極</text>
</svg>
