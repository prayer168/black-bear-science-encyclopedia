<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#e8f4f7"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#2a8a9a">水面像一層彈性膜</text>

  <!-- water body -->
  <rect x="60" y="230" width="580" height="120" fill="#bfe4ef"/>
  <!-- surface line dipping under each leg -->
  <path d="M60 230 H190 q10 22 26 0 q60 0 60 0 q10 22 26 0 q60 0 60 0 q10 22 26 0 H640"
        fill="none" stroke="#5aa8bf" stroke-width="4"/>
  <!-- water strider body -->
  <ellipse cx="350" cy="180" rx="40" ry="10" fill="#7a6a4a" stroke="#5a4a30" stroke-width="2"/>
  <circle cx="308" cy="178" r="7" fill="#5a4a30"/>
  <!-- legs spread wide reaching the dips -->
  <g stroke="#5a4a30" stroke-width="2.5" fill="none">
    <path d="M320 184 Q250 210 216 232"/>
    <path d="M338 188 Q320 214 302 232"/>
    <path d="M362 188 Q380 214 398 232"/>
    <path d="M380 184 Q450 210 484 232"/>
    <path d="M330 186 Q300 220 260 232"/>
    <path d="M370 186 Q400 220 440 232"/>
  </g>
  <!-- antennae -->
  <line x1="305" y1="176" x2="285" y2="164" stroke="#5a4a30" stroke-width="2"/>

  <text x="350" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a8a9a">水黽</text>
  <text x="540" y="215" font-size="13" fill="#c0392b">腳下水面凹陷·沒破</text>
  <path d="M500 220 q-10 12 -16 18" stroke="#c0392b" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0 0 L6 4 L0 8 z" fill="#c0392b"/></marker></defs>
  <text x="150" y="300" font-size="13" fill="#3a7a8a">表面張力＝像彈性膜</text>

  <text x="350" y="384" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a8a9a">水面像彈簧墊，把水黽輕輕撐住。</text>
</svg>
