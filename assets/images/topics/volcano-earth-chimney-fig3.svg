<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#f2ece2"/>
  <text x="350" y="30" text-anchor="middle" font-size="21" font-weight="bold" fill="#a04530">火山的危險與禮物</text>
  <line x1="350" y1="52" x2="350" y2="345" stroke="#ddd0c0" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- LEFT: danger -->
  <text x="175" y="76" text-anchor="middle" font-size="16" font-weight="bold" fill="#c0392b">危險</text>
  <path d="M70 200 L150 90 L175 90 L255 200 Z" fill="#7a5a44" stroke="#5a4030"/>
  <path d="M150 90 q-24 40 -40 100" stroke="#e0521e" stroke-width="8" fill="none" stroke-linecap="round"/>
  <g fill="#9a9a94" opacity="0.8"><circle cx="162" cy="70" r="18"/><circle cx="185" cy="80" r="14"/></g>
  <text x="120" y="230" text-anchor="middle" font-size="12" fill="#c0392b">熔岩·火山灰</text>
  <!-- evacuate person -->
  <g transform="translate(200,240)"><circle cx="0" cy="0" r="8" fill="#3a5a8a"/><rect x="-5" y="8" width="10" height="20" fill="#3a5a8a"/><path d="M20 10 h20" stroke="#c0392b" stroke-width="2" marker-end="url(#a)"/></g>
  <text x="175" y="300" text-anchor="middle" font-size="12" fill="#a03030">遠離·撤離</text>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0 0 L6 4 L0 8 z" fill="#c0392b"/></marker></defs>

  <!-- RIGHT: gifts -->
  <text x="525" y="76" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f9d55">禮物</text>
  <!-- hot spring -->
  <ellipse cx="440" cy="130" rx="40" ry="14" fill="#a8dceb" stroke="#6aa8c0"/>
  <path d="M425 118 q4 -12 0 -20 M440 116 q4 -12 0 -20 M455 118 q4 -12 0 -20" stroke="#c0c0c0" stroke-width="2" fill="none" opacity="0.7"/>
  <text x="440" y="160" text-anchor="middle" font-size="11" fill="#3a7a8a">溫泉</text>
  <!-- geothermal power -->
  <g transform="translate(560,110)"><rect x="-14" y="0" width="28" height="34" fill="#c0c0c0" stroke="#888"/><path d="M-8 0 q4 -16 8 0" stroke="#aaa" stroke-width="3" fill="none"/></g>
  <text x="560" y="160" text-anchor="middle" font-size="11" fill="#3a7a5a">地熱發電</text>
  <!-- fertile field -->
  <rect x="405" y="220" width="80" height="40" fill="#8fce6f"/>
  <g stroke="#5a9a3a" stroke-width="2"><line x1="420" y1="260" x2="420" y2="240"/><line x1="440" y1="260" x2="440" y2="238"/><line x1="460" y1="260" x2="460" y2="240"/></g>
  <text x="445" y="285" text-anchor="middle" font-size="11" fill="#4a7a3a">肥沃土壤</text>
  <!-- basalt columns -->
  <g transform="translate(540,215)"><rect x="0" y="0" width="14" height="45" fill="#4a4a52"/><rect x="15" y="-6" width="14" height="51" fill="#5a5a62"/><rect x="30" y="4" width="14" height="41" fill="#4a4a52"/></g>
  <text x="565" y="285" text-anchor="middle" font-size="11" fill="#555">柱狀玄武岩</text>

  <text x="350" y="384" text-anchor="middle" font-size="14" font-weight="bold" fill="#a04530">火山有威力也有恩惠——要認識它、尊重它。</text>
</svg>
