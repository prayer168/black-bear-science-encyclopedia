<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eef3f6"/>
  <text x="350" y="30" text-anchor="middle" font-size="21" font-weight="bold" fill="#2a5a8a">超音波與回聲定位的應用</text>

  <!-- panel bat -->
  <rect x="20" y="50" width="320" height="150" rx="10" fill="#eae4f2" stroke="#8a6ab0" stroke-width="2"/>
  <text x="60" y="74" font-size="14" font-weight="bold" fill="#6a4a90">🦇 蝙蝠</text>
  <path d="M70 130 q-14 -18 -30 -6 q10 -20 30 -12 q20 -8 30 12 q-16 -12 -30 6z" fill="#5a4a6a"/>
  <g fill="none" stroke="#c07ad0" stroke-width="2.5"><path d="M100 125 q20 -12 40 0"/><path d="M100 125 q34 -20 68 0"/></g>
  <circle cx="290" cy="125" r="10" fill="#7bb046"/>
  <g fill="none" stroke="#5a9ac8" stroke-width="2.5"><path d="M270 140 q-20 12 -40 0"/></g>
  <text x="180" y="190" text-anchor="middle" font-size="12" fill="#6a4a90">發超音波 → 遇蟲反彈 → 回聲定位</text>

  <!-- panel dolphin -->
  <rect x="360" y="50" width="320" height="150" rx="10" fill="#dff0f5" stroke="#3a9ac8" stroke-width="2"/>
  <text x="400" y="74" font-size="14" font-weight="bold" fill="#1a7a9a">🐬 海豚</text>
  <rect x="370" y="90" width="300" height="100" fill="#a6d4e4" opacity="0.5"/>
  <path d="M400 140 q30 -22 66 -6 q12 6 20 -4 q-6 24 -26 20 q-34 8 -60 -10z" fill="#5a8ab0"/>
  <g fill="none" stroke="#1a7a9a" stroke-width="2.5"><path d="M470 130 q18 -10 36 0"/><path d="M470 130 q30 -18 60 0"/></g>
  <ellipse cx="620" cy="135" rx="14" ry="9" fill="#e0a040"/>
  <text x="520" y="190" text-anchor="middle" font-size="12" fill="#1a7a9a">水中發聲 → 找魚、避障</text>

  <!-- panel sonar -->
  <rect x="20" y="215" width="320" height="150" rx="10" fill="#e6eff7" stroke="#3a7ac0" stroke-width="2"/>
  <text x="60" y="239" font-size="14" font-weight="bold" fill="#2a5a9a">🚢 聲納測海深</text>
  <rect x="30" y="255" width="300" height="100" fill="#a6c4e4" opacity="0.5"/>
  <path d="M90 258 l50 0 l-8 16 l-34 0z" fill="#8a5a34"/>
  <g fill="none" stroke="#2a5a9a" stroke-width="2.5"><path d="M115 278 q-12 20 0 40"/><path d="M115 278 q-22 34 0 68"/></g>
  <path d="M30 340 q80 -12 160 6 q80 12 140 0 L330 355 L30 355z" fill="#7a6248"/>
  <ellipse cx="230" cy="320" rx="16" ry="10" fill="#e0a040"/>
  <text x="180" y="352" text-anchor="middle" font-size="11" fill="#fff">量回聲時間 → 算海深、找魚群</text>

  <!-- panel medical -->
  <rect x="360" y="215" width="320" height="150" rx="10" fill="#f7ecef" stroke="#c86a8a" stroke-width="2"/>
  <text x="400" y="239" font-size="14" font-weight="bold" fill="#a04a6a">🏥 醫院超音波</text>
  <ellipse cx="480" cy="305" rx="60" ry="46" fill="#f2c79a"/>
  <circle cx="480" cy="310" r="20" fill="#e0a878"/>
  <path d="M478 300 q6 -6 12 0 q-2 8 -6 10 q-6 -2 -6 -10z" fill="#c98a5a"/>
  <rect x="546" y="270" width="16" height="26" rx="4" fill="#888"/>
  <g fill="none" stroke="#c86a8a" stroke-width="2.5"><path d="M540 296 q-14 8 -28 4"/><path d="M544 305 q-18 12 -38 6"/></g>
  <text x="560" y="352" text-anchor="middle" font-size="11" fill="#a04a6a">超音波看肚裡寶寶</text>

  <text x="350" y="388" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a5a8a">發出聲音、聽反彈，就能「用聲音看東西」。</text>
</svg>
