<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eaf5fb"/>
  <text x="350" y="32" text-anchor="middle" font-size="21" font-weight="bold" fill="#2a6a9a">用量筒讀凹液面</text>

  <!-- graduated cylinder (large, center) -->
  <path d="M300 80 L300 300 q0 14 16 14 L384 314 q16 0 16 -14 L400 80 z" fill="#eaf6fb" stroke="#88b8c8" stroke-width="3"/>
  <path d="M300 80 L400 80" stroke="#88b8c8" stroke-width="3"/>
  <!-- water -->
  <path d="M300 180 L400 180 L400 300 q0 14 -16 14 L316 314 q-16 0 -16 -14 z" fill="#a6d4e4" opacity="0.7"/>
  <!-- concave meniscus -->
  <path d="M300 180 q50 22 100 0" fill="#eaf6fb"/>
  <path d="M300 180 q50 22 100 0" fill="none" stroke="#5a9ac8" stroke-width="2"/>
  <!-- scale ticks -->
  <g stroke="#5a9ac8" stroke-width="1.5"><line x1="400" y1="150" x2="412" y2="150"/><line x1="400" y1="190" x2="416" y2="190"/><line x1="400" y1="230" x2="412" y2="230"/></g>
  <text x="424" y="194" font-size="12" fill="#2a6a9a" font-weight="bold">50 mL</text>

  <!-- correct eye level (aligned to lowest of meniscus ~192) -->
  <circle cx="180" cy="192" r="14" fill="#fff" stroke="#2a7a4a" stroke-width="2.5"/><circle cx="184" cy="192" r="5" fill="#2a7a4a"/>
  <line x1="196" y1="192" x2="348" y2="192" stroke="#2a7a4a" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="150" y="180" text-anchor="middle" font-size="13" fill="#2a7a4a" font-weight="bold">平視 ✓</text>
  <text x="150" y="210" text-anchor="middle" font-size="11" fill="#2a7a4a">對齊最低處</text>

  <!-- wrong: over view -->
  <circle cx="560" cy="120" r="12" fill="#fff" stroke="#c04040" stroke-width="2"/><circle cx="556" cy="123" r="4" fill="#c04040"/>
  <line x1="550" y1="128" x2="352" y2="185" stroke="#c04040" stroke-width="1.8" stroke-dasharray="4 3"/>
  <text x="590" y="120" text-anchor="middle" font-size="12" fill="#b04a4a">俯視</text>
  <text x="600" y="138" text-anchor="middle" font-size="10" fill="#b04a4a">偏大✗</text>

  <!-- wrong: under view -->
  <circle cx="560" cy="265" r="12" fill="#fff" stroke="#c04040" stroke-width="2"/><circle cx="556" cy="262" r="4" fill="#c04040"/>
  <line x1="550" y1="258" x2="352" y2="200" stroke="#c04040" stroke-width="1.8" stroke-dasharray="4 3"/>
  <text x="590" y="270" text-anchor="middle" font-size="12" fill="#b04a4a">仰視</text>
  <text x="600" y="288" text-anchor="middle" font-size="10" fill="#b04a4a">偏小✗</text>

  <text x="350" y="368" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a6a9a">眼睛對齊凹下去的最低處平視，才讀得準。</text>
  <text x="350" y="390" text-anchor="middle" font-size="11" fill="#5a8ab0">（水面會沿筒壁往上爬，中間凹下）</text>
</svg>
