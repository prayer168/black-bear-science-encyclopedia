<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eaf4e4"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#4a7030">土壤是生命的家與養分循環</text>

  <!-- sky and ground -->
  <rect x="0" y="230" width="700" height="170" fill="#a9754a"/>
  <path d="M0 230 q60 -10 120 0 q60 10 120 0 q60 -10 120 0 q60 10 120 0 q60 -10 120 0 q40 6 60 0 L700 230 L700 400 L0 400 z" fill="#7a5230"/>
  <rect x="0" y="300" width="700" height="100" fill="#8a5a34"/>

  <!-- plant -->
  <line x1="350" y1="240" x2="350" y2="130" stroke="#4a7030" stroke-width="8"/>
  <ellipse cx="350" cy="110" rx="60" ry="40" fill="#6ba03a"/>
  <ellipse cx="310" cy="130" rx="34" ry="24" fill="#7bb046"/>
  <ellipse cx="392" cy="128" rx="34" ry="24" fill="#5f9432"/>
  <!-- roots -->
  <g stroke="#8a5a34" stroke-width="4" fill="none">
    <path d="M350 240 q-20 30 -50 60 q-14 20 -24 44"/>
    <path d="M350 240 q20 30 50 60 q14 20 24 44"/>
    <path d="M350 245 q0 40 -6 90"/>
  </g>
  <text x="350" y="360" text-anchor="middle" font-size="12" fill="#f4e6d2" font-weight="bold">根扎進土、吸水吸養分</text>

  <!-- earthworm & ant in soil -->
  <path d="M120 300 q24 -16 44 -4 q16 10 32 2" fill="none" stroke="#c56a7a" stroke-width="10" stroke-linecap="round"/>
  <text x="150" y="340" text-anchor="middle" font-size="11" fill="#fff">蚯蚓幫忙分解</text>
  <circle cx="560" cy="320" r="7" fill="#5a3d1a"/><circle cx="572" cy="322" r="9" fill="#5a3d1a"/>
  <text x="565" y="350" text-anchor="middle" font-size="11" fill="#fff">土裡的小生物</text>

  <!-- falling leaves -->
  <path d="M180 150 q12 -10 26 -2 q-4 14 -18 14 q-10 -4 -8 -12 z" fill="#c99a3a" stroke="#8a6420" stroke-width="1"/>
  <path d="M220 190 q12 -10 26 -2 q-4 14 -18 14 q-10 -4 -8 -12 z" fill="#b98833" stroke="#8a6420" stroke-width="1"/>
  <text x="160" y="130" font-size="12" fill="#8a6420" font-weight="bold">落葉掉落</text>

  <!-- cycle arrows -->
  <g fill="none" stroke="#4a7030" stroke-width="3">
    <path d="M240 170 q-40 60 -60 120" marker-end="url(#g)"/>
    <path d="M150 320 q60 -30 130 -40" marker-end="url(#g)"/>
  </g>
  <defs><marker id="g" markerWidth="12" markerHeight="12" refX="4" refY="4" orient="auto"><path d="M0 8 L8 4 L0 0 z" fill="#4a7030"/></marker></defs>
  <text x="120" y="250" font-size="12" fill="#4a7030" font-weight="bold">分解成腐植質</text>
  <text x="250" y="300" font-size="12" fill="#f4e6d2" font-weight="bold">→養分回到土給植物</text>

  <text x="350" y="392" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a7030">土壤養育植物、住著小生物，還把落葉變成養分，形成循環。</text>
</svg>
