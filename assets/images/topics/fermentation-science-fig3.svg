<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#fbf3e6"/>
  <text x="350" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#b06a1e">溫度影響發酵——酵母吹氣球</text>

  <!-- three setups -->
  <!-- cold -->
  <g transform="translate(120,0)">
    <text x="0" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a6ab0">冰水·氣球扁</text>
    <ellipse cx="0" cy="110" rx="20" ry="12" fill="#e8e8e8" stroke="#bbb"/>
    <rect x="-14" y="120" width="28" height="70" rx="6" fill="#dbeefb" stroke="#7fb0d6"/>
    <rect x="-40" y="200" width="80" height="40" rx="6" fill="#bfe4ef" stroke="#7fb0d6"/>
    <g fill="#8fbfe0"><circle cx="-20" cy="220" r="4"/><circle cx="20" cy="215" r="4"/></g>
    <text x="0" y="262" text-anchor="middle" font-size="11" fill="#3a7a9a">太冷·很慢</text>
  </g>
  <!-- warm -->
  <g transform="translate(350,0)">
    <text x="0" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f9d55">溫水·氣球最大</text>
    <ellipse cx="0" cy="95" rx="42" ry="48" fill="#f2a0b8" stroke="#d06888" stroke-width="2"/>
    <rect x="-14" y="140" width="28" height="50" rx="6" fill="#f7e0c0" stroke="#c0a060"/>
    <rect x="-40" y="200" width="80" height="40" rx="6" fill="#f0d0a0" stroke="#c09030"/>
    <text x="0" y="262" text-anchor="middle" font-size="11" fill="#c07020">溫溫的·最旺</text>
  </g>
  <!-- hot -->
  <g transform="translate(580,0)">
    <text x="0" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">滾水·氣球扁</text>
    <ellipse cx="0" cy="110" rx="20" ry="12" fill="#e8e8e8" stroke="#bbb"/>
    <rect x="-14" y="120" width="28" height="70" rx="6" fill="#fbe0da" stroke="#e0a090"/>
    <rect x="-40" y="200" width="80" height="40" rx="6" fill="#f0b0a0" stroke="#c06050"/>
    <g stroke="#c06050" stroke-width="2" fill="none"><path d="M-20 195 q4 -10 0 -18 M20 195 q4 -10 0 -18"/></g>
    <text x="0" y="262" text-anchor="middle" font-size="11" fill="#a03030">太熱·酵母燙死</text>
  </g>

  <text x="350" y="320" text-anchor="middle" font-size="14" font-weight="bold" fill="#b06a1e">溫溫的最會發酵——太冷太熱都不行。</text>
</svg>
