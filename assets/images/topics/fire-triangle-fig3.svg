<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eaf5ff"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">蠟燭實驗：氧氣用完火就熄</text>
  <!-- candle -->
  <rect x="150" y="200" width="24" height="90" fill="#f4d9a8"/>
  <line x1="162" y1="200" x2="162" y2="180" stroke="#6b4f3a" stroke-width="2"/>
  <path d="M162 180 q-10 -16 0 -30 q10 14 0 30 z" fill="#e8743b"/>
  <path d="M162 178 q-6 -10 0 -18 q6 8 0 18 z" fill="#f4c542"/>
  <text x="162" y="315" text-anchor="middle" font-size="12" fill="#2d2a26">點燃的蠟燭</text>
  <!-- glass cover coming down -->
  <path d="M270 150 L370 150 L370 290 L270 290 Z" fill="#cfe4f5" opacity="0.4" stroke="#7fb0d6" stroke-width="2"/>
  <rect x="288" y="230" width="20" height="60" fill="#f4d9a8"/>
  <path d="M298 230 q-8 -12 0 -22 q8 10 0 22 z" fill="#e8a98a" opacity="0.6"/>
  <text x="320" y="315" text-anchor="middle" font-size="12" fill="#2d2a26">罩上玻璃杯</text>
  <text x="320" y="135" text-anchor="middle" font-size="12" fill="#2f7fc1">杯內氧氣有限</text>
  <!-- result -->
  <rect x="430" y="150" width="100" height="140" rx="8" fill="#eaeaea" stroke="#b8b8b8" stroke-width="2"/>
  <rect x="468" y="230" width="20" height="60" fill="#f4d9a8"/>
  <path d="M478 228 q-4 -8 0 -14" stroke="#8a8078" stroke-width="2" fill="none"/>
  <text x="480" y="315" text-anchor="middle" font-size="12" fill="#c0392b">火熄滅了 ✘</text>
  <defs><marker id="ft3" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#6b4f3a"/></marker></defs>
  <line x1="380" y1="220" x2="425" y2="220" stroke="#6b4f3a" stroke-width="2" marker-end="url(#ft3)"/>
  <line x1="200" y1="240" x2="262" y2="240" stroke="#6b4f3a" stroke-width="2" marker-end="url(#ft3)"/>
  <text x="600" y="220" text-anchor="middle" font-size="12" fill="#2d2a26">杯子越小，</text>
  <text x="600" y="240" text-anchor="middle" font-size="12" fill="#2d2a26">熄得越快</text>
  <text x="350" y="360" text-anchor="middle" font-size="13" fill="#c0392b">罩住蠟燭，杯內氧氣（助燃物）用完，火就熄了——證明燃燒需要氧氣</text>
</svg>
