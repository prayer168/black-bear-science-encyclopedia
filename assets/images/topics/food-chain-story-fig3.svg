<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="420" fill="#eaf5ff"/>
  <text x="350" y="32" text-anchor="middle" font-size="21" font-weight="bold" fill="#6b4f3a">牽一髮動全身的食物網</text>
  <text x="350" y="54" text-anchor="middle" font-size="13" fill="#b5462a">若青蛙消失，相連的關係都會受影響（紅色）</text>

  <defs>
    <marker id="n" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7aa0b8"/></marker>
    <marker id="r" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#c0392b"/></marker>
  </defs>

  <!-- nodes -->
  <g font-size="24" text-anchor="middle">
    <!-- grass bottom-left -->
    <circle cx="120" cy="330" r="30" fill="#5aa469"/><text x="120" y="340">🌱</text>
    <!-- grasshopper -->
    <circle cx="300" cy="330" r="30" fill="#9ec96f"/><text x="300" y="340">🦗</text>
    <!-- spider -->
    <circle cx="480" cy="330" r="30" fill="#b7a07a"/><text x="480" y="340">🕷️</text>
    <!-- frog (to be removed) -->
    <circle cx="300" cy="200" r="32" fill="#6fbf9a" opacity="0.5"/><text x="300" y="210" opacity="0.5">🐸</text>
    <!-- small bird -->
    <circle cx="480" cy="200" r="30" fill="#7fb0d6"/><text x="480" y="210">🐦</text>
    <!-- snake -->
    <circle cx="180" cy="120" r="30" fill="#c9a35a"/><text x="180" y="130">🐍</text>
    <!-- hawk -->
    <circle cx="440" cy="90" r="30" fill="#a98d5a"/><text x="440" y="100">🦅</text>
  </g>

  <!-- labels -->
  <g font-size="11" fill="#2d2a26" text-anchor="middle">
    <text x="120" y="372">草</text><text x="300" y="372">蚱蜢</text><text x="480" y="372">蜘蛛</text>
    <text x="300" y="245">青蛙</text><text x="480" y="242">小鳥</text><text x="180" y="80">蛇</text><text x="440" y="50">老鷹</text>
  </g>

  <!-- normal energy links (blue) -->
  <g stroke="#7aa0b8" stroke-width="2.5" fill="none">
    <line x1="150" y1="330" x2="268" y2="330" marker-end="url(#n)"/>            <!-- grass->grasshopper -->
    <line x1="330" y1="330" x2="452" y2="330" marker-end="url(#n)"/>            <!-- grasshopper->spider -->
    <line x1="480" y1="300" x2="480" y2="232" marker-end="url(#n)"/>            <!-- spider->bird -->
    <line x1="150" y1="315" x2="185" y2="222" marker-end="url(#n)"/>            <!-- grass? actually grasshopper->? keep -->
    <line x1="455" y1="110" x2="205" y2="118" marker-end="url(#n)"/>            <!-- bird->hawk? adjust -->
  </g>

  <!-- affected links to/from frog (red) -->
  <g stroke="#c0392b" stroke-width="3" fill="none">
    <line x1="300" y1="300" x2="300" y2="232" marker-end="url(#r)"/>            <!-- grasshopper->frog -->
    <line x1="272" y1="180" x2="205" y2="138" marker-end="url(#r)"/>            <!-- frog->snake -->
    <line x1="330" y1="185" x2="415" y2="100" marker-end="url(#r)"/>            <!-- frog->hawk -->
  </g>

  <!-- X on frog -->
  <line x1="278" y1="178" x2="322" y2="222" stroke="#c0392b" stroke-width="5" stroke-linecap="round"/>
  <line x1="322" y1="178" x2="278" y2="222" stroke="#c0392b" stroke-width="5" stroke-linecap="round"/>

  <text x="350" y="405" text-anchor="middle" font-size="12" fill="#6b4f3a">箭頭都是能量流向；一種生物常在多條鏈上，交織成網</text>
</svg>
