<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="380" fill="#eaf5ff"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">酸鹼在生活中的應用</text>
  <g>
    <rect x="40" y="70" width="190" height="120" rx="12" fill="#fff" stroke="#e7ddcd" stroke-width="2"/>
    <text x="135" y="115" text-anchor="middle" font-size="28">🐝</text>
    <text x="135" y="150" text-anchor="middle" font-size="12" fill="#2d2a26">被蜜蜂螫（酸性）</text>
    <text x="135" y="172" text-anchor="middle" font-size="11" fill="#5a8a20">塗鹼性的小蘇打舒緩</text>

    <rect x="255" y="70" width="190" height="120" rx="12" fill="#fff" stroke="#e7ddcd" stroke-width="2"/>
    <text x="350" y="115" text-anchor="middle" font-size="28">🦷</text>
    <text x="350" y="150" text-anchor="middle" font-size="12" fill="#2d2a26">口腔的酸會蛀牙</text>
    <text x="350" y="172" text-anchor="middle" font-size="11" fill="#5a8a20">牙膏偏鹼幫忙中和</text>

    <rect x="470" y="70" width="190" height="120" rx="12" fill="#fff" stroke="#e7ddcd" stroke-width="2"/>
    <text x="565" y="115" text-anchor="middle" font-size="28">🧽</text>
    <text x="565" y="150" text-anchor="middle" font-size="12" fill="#2d2a26">清潔劑（鹼性）</text>
    <text x="565" y="172" text-anchor="middle" font-size="11" fill="#6f6a63">去除油污</text>
  </g>
  <rect x="90" y="220" width="520" height="120" rx="12" fill="#fff8e6" stroke="#f2e0a8" stroke-width="2"/>
  <text x="350" y="250" text-anchor="middle" font-size="15" font-weight="bold" fill="#c98f00">⚠️ 安全第一</text>
  <text x="350" y="280" text-anchor="middle" font-size="13" fill="#c0392b">強酸、強鹼（如廁所清潔劑、通樂）具腐蝕性，會灼傷皮膚與眼睛！</text>
  <text x="350" y="306" text-anchor="middle" font-size="13" fill="#2d2a26">實驗只用溫和的食材（檸檬、醋、小蘇打、肥皂水）</text>
  <text x="350" y="328" text-anchor="middle" font-size="13" fill="#2d2a26">不品嚐、不混合不明藥品、戴護目鏡、由老師指導</text>
</svg>
