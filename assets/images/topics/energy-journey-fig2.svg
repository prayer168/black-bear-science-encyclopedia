<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#fff4e9"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#a85a1e">雲霄飛車：位能與動能的接力</text>

  <!-- track -->
  <path d="M40 120 C120 120 150 300 250 300 C330 300 350 160 440 160 C520 160 540 300 660 300"
        fill="none" stroke="#b98b5a" stroke-width="8" stroke-linecap="round"/>
  <path d="M40 132 C120 132 150 312 250 312 C330 312 350 172 440 172 C520 172 540 312 660 312"
        fill="none" stroke="#d8b183" stroke-width="4"/>

  <!-- cart at top -->
  <g>
    <rect x="30" y="98" width="34" height="20" rx="4" fill="#c0392b"/>
    <circle cx="38" cy="120" r="5" fill="#333"/><circle cx="56" cy="120" r="5" fill="#333"/>
  </g>
  <!-- cart at bottom -->
  <g>
    <rect x="234" y="278" width="34" height="20" rx="4" fill="#e07a3a"/>
    <circle cx="242" cy="300" r="5" fill="#333"/><circle cx="260" cy="300" r="5" fill="#333"/>
  </g>

  <!-- top energy bars -->
  <text x="60" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#2f7d3a">最高點</text>
  <rect x="90" y="60" width="90" height="14" fill="#e9e2d6" stroke="#c9bda8"/>
  <rect x="90" y="60" width="78" height="14" fill="#2f7d3a"/>
  <text x="185" y="71" font-size="11" fill="#2f7d3a">位能大</text>
  <rect x="90" y="80" width="90" height="14" fill="#e9e2d6" stroke="#c9bda8"/>
  <rect x="90" y="80" width="14" height="14" fill="#c0392b"/>
  <text x="185" y="91" font-size="11" fill="#c0392b">動能小（慢）</text>

  <!-- bottom energy bars -->
  <text x="250" y="345" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">最低點</text>
  <rect x="300" y="330" width="90" height="14" fill="#e9e2d6" stroke="#c9bda8"/>
  <rect x="300" y="330" width="14" height="14" fill="#2f7d3a"/>
  <text x="395" y="341" font-size="11" fill="#2f7d3a">位能小</text>
  <rect x="300" y="350" width="90" height="14" fill="#e9e2d6" stroke="#c9bda8"/>
  <rect x="300" y="350" width="78" height="14" fill="#c0392b"/>
  <text x="395" y="361" font-size="11" fill="#c0392b">動能大（快）</text>

  <!-- total conserved note -->
  <rect x="470" y="60" width="205" height="70" rx="10" fill="#fff8ec" stroke="#f0dcc4" stroke-width="2"/>
  <text x="572" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#a85a1e">位能 ＋ 動能 = 總量</text>
  <text x="572" y="108" text-anchor="middle" font-size="12" fill="#2d2a26">兩處總量相同（不計摩擦）</text>
  <text x="572" y="124" text-anchor="middle" font-size="11" fill="#6f6a63">能量守恆</text>

  <text x="350" y="392" text-anchor="middle" font-size="13" font-weight="bold" fill="#a85a1e">爬得高就存位能，衝下來就變動能，總量不變。</text>
</svg>
