<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eaf4fb"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#2f5b7c">「降雨機率 30%」是什麼意思？</text>

  <!-- 10 boxes, 3 with rain -->
  <text x="350" y="72" text-anchor="middle" font-size="14" fill="#6f6a63">想像有 10 個一樣的日子：</text>
  <g>
    <!-- rainy 3 -->
    <g>
      <rect x="70" y="95" width="90" height="90" rx="10" fill="#cfe0ee" stroke="#5a8ac0" stroke-width="2"/>
      <text x="115" y="150" text-anchor="middle" font-size="34">🌧️</text>
    </g>
    <g>
      <rect x="185" y="95" width="90" height="90" rx="10" fill="#cfe0ee" stroke="#5a8ac0" stroke-width="2"/>
      <text x="230" y="150" text-anchor="middle" font-size="34">🌧️</text>
    </g>
    <g>
      <rect x="300" y="95" width="90" height="90" rx="10" fill="#cfe0ee" stroke="#5a8ac0" stroke-width="2"/>
      <text x="345" y="150" text-anchor="middle" font-size="34">🌧️</text>
    </g>
    <!-- sunny 7 -->
    <g><rect x="415" y="95" width="90" height="90" rx="10" fill="#fff8ec" stroke="#f0dca8" stroke-width="2"/><text x="460" y="150" text-anchor="middle" font-size="34">☀️</text></g>
    <g><rect x="530" y="95" width="90" height="90" rx="10" fill="#fff8ec" stroke="#f0dca8" stroke-width="2"/><text x="575" y="150" text-anchor="middle" font-size="34">☀️</text></g>
  </g>
  <g>
    <g><rect x="70" y="200" width="90" height="55" rx="10" fill="#fff8ec" stroke="#f0dca8" stroke-width="2"/><text x="115" y="235" text-anchor="middle" font-size="26">☀️</text></g>
    <g><rect x="185" y="200" width="90" height="55" rx="10" fill="#fff8ec" stroke="#f0dca8" stroke-width="2"/><text x="230" y="235" text-anchor="middle" font-size="26">☀️</text></g>
    <g><rect x="300" y="200" width="90" height="55" rx="10" fill="#fff8ec" stroke="#f0dca8" stroke-width="2"/><text x="345" y="235" text-anchor="middle" font-size="26">☀️</text></g>
    <g><rect x="415" y="200" width="90" height="55" rx="10" fill="#fff8ec" stroke="#f0dca8" stroke-width="2"/><text x="460" y="235" text-anchor="middle" font-size="26">☀️</text></g>
    <g><rect x="530" y="200" width="90" height="55" rx="10" fill="#fff8ec" stroke="#f0dca8" stroke-width="2"/><text x="575" y="235" text-anchor="middle" font-size="26">☀️</text></g>
  </g>

  <text x="230" y="290" text-anchor="middle" font-size="14" font-weight="bold" fill="#2f7fc1">約 3 天會下雨</text>
  <text x="490" y="290" text-anchor="middle" font-size="14" font-weight="bold" fill="#c98f00">約 7 天不下雨</text>

  <rect x="120" y="310" width="460" height="60" rx="12" fill="#fff" stroke="#cfe0ee" stroke-width="2"/>
  <text x="350" y="336" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">降雨機率 30% ＝ 有三成機會下雨</text>
  <text x="350" y="358" text-anchor="middle" font-size="13" fill="#2d2a26">不是「一定不下」！機率不低，帶把傘比較保險 ☂️</text>
</svg>
