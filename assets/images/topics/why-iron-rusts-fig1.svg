<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#fffdf9"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">鐵生鏽，需要「水」和「氧氣」一起來</text>
  <!-- three circles overlapping (iron, water, oxygen) -->
  <circle cx="280" cy="200" r="90" fill="#9aa4ad" opacity="0.45"/>
  <circle cx="420" cy="200" r="90" fill="#2f7fc1" opacity="0.35"/>
  <circle cx="350" cy="290" r="90" fill="#eaf6ff" opacity="0.0"/>
  <circle cx="350" cy="290" r="90" fill="#cfe4f5" opacity="0.5"/>
  <text x="235" y="180" text-anchor="middle" font-size="16" font-weight="bold" fill="#5a6570">鐵</text>
  <text x="235" y="200" text-anchor="middle" font-size="11" fill="#5a6570">（鐵製品）</text>
  <text x="465" y="180" text-anchor="middle" font-size="16" font-weight="bold" fill="#2f7fc1">氧氣</text>
  <text x="465" y="200" text-anchor="middle" font-size="11" fill="#2f7fc1">（空氣中）</text>
  <text x="350" y="320" text-anchor="middle" font-size="16" font-weight="bold" fill="#3a7d9a">水</text>
  <text x="350" y="338" text-anchor="middle" font-size="11" fill="#3a7d9a">（水氣/潮濕）</text>
  <!-- center: rust -->
  <circle cx="350" cy="230" r="34" fill="#b5622a"/>
  <text x="350" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">生鏽</text>
  <text x="350" y="246" text-anchor="middle" font-size="10" fill="#fce0c8">鐵鏽</text>
  <text x="350" y="378" text-anchor="middle" font-size="13" fill="#c0392b">三者同時具備，鐵才會慢慢生鏽（少一樣就不容易生鏽）</text>
</svg>
