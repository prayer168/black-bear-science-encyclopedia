<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="420" fill="#fffdf9"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">熱旅行的三種方法</text>
  <line x1="233" y1="55" x2="233" y2="380" stroke="#e7ddcd" stroke-width="2"/>
  <line x1="466" y1="55" x2="466" y2="380" stroke="#e7ddcd" stroke-width="2"/>

  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c0392b"/><stop offset="0.5" stop-color="#e8743b"/><stop offset="1" stop-color="#f4c542"/>
    </linearGradient>
    <marker id="h" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#c0392b"/></marker>
  </defs>

  <!-- 1 conduction -->
  <text x="116" y="82" text-anchor="middle" font-size="17" font-weight="bold" fill="#c0392b">① 傳導</text>
  <text x="116" y="102" text-anchor="middle" font-size="12" fill="#6f6a63">固體</text>
  <rect x="55" y="170" width="150" height="26" rx="6" fill="url(#bar)"/>
  <!-- flame at hot end -->
  <path d="M55 210 q-8 -18 4 -30 q2 12 12 10 q-2 16 -16 20" fill="#e8743b"/>
  <path d="M52 208 q-6 -12 3 -20 q1 8 8 7 q-1 11 -11 13" fill="#f4c542"/>
  <text x="45" y="230" font-size="11" fill="#c0392b">熱端</text>
  <line x1="70" y1="150" x2="185" y2="150" stroke="#c0392b" stroke-width="3" marker-end="url(#h)"/>
  <text x="116" y="140" text-anchor="middle" font-size="11" fill="#c0392b">熱沿金屬傳</text>
  <text x="205" y="230" font-size="11" fill="#6f6a63" text-anchor="end">冷端變熱</text>

  <!-- 2 convection -->
  <text x="349" y="82" text-anchor="middle" font-size="17" font-weight="bold" fill="#2f7fc1">② 對流</text>
  <text x="349" y="102" text-anchor="middle" font-size="12" fill="#6f6a63">液體 / 氣體</text>
  <path d="M290 140 L408 140 L398 250 L300 250 Z" fill="#cfe4f5" stroke="#2f7fc1" stroke-width="2"/>
  <path d="M300 250 q-14 26 8 34 M398 250 q14 26 -8 34" fill="#e8743b"/>
  <path d="M296 254 q-8 14 5 18 M402 254 q8 14 -5 18" fill="#f4c542"/>
  <!-- circulation arrows -->
  <path d="M330 235 C325 190 330 165 345 155" fill="none" stroke="#c0392b" stroke-width="3.5" marker-end="url(#h)"/>
  <defs><marker id="c" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2f7fc1"/></marker></defs>
  <path d="M370 155 C385 165 388 195 372 232" fill="none" stroke="#2f7fc1" stroke-width="3.5" marker-end="url(#c)"/>
  <text x="316" y="200" font-size="11" fill="#c0392b">熱升</text>
  <text x="384" y="200" font-size="11" fill="#2f7fc1">冷沉</text>

  <!-- 3 radiation -->
  <text x="583" y="82" text-anchor="middle" font-size="17" font-weight="bold" fill="#f4b400">③ 輻射</text>
  <text x="583" y="102" text-anchor="middle" font-size="12" fill="#6f6a63">不需介質</text>
  <circle cx="530" cy="175" r="30" fill="#f4b400"/>
  <text x="530" y="180" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">太陽</text>
  <!-- wavy radiation to earth -->
  <path d="M560 175 q15 -8 30 0 q15 8 30 0" fill="none" stroke="#f4b400" stroke-width="3"/>
  <path d="M560 195 q15 -8 30 0 q15 8 30 0" fill="none" stroke="#f4b400" stroke-width="3"/>
  <circle cx="600" cy="255" r="26" fill="#5aa469"/>
  <text x="600" y="260" text-anchor="middle" font-size="11" fill="#fff">地球</text>
  <text x="583" y="305" text-anchor="middle" font-size="11" fill="#c98f00">中間是真空也能傳</text>

  <text x="350" y="405" text-anchor="middle" font-size="13" fill="#c0392b">熱一律從「高溫」流向「低溫」</text>
</svg>
