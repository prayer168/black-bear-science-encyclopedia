<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#fffdf9"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">種子的「構造」配合「傳播方式」</text>
  <!-- dandelion -->
  <g>
    <circle cx="140" cy="140" r="8" fill="#8a5f36"/>
    <g stroke="#c9c2b0" stroke-width="1.5"><line x1="140" y1="140" x2="140" y2="105"/><line x1="140" y1="140" x2="115" y2="115"/><line x1="140" y1="140" x2="165" y2="115"/><line x1="140" y1="140" x2="108" y2="140"/><line x1="140" y1="140" x2="172" y2="140"/></g>
    <text x="140" y="200" text-anchor="middle" font-size="12" fill="#5aa469" font-weight="bold">絨毛 → 靠風飛</text>
    <text x="140" y="220" text-anchor="middle" font-size="10" fill="#6f6a63">輕又有降落傘</text>
  </g>
  <!-- burr -->
  <g>
    <circle cx="350" cy="135" r="20" fill="#8a6a4a"/>
    <g stroke="#6b4a2e" stroke-width="2"><line x1="350" y1="115" x2="350" y2="105"/><line x1="370" y1="135" x2="380" y2="135"/><line x1="330" y1="135" x2="320" y2="135"/><line x1="364" y1="121" x2="372" y2="113"/><line x1="336" y1="149" x2="328" y2="157"/></g>
    <text x="350" y="200" text-anchor="middle" font-size="12" fill="#e8743b" font-weight="bold">鉤刺 → 黏動物</text>
    <text x="350" y="220" text-anchor="middle" font-size="10" fill="#6f6a63">鉤住毛髮衣服</text>
  </g>
  <!-- berry -->
  <g>
    <circle cx="560" cy="135" r="22" fill="#c0392b"/>
    <circle cx="560" cy="135" r="6" fill="#7a1f18"/>
    <text x="560" y="200" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="bold">果肉 → 被吃</text>
    <text x="560" y="220" text-anchor="middle" font-size="10" fill="#6f6a63">甜果肉包種子</text>
  </g>
  <rect x="120" y="260" width="460" height="100" rx="12" fill="#eef8ee" stroke="#cde8cd" stroke-width="2"/>
  <text x="350" y="290" text-anchor="middle" font-size="13" font-weight="bold" fill="#3f7d4f">看種子的樣子，就能猜它怎麼旅行！</text>
  <text x="350" y="318" text-anchor="middle" font-size="12" fill="#2d2a26">有絨毛/翅膀→風；有鉤刺→動物；有甜果肉→被吃；能浮→水</text>
  <text x="350" y="342" text-anchor="middle" font-size="12" fill="#6b4f3a">這就是「構造」和「功能」互相配合</text>
</svg>
