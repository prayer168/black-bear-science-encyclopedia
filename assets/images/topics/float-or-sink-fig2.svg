<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eef6f9"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1f7a8c">大西瓜浮、小葡萄沉</text>

  <!-- bucket -->
  <path d="M170 110 h360 l-24 250 a16 16 0 0 1 -16 14 h-280 a16 16 0 0 1 -16 -14 Z" fill="#dff1f8" stroke="#7fb0d6" stroke-width="3"/>
  <ellipse cx="350" cy="110" rx="180" ry="20" fill="#cfe8f2" stroke="#7fb0d6"/>
  <line x1="176" y1="150" x2="524" y2="150" stroke="#9fcbe4" stroke-width="2"/>

  <!-- big watermelon floating -->
  <circle cx="300" cy="150" r="52" fill="#3a8a3a" stroke="#2a6a2a" stroke-width="3"/>
  <path d="M252 150 a48 48 0 0 1 96 0" fill="none" stroke="#7fbf6f" stroke-width="4"/>
  <path d="M270 130 q30 -8 60 0 M266 145 q34 -6 68 0" stroke="#2a6a2a" stroke-width="2" fill="none"/>
  <text x="300" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f9d55">大西瓜·大卻浮</text>

  <!-- small grape sinking -->
  <circle cx="430" cy="330" r="12" fill="#7b41c9" stroke="#5a2a99"/>
  <text x="430" y="360" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">小葡萄·小卻沉</text>

  <text x="350" y="388" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f7a8c">浮沉不是只看大小和重量！</text>
</svg>
