<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eef6ea"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#3a7030">植物的喝水運輸系統</text>

  <!-- soil -->
  <rect x="0" y="300" width="700" height="100" fill="#a9754a"/>
  <path d="M0 300 q40 -8 80 0 q40 8 80 0 q40 -8 80 0 q40 8 80 0 q40 -8 80 0 q40 8 80 0 q40 -8 80 0 q40 8 80 0 L700 300 L700 400 L0 400 z" fill="#8a5a34"/>

  <!-- stem -->
  <rect x="343" y="120" width="14" height="185" fill="#5f9432"/>
  <!-- leaves -->
  <ellipse cx="300" cy="150" rx="46" ry="24" fill="#6ba03a" transform="rotate(-18 300 150)"/>
  <ellipse cx="400" cy="150" rx="46" ry="24" fill="#6ba03a" transform="rotate(18 400 150)"/>
  <ellipse cx="350" cy="105" rx="50" ry="28" fill="#7bb046"/>
  <!-- roots -->
  <g stroke="#8a5a34" stroke-width="5" fill="none">
    <path d="M350 305 q-30 30 -60 66 q-16 18 -30 40"/>
    <path d="M350 305 q30 30 60 66 q16 18 30 40"/>
    <path d="M350 308 q0 40 -6 96"/>
  </g>
  <g stroke="#a5713f" stroke-width="1.5"><path d="M300 355 l-12 6"/><path d="M410 355 l12 6"/><path d="M348 380 l-10 4"/></g>
  <text x="470" y="380" font-size="13" fill="#fff" font-weight="bold">根：根毛吸水</text>

  <!-- water flow arrows up -->
  <g stroke="#3a8ad0" stroke-width="4" fill="none">
    <path d="M336 300 L336 130" marker-end="url(#up)"/>
  </g>
  <defs><marker id="up" markerWidth="12" markerHeight="12" refX="4" refY="2" orient="auto"><path d="M0 8 L4 0 L8 8 z" fill="#3a8ad0"/></marker></defs>
  <text x="250" y="240" font-size="14" fill="#2a6aa0" font-weight="bold">莖：往上運輸</text>

  <!-- vapor from leaf -->
  <g stroke="#a8cbe0" stroke-width="3" fill="none" opacity="0.9">
    <path d="M330 88 q-8 -22 4 -40"/>
    <path d="M370 88 q8 -22 -4 -40"/>
  </g>
  <text x="470" y="90" font-size="14" fill="#5a8ab0" font-weight="bold">葉：蒸散（放出水蒸氣）</text>
  <path d="M415 100 q30 -6 50 -14" stroke="#8fb8d8" stroke-width="1.5" fill="none"/>

  <text x="350" y="392" text-anchor="middle" font-size="14" font-weight="bold" fill="#3a7030">根吸水、莖運輸、葉蒸散，水在植物裡一路向上。</text>
</svg>
