<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="420" fill="#eef8ee"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">生活中空氣大力士的例子</text>
  <!-- 1 balloon -->
  <ellipse cx="150" cy="140" rx="46" ry="54" fill="#e8743b"/>
  <path d="M150 194 l-8 14 h16 z" fill="#c85a24"/>
  <line x1="150" y1="208" x2="150" y2="250" stroke="#8a795c" stroke-width="2"/>
  <text x="150" y="285" text-anchor="middle" font-size="13" font-weight="bold" fill="#2d2a26">氣球</text>
  <text x="150" y="305" text-anchor="middle" font-size="11" fill="#6f6a63">空氣把它撐得鼓鼓的</text>

  <!-- 2 ball -->
  <circle cx="350" cy="150" r="48" fill="#f4b400"/>
  <path d="M350 102 a48 48 0 0 1 0 96 M310 128 h80 M310 172 h80" stroke="#c98f00" stroke-width="2" fill="none"/>
  <text x="350" y="285" text-anchor="middle" font-size="13" font-weight="bold" fill="#2d2a26">籃球・輪胎</text>
  <text x="350" y="305" text-anchor="middle" font-size="11" fill="#6f6a63">灌飽空氣才有彈性</text>

  <!-- 3 sailboat -->
  <path d="M520 200 l90 0 l-14 26 l-62 0 z" fill="#c98a5a"/>
  <line x1="565" y1="110" x2="565" y2="200" stroke="#6b4f3a" stroke-width="4"/>
  <path d="M565 115 q46 30 30 78 l-30 0 z" fill="#eaf6ff" stroke="#2f7fc1" stroke-width="2"/>
  <defs><marker id="w3" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2f7fc1"/></marker></defs>
  <line x1="470" y1="150" x2="540" y2="150" stroke="#2f7fc1" stroke-width="3" marker-end="url(#w3)"/>
  <text x="470" y="140" font-size="11" fill="#2f7fc1">風（流動的空氣）</text>
  <text x="565" y="285" text-anchor="middle" font-size="13" font-weight="bold" fill="#2d2a26">帆船・風車</text>
  <text x="565" y="305" text-anchor="middle" font-size="11" fill="#6f6a63">被風推著走</text>

  <text x="350" y="365" text-anchor="middle" font-size="14" fill="#3f7d4f">看不見的空氣，其實一直在推、在撐、在幫我們做事！</text>
</svg>
