<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#f0ecfa"/>
  <text x="350" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#5a4a8a">聲音的三個性質</text>

  <!-- three properties -->
  <rect x="30" y="55" width="200" height="150" rx="12" fill="#fff" stroke="#ddd3ef" stroke-width="2"/>
  <text x="130" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">音量</text>
  <text x="130" y="120" text-anchor="middle" font-size="30">🔊</text>
  <text x="130" y="152" text-anchor="middle" font-size="12" fill="#2d2a26">大聲／小聲</text>
  <text x="130" y="176" text-anchor="middle" font-size="11" fill="#6f6a63">看振動幅度</text>

  <rect x="250" y="55" width="200" height="150" rx="12" fill="#fff" stroke="#ddd3ef" stroke-width="2"/>
  <text x="350" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#2f7fc1">音調</text>
  <text x="350" y="122" text-anchor="middle" font-size="26">🎵⬆⬇</text>
  <text x="350" y="152" text-anchor="middle" font-size="12" fill="#2d2a26">高音／低音</text>
  <text x="350" y="176" text-anchor="middle" font-size="11" fill="#6f6a63">看振動快慢</text>

  <rect x="470" y="55" width="200" height="150" rx="12" fill="#fff" stroke="#ddd3ef" stroke-width="2"/>
  <text x="570" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#7d5aa8">音色</text>
  <text x="570" y="120" text-anchor="middle" font-size="26">🎻🎹</text>
  <text x="570" y="152" text-anchor="middle" font-size="12" fill="#2d2a26">分辨誰在響</text>
  <text x="570" y="176" text-anchor="middle" font-size="11" fill="#6f6a63">同音也聽得出不同</text>

  <!-- music vs noise -->
  <rect x="30" y="225" width="310" height="130" rx="12" fill="#eaf7ee" stroke="#c7e0c9" stroke-width="2"/>
  <text x="185" y="252" text-anchor="middle" font-size="14" font-weight="bold" fill="#2f7d3a">樂音 🎶</text>
  <path d="M55 300 Q80 280 105 300 T155 300 T205 300 T255 300 T305 300" fill="none" stroke="#2f7d3a" stroke-width="2.5"/>
  <text x="185" y="335" text-anchor="middle" font-size="12" fill="#2d2a26">規律、好聽</text>

  <rect x="360" y="225" width="310" height="130" rx="12" fill="#fbeaea" stroke="#e6c7c7" stroke-width="2"/>
  <text x="515" y="252" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">噪音 🔇</text>
  <path d="M385 300 l15 -20 l10 28 l14 -30 l12 22 l13 -25 l11 26 l14 -18 l12 20 l13 -22 l11 24 l15 -16" fill="none" stroke="#c0392b" stroke-width="2"/>
  <text x="515" y="335" text-anchor="middle" font-size="11" fill="#2d2a26">雜亂刺耳，傷聽力 → 護耳：關小音量、遠離、戴耳塞</text>

  <text x="350" y="382" text-anchor="middle" font-size="12" font-weight="bold" fill="#5a4a8a">音量、音調、音色，一起決定我們聽到的聲音。</text>
</svg>
