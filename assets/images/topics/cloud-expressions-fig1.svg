<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#dcecf7"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#2a6a9a">雲是怎麼形成的</text>

  <!-- sun -->
  <circle cx="90" cy="80" r="30" fill="#ffd24a"/>
  <g stroke="#ffd24a" stroke-width="3"><line x1="90" y1="115" x2="90" y2="132"/><line x1="60" y1="100" x2="48" y2="110"/></g>

  <!-- cloud high -->
  <g fill="#ffffff" stroke="#c8d8e4" stroke-width="2">
    <ellipse cx="470" cy="110" rx="60" ry="34"/><ellipse cx="420" cy="120" rx="40" ry="26"/><ellipse cx="520" cy="120" rx="44" ry="28"/>
  </g>
  <!-- tiny droplets in cloud -->
  <g fill="#8fbfe0"><circle cx="450" cy="112" r="3"/><circle cx="480" cy="118" r="3"/><circle cx="500" cy="108" r="3"/><circle cx="430" cy="120" r="3"/></g>
  <text x="470" y="70" text-anchor="middle" font-size="12" fill="#3a7a9a">小水滴聚成雲</text>

  <!-- cold zone label -->
  <text x="600" y="120" font-size="13" fill="#3a7a9a">高空·冷</text>
  <path d="M540 140 q40 -6 56 -14" stroke="#7fb0d6" stroke-width="1.5" fill="none"/>

  <!-- water surface bottom -->
  <rect x="0" y="330" width="700" height="70" fill="#7fc0d8"/>
  <path d="M0 330 q30 8 60 0 q30 -8 60 0 q30 8 60 0 q30 -8 60 0 q30 8 60 0 q30 -8 60 0 q30 8 60 0 q30 -8 60 0 q30 8 60 0 q30 -8 60 0 q30 8 60 0" fill="none" stroke="#5aa0c0" stroke-width="2"/>
  <text x="90" y="370" font-size="12" fill="#2a6a8a">地面的水</text>

  <!-- vapor rising -->
  <g stroke="#a8cbe0" stroke-width="3" fill="none" opacity="0.85">
    <path d="M300 320 q-10 -60 6 -120 q-8 -40 8 -80" marker-end="url(#a)"/>
    <path d="M360 320 q10 -60 -6 -120 q8 -40 -8 -70" marker-end="url(#a)"/>
  </g>
  <defs><marker id="a" markerWidth="11" markerHeight="11" refX="4" refY="2" orient="auto"><path d="M0 8 L4 0 L8 8 z" fill="#a8cbe0"/></marker></defs>
  <text x="270" y="230" font-size="13" font-weight="bold" fill="#5a8ab0">水蒸氣上升</text>
  <text x="350" y="175" font-size="13" font-weight="bold" fill="#3a7a9a">遇冷凝結</text>

  <text x="350" y="392" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a6a9a">水蒸氣升到高空遇冷，凝結成小水滴就是雲。</text>
</svg>
