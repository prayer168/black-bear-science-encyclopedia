<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eef4f0"/>
  <text x="350" y="32" text-anchor="middle" font-size="21" font-weight="bold" fill="#3a7a5a">有彈性 vs 沒彈性</text>

  <!-- left: elastic -->
  <rect x="20" y="55" width="320" height="300" rx="12" fill="#eaf6ec" stroke="#5aa070" stroke-width="2"/>
  <text x="180" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a7a5a">有彈性 ✓（會恢復）</text>
  <!-- rubber band -->
  <ellipse cx="90" cy="140" rx="20" ry="12" fill="none" stroke="#c07a4a" stroke-width="4"/>
  <text x="90" y="168" text-anchor="middle" font-size="11" fill="#8a5a2a">橡皮筋</text>
  <!-- spring -->
  <path d="M180 128 q8 -8 0 -11 q-8 -3 0 -11 q8 -8 0 -11 q-8 -3 0 -11" fill="none" stroke="#5a8ac0" stroke-width="3.5" transform="translate(0,14)"/>
  <text x="180" y="168" text-anchor="middle" font-size="11" fill="#3a6a9a">彈簧</text>
  <!-- sponge -->
  <rect x="250" y="118" width="46" height="34" rx="6" fill="#ffd98a" stroke="#d0a850" stroke-width="2"/>
  <circle cx="262" cy="130" r="3" fill="#e0b860"/><circle cx="282" cy="140" r="3" fill="#e0b860"/>
  <text x="273" y="168" text-anchor="middle" font-size="11" fill="#a07820">海綿</text>
  <text x="180" y="250" text-anchor="middle" font-size="14" fill="#2a7a5a">變形 → 放手 → 恢復原狀</text>
  <text x="180" y="300" text-anchor="middle" font-size="42">😊</text>

  <!-- right: no elastic -->
  <rect x="360" y="55" width="320" height="300" rx="12" fill="#f6efe8" stroke="#c09060" stroke-width="2"/>
  <text x="520" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#a06830">沒彈性 ✗（不恢復）</text>
  <!-- clay flat -->
  <ellipse cx="450" cy="140" rx="34" ry="12" fill="#c98a5a" stroke="#a06838" stroke-width="2"/>
  <text x="450" y="168" text-anchor="middle" font-size="11" fill="#8a5a2a">黏土（捏扁）</text>
  <!-- foil crumpled -->
  <path d="M560 125 l14 -6 l12 10 l-8 12 l-16 2 l-6 -10z" fill="#cfd4da" stroke="#9aa0a8" stroke-width="2"/>
  <text x="575" y="168" text-anchor="middle" font-size="11" fill="#6a7078">鋁箔（揉皺）</text>
  <text x="520" y="250" text-anchor="middle" font-size="14" fill="#a06830">變形 → 放手 → 保持變形</text>
  <text x="520" y="300" text-anchor="middle" font-size="42">😐</text>

  <text x="350" y="384" text-anchor="middle" font-size="14" font-weight="bold" fill="#3a7a5a">會彈回來的有彈性，壓了不動的沒彈性。</text>
</svg>
