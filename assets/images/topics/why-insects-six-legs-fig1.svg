<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="420" fill="#fffdf9"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">昆蟲的身體地圖：頭・胸・腹＋六足</text>

  <!-- body segments: head, thorax, abdomen (top view, facing left) -->
  <!-- head -->
  <ellipse cx="175" cy="215" rx="42" ry="40" fill="#7a5230"/>
  <!-- antennae -->
  <path d="M150 185 q-25 -35 -50 -40" fill="none" stroke="#5a3c22" stroke-width="4" stroke-linecap="round"/>
  <path d="M150 245 q-25 35 -50 40" fill="none" stroke="#5a3c22" stroke-width="4" stroke-linecap="round"/>
  <circle cx="100" cy="145" r="5" fill="#5a3c22"/><circle cx="100" cy="285" r="5" fill="#5a3c22"/>
  <!-- compound eye -->
  <circle cx="160" cy="200" r="9" fill="#2d2a26"/><circle cx="160" cy="230" r="9" fill="#2d2a26"/>
  <!-- thorax -->
  <ellipse cx="300" cy="215" rx="70" ry="52" fill="#8a5f36"/>
  <!-- abdomen (segmented) -->
  <ellipse cx="470" cy="215" rx="95" ry="46" fill="#6f4a29"/>
  <g stroke="#4f3319" stroke-width="2">
    <line x1="420" y1="178" x2="420" y2="252"/><line x1="460" y1="172" x2="460" y2="258"/><line x1="500" y1="172" x2="500" y2="258"/><line x1="540" y1="180" x2="540" y2="250"/>
  </g>

  <!-- SIX legs, ALL on thorax -->
  <g stroke="#4f3319" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M270 262 q-18 30 -45 42"/><path d="M300 268 q-2 34 -6 52"/><path d="M330 262 q18 30 40 46"/>
    <path d="M270 168 q-18 -30 -45 -42"/><path d="M300 162 q-2 -34 -6 -52"/><path d="M330 168 q18 -30 40 -46"/>
  </g>

  <!-- labels with leader lines -->
  <defs><marker id="d" markerWidth="8" markerHeight="8" refX="4" refY="4"><circle cx="4" cy="4" r="3" fill="#6b4f3a"/></marker></defs>
  <line x1="175" y1="140" x2="175" y2="178" stroke="#6b4f3a" stroke-width="1.5" marker-start="url(#d)"/>
  <text x="175" y="128" text-anchor="middle" font-size="16" font-weight="bold" fill="#6b4f3a">頭</text>
  <text x="175" y="112" text-anchor="middle" font-size="11" fill="#6f6a63">觸角・複眼・口器</text>

  <line x1="300" y1="315" x2="300" y2="268" stroke="#e8743b" stroke-width="1.5"/>
  <text x="300" y="335" text-anchor="middle" font-size="16" font-weight="bold" fill="#e8743b">胸</text>
  <text x="300" y="355" text-anchor="middle" font-size="12" fill="#e8743b">六隻腳全長在這裡！</text>

  <line x1="470" y1="150" x2="470" y2="172" stroke="#6b4f3a" stroke-width="1.5"/>
  <text x="470" y="138" text-anchor="middle" font-size="16" font-weight="bold" fill="#6b4f3a">腹</text>
  <text x="470" y="122" text-anchor="middle" font-size="11" fill="#6f6a63">消化・呼吸</text>

  <text x="350" y="405" text-anchor="middle" font-size="13" fill="#3f7d4f">身體像三節車廂，六隻腳都連在中間那節（胸部）</text>
</svg>
