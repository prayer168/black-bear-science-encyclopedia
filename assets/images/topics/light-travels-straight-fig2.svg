<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="380" fill="#eaf5ff"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">影子怎麼形成的？光被擋住了</text>
  <!-- sun -->
  <circle cx="90" cy="120" r="30" fill="#f4b400"/>
  <g stroke="#f4b400" stroke-width="3" stroke-linecap="round"><line x1="90" y1="78" x2="90" y2="66"/><line x1="132" y1="120" x2="144" y2="120"/><line x1="118" y1="92" x2="127" y2="83"/></g>
  <text x="90" y="170" text-anchor="middle" font-size="12" fill="#c98f00">光源</text>
  <!-- opaque object -->
  <rect x="300" y="130" width="40" height="120" rx="4" fill="#6b4f3a"/>
  <text x="320" y="115" text-anchor="middle" font-size="12" fill="#2d2a26">不透明物體</text>
  <!-- light rays -->
  <g stroke="#f4d060" stroke-width="2">
    <line x1="115" y1="110" x2="300" y2="135"/>
    <line x1="115" y1="135" x2="300" y2="250"/>
  </g>
  <!-- ground -->
  <rect x="0" y="290" width="700" height="30" fill="#5aa469"/>
  <!-- shadow on ground -->
  <polygon points="340,290 500,290 460,250 340,250" fill="#3a4a3a" opacity="0.7"/>
  <text x="420" y="278" text-anchor="middle" font-size="12" fill="#fff">影子</text>
  <!-- rays passing beside continue to ground bright -->
  <g stroke="#f4d060" stroke-width="2" opacity="0.7">
    <line x1="120" y1="150" x2="280" y2="290"/>
    <line x1="345" y1="140" x2="620" y2="290"/>
  </g>
  <text x="350" y="345" text-anchor="middle" font-size="13" fill="#c0392b">光走直線，遇到不透明物體被擋住，後面沒被照到的地方就是影子</text>
</svg>
