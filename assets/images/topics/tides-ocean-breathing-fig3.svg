<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#0f1b3a"/>
  <text x="350" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffe08a">大潮與小潮</text>
  <line x1="350" y1="56" x2="350" y2="345" stroke="#2a3a60" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- LEFT: spring tide, aligned -->
  <text x="175" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#ff9a5a">大潮·連成一線</text>
  <circle cx="60" cy="200" r="26" fill="#ffd24a"/><text x="60" y="240" text-anchor="middle" font-size="11" fill="#ffd24a">太陽</text>
  <ellipse cx="200" cy="200" rx="60" ry="34" fill="#2f6fb0" opacity="0.5"/>
  <circle cx="200" cy="200" r="26" fill="#3a7a4a" stroke="#2a5a36"/><text x="200" y="245" text-anchor="middle" font-size="11" fill="#9fd0a0">地球</text>
  <circle cx="300" cy="200" r="12" fill="#d8d8d0"/><text x="300" y="228" text-anchor="middle" font-size="10" fill="#e0e0d8">月</text>
  <text x="175" y="300" text-anchor="middle" font-size="12" fill="#ff9a5a">力量相加 → 潮差最大</text>

  <!-- RIGHT: neap tide, perpendicular -->
  <text x="525" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#7fd0ff">小潮·成直角</text>
  <circle cx="400" cy="210" r="24" fill="#ffd24a"/><text x="400" y="248" text-anchor="middle" font-size="11" fill="#ffd24a">太陽</text>
  <ellipse cx="540" cy="210" rx="36" ry="52" fill="#2f6fb0" opacity="0.5"/>
  <circle cx="540" cy="210" r="24" fill="#3a7a4a" stroke="#2a5a36"/><text x="540" y="252" text-anchor="middle" font-size="11" fill="#9fd0a0">地球</text>
  <circle cx="540" cy="120" r="11" fill="#d8d8d0"/><text x="562" y="120" font-size="10" fill="#e0e0d8">月</text>
  <text x="525" y="315" text-anchor="middle" font-size="12" fill="#7fd0ff">力量抵消 → 潮差最小</text>

  <text x="350" y="386" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffe08a">日月地連成線是大潮，成直角是小潮。</text>
</svg>
