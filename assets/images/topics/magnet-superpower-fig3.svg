<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="380" fill="#eaf5ff"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">磁鐵在生活中的應用</text>
  <g>
    <rect x="40" y="70" width="145" height="130" rx="12" fill="#fff" stroke="#e7ddcd" stroke-width="2"/>
    <circle cx="112" cy="120" r="26" fill="#fff" stroke="#6b4f3a" stroke-width="2"/>
    <line x1="112" y1="98" x2="112" y2="142" stroke="#c0392b" stroke-width="3"/><text x="112" y="94" text-anchor="middle" font-size="9" fill="#c0392b">N</text>
    <text x="112" y="170" text-anchor="middle" font-size="12" fill="#2d2a26">指南針</text>
    <text x="112" y="188" text-anchor="middle" font-size="10" fill="#6f6a63">指出方向</text>

    <rect x="200" y="70" width="145" height="130" rx="12" fill="#fff" stroke="#e7ddcd" stroke-width="2"/>
    <text x="272" y="125" text-anchor="middle" font-size="26">🧲</text>
    <rect x="255" y="135" width="34" height="10" fill="#c9a35a"/>
    <text x="272" y="170" text-anchor="middle" font-size="12" fill="#2d2a26">冰箱磁鐵</text>
    <text x="272" y="188" text-anchor="middle" font-size="10" fill="#6f6a63">貼紙條、關門</text>

    <rect x="360" y="70" width="145" height="130" rx="12" fill="#fff" stroke="#e7ddcd" stroke-width="2"/>
    <text x="432" y="125" text-anchor="middle" font-size="26">🎧</text>
    <text x="432" y="170" text-anchor="middle" font-size="12" fill="#2d2a26">喇叭・耳機</text>
    <text x="432" y="188" text-anchor="middle" font-size="10" fill="#6f6a63">裡面有磁鐵發聲</text>

    <rect x="520" y="70" width="145" height="130" rx="12" fill="#fff" stroke="#e7ddcd" stroke-width="2"/>
    <text x="592" y="125" text-anchor="middle" font-size="26">🚄</text>
    <text x="592" y="170" text-anchor="middle" font-size="12" fill="#2d2a26">磁浮列車</text>
    <text x="592" y="188" text-anchor="middle" font-size="10" fill="#6f6a63">用磁力浮起來</text>
  </g>
  <rect x="120" y="230" width="460" height="100" rx="12" fill="#fff8e6" stroke="#f2e0a8" stroke-width="2"/>
  <text x="350" y="258" text-anchor="middle" font-size="14" font-weight="bold" fill="#c98f00">💡 指南針的祕密</text>
  <text x="350" y="286" text-anchor="middle" font-size="13" fill="#2d2a26">地球本身就像一個超大磁鐵！</text>
  <text x="350" y="310" text-anchor="middle" font-size="13" fill="#2d2a26">指南針的磁針會受地球磁場影響，指出南北方向</text>
</svg>
