<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#f2ece2"/>
  <text x="350" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#a04530">火山像大地的煙囪</text>

  <!-- sky -->
  <rect x="0" y="46" width="700" height="180" fill="#d8e6ee"/>
  <!-- ash cloud -->
  <g fill="#9a9a94" opacity="0.85">
    <circle cx="350" cy="80" r="34"/><circle cx="320" cy="95" r="26"/><circle cx="385" cy="95" r="28"/><circle cx="350" cy="105" r="30"/>
  </g>
  <text x="440" y="80" font-size="12" fill="#6a6a64">火山灰與氣體</text>

  <!-- volcano cone -->
  <path d="M180 340 L330 150 L370 150 L520 340 Z" fill="#7a5a44" stroke="#5a4030" stroke-width="2"/>
  <!-- crater lava overflow -->
  <path d="M330 150 h40 l-6 -14 h-28 Z" fill="#e0521e"/>
  <path d="M336 150 q-30 40 -50 120" stroke="#e0521e" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M364 150 q30 40 46 110" stroke="#e0521e" stroke-width="8" fill="none" stroke-linecap="round"/>
  <text x="410" y="200" font-size="12" fill="#c0392b">熔岩流</text>

  <!-- underground -->
  <rect x="0" y="340" width="700" height="60" fill="#6a4a34"/>
  <!-- magma chamber -->
  <ellipse cx="350" cy="375" rx="70" ry="24" fill="#e0781e" stroke="#b0500e" stroke-width="2"/>
  <text x="350" y="379" text-anchor="middle" font-size="12" fill="#7a3000" font-weight="bold">岩漿庫</text>
  <!-- conduit -->
  <path d="M338 351 L344 150 M362 351 L356 150" fill="none" stroke="#e0781e" stroke-width="6" opacity="0.85"/>

  <!-- labels -->
  <g font-size="13" fill="#333">
    <line x1="350" y1="150" x2="560" y2="120" stroke="#7a5a44" stroke-width="1.5"/>
    <text x="565" y="118" font-weight="bold" fill="#a04530">火山口</text>
    <line x1="350" y1="260" x2="150" y2="240" stroke="#7a5a44" stroke-width="1.5"/>
    <text x="60" y="238" font-weight="bold" fill="#c0651e">通道</text>
    <line x1="350" y1="375" x2="560" y2="360" stroke="#7a5a44" stroke-width="1.5"/>
    <text x="565" y="360" font-weight="bold" fill="#c0651e">岩漿庫</text>
  </g>

  <text x="350" y="392" text-anchor="middle" font-size="13" font-weight="bold" fill="#a04530">地底岩漿沿通道往上衝，從火山口噴出。</text>
</svg>
