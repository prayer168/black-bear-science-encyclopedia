<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#f2f4ee"/>
  <text x="350" y="30" text-anchor="middle" font-size="21" font-weight="bold" fill="#3a6a55">聲音在固體、液體、氣體中傳播</text>

  <!-- four panels -->
  <!-- 1 gas -->
  <rect x="20" y="55" width="155" height="150" rx="10" fill="#e6f0f7" stroke="#88b8c8" stroke-width="2"/>
  <text x="97" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a6a9a">氣體（空氣）</text>
  <circle cx="70" cy="130" r="16" fill="#ffd24a" stroke="#d0a020" stroke-width="2"/>
  <g fill="none" stroke="#e08a3a" stroke-width="2.5"><path d="M92 118 q14 12 0 24"/><path d="M100 110 q22 20 0 40"/></g>
  <circle cx="140" cy="130" r="10" fill="#f2c79a"/>
  <text x="97" y="192" text-anchor="middle" font-size="12" fill="#5a7a4a">鈴響 → 耳朵</text>

  <!-- 2 liquid -->
  <rect x="185" y="55" width="155" height="150" rx="10" fill="#dff0f5" stroke="#5a9ac8" stroke-width="2"/>
  <text x="262" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a6a9a">液體（水）</text>
  <rect x="195" y="95" width="135" height="100" fill="#a6d4e4" opacity="0.6"/>
  <g fill="none" stroke="#2a6aa0" stroke-width="2.5"><path d="M240 145 q14 -14 28 0"/><path d="M232 150 q22 -22 44 0"/></g>
  <circle cx="222" cy="145" r="9" fill="#f2c79a"/>
  <text x="262" y="192" text-anchor="middle" font-size="12" fill="#2a6a8a">水下拍手也聽得到</text>

  <!-- 3 solid -->
  <rect x="350" y="55" width="155" height="150" rx="10" fill="#f6ede2" stroke="#a5713f" stroke-width="2"/>
  <text x="427" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#8a5a2a">固體（桌子）</text>
  <rect x="360" y="150" width="135" height="16" fill="#c9905a"/>
  <g fill="none" stroke="#8a5a2a" stroke-width="2.5"><path d="M400 150 q12 -12 24 0"/><path d="M392 155 q20 -20 40 0"/></g>
  <circle cx="378" cy="140" r="9" fill="#f2c79a"/>
  <text x="427" y="192" text-anchor="middle" font-size="12" fill="#8a5a2a">耳貼桌面聽輕敲</text>

  <!-- 4 vacuum -->
  <rect x="515" y="55" width="165" height="150" rx="10" fill="#2a2a44" stroke="#555" stroke-width="2"/>
  <text x="597" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">真空（太空）</text>
  <circle cx="560" cy="135" r="14" fill="#ffd24a"/>
  <circle cx="620" cy="135" r="9" fill="#f2c79a"/>
  <line x1="540" y1="105" x2="640" y2="170" stroke="#ff5a5a" stroke-width="5"/>
  <line x1="640" y1="105" x2="540" y2="170" stroke="#ff5a5a" stroke-width="5"/>
  <text x="597" y="192" text-anchor="middle" font-size="12" fill="#ffcaca">沒有介質，傳不出去</text>

  <rect x="150" y="245" width="400" height="46" rx="23" fill="#fff3d6" stroke="#d0a020" stroke-width="2"/>
  <text x="350" y="274" text-anchor="middle" font-size="17" font-weight="bold" fill="#b07a10">傳播速度：固體 ＞ 液體 ＞ 氣體</text>

  <text x="350" y="345" text-anchor="middle" font-size="15" fill="#3a6a55">聲音要靠「介質」一波波接力振動才能傳，</text>
  <text x="350" y="372" text-anchor="middle" font-size="15" font-weight="bold" fill="#3a6a55">氣、液、固都能傳，但真空傳不出去。</text>
</svg>
