<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="380" fill="#eaf5ff"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">讓糖溶解得更快的三個祕訣</text>
  <g>
    <!-- temperature -->
    <rect x="30" y="70" width="200" height="230" rx="12" fill="#fff" stroke="#e8743b" stroke-width="2.5"/>
    <text x="130" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#e8743b">① 提高溫度</text>
    <path d="M110 130 L150 130 L142 210 L118 210 Z" fill="#fdd0b0"/>
    <path d="M115 145 q-6 -12 4 -22 M130 145 q-6 -12 4 -22" stroke="#e8743b" stroke-width="2" fill="none"/>
    <text x="130" y="240" text-anchor="middle" font-size="12" fill="#2d2a26">熱水比冷水快</text>
    <text x="130" y="265" text-anchor="middle" font-size="11" fill="#6f6a63">溫度越高溶越快</text>

    <!-- stir -->
    <rect x="250" y="70" width="200" height="230" rx="12" fill="#fff" stroke="#2f7fc1" stroke-width="2.5"/>
    <text x="350" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#2f7fc1">② 攪拌</text>
    <path d="M330 130 L370 130 L362 210 L338 210 Z" fill="#cfe4f5"/>
    <line x1="350" y1="115" x2="350" y2="195" stroke="#6b4f3a" stroke-width="3"/>
    <path d="M330 175 q20 12 40 0" stroke="#2f7fc1" stroke-width="2" fill="none"/>
    <text x="350" y="240" text-anchor="middle" font-size="12" fill="#2d2a26">攪拌比不攪快</text>
    <text x="350" y="265" text-anchor="middle" font-size="11" fill="#6f6a63">讓糖和水多接觸</text>

    <!-- particle size -->
    <rect x="470" y="70" width="200" height="230" rx="12" fill="#fff" stroke="#5aa469" stroke-width="2.5"/>
    <text x="570" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#5aa469">③ 磨成小顆粒</text>
    <rect x="530" y="140" width="20" height="20" fill="#c9a35a"/>
    <text x="560" y="155" font-size="16" fill="#6b4f3a">→</text>
    <g fill="#c9a35a"><circle cx="585" cy="145" r="3"/><circle cx="595" cy="150" r="3"/><circle cx="588" cy="155" r="3"/><circle cx="600" cy="145" r="3"/></g>
    <text x="570" y="240" text-anchor="middle" font-size="12" fill="#2d2a26">細砂糖比方糖快</text>
    <text x="570" y="265" text-anchor="middle" font-size="11" fill="#6f6a63">接觸水的面積大</text>
  </g>
  <text x="350" y="340" text-anchor="middle" font-size="13" fill="#c0392b">重點都是「讓糖和水更容易、更多地接觸」</text>
</svg>
