<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eaf4fb"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#2f5b7c">天氣要素與觀測工具</text>

  <!-- temperature -->
  <rect x="30" y="70" width="150" height="150" rx="12" fill="#fff" stroke="#cfe0ee" stroke-width="2"/>
  <rect x="98" y="100" width="12" height="60" rx="6" fill="#fff" stroke="#c0392b" stroke-width="2"/>
  <rect x="100" y="135" width="8" height="25" fill="#c0392b"/><circle cx="104" cy="165" r="9" fill="#c0392b"/>
  <text x="105" y="192" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">氣溫</text>
  <text x="105" y="212" text-anchor="middle" font-size="11" fill="#6f6a63">溫度計</text>

  <!-- rainfall -->
  <rect x="195" y="70" width="150" height="150" rx="12" fill="#fff" stroke="#cfe0ee" stroke-width="2"/>
  <rect x="255" y="105" width="30" height="70" rx="3" fill="#dbeefb" stroke="#5a9fd0" stroke-width="2"/>
  <rect x="255" y="150" width="30" height="25" fill="#7fc0ea"/>
  <line x1="248" y1="120" x2="248" y2="170" stroke="#5a9fd0" stroke-width="1"/>
  <g stroke="#2f7fc1" stroke-width="2"><line x1="263" y1="90" x2="260" y2="102"/><line x1="277" y1="90" x2="274" y2="102"/></g>
  <text x="270" y="192" text-anchor="middle" font-size="15" font-weight="bold" fill="#2f7fc1">雨量</text>
  <text x="270" y="212" text-anchor="middle" font-size="11" fill="#6f6a63">雨量筒</text>

  <!-- wind -->
  <rect x="360" y="70" width="150" height="150" rx="12" fill="#fff" stroke="#cfe0ee" stroke-width="2"/>
  <line x1="415" y1="105" x2="415" y2="175" stroke="#8a6a3f" stroke-width="4"/>
  <path d="M415 115 l40 8 l-40 8 Z" fill="#4f9a52"/>
  <path d="M395 130 q15 -8 30 0 M395 140 q15 -8 30 0" fill="none" stroke="#4f9a52" stroke-width="1.5"/>
  <text x="435" y="192" text-anchor="middle" font-size="15" font-weight="bold" fill="#4f9a52">風向風速</text>
  <text x="435" y="212" text-anchor="middle" font-size="11" fill="#6f6a63">風向風速計</text>

  <!-- cloud -->
  <rect x="525" y="70" width="150" height="150" rx="12" fill="#fff" stroke="#cfe0ee" stroke-width="2"/>
  <ellipse cx="600" cy="135" rx="45" ry="24" fill="#dbe6ee"/>
  <ellipse cx="575" cy="142" rx="26" ry="16" fill="#dbe6ee"/>
  <ellipse cx="625" cy="142" rx="28" ry="16" fill="#c9d6e0"/>
  <text x="600" y="192" text-anchor="middle" font-size="15" font-weight="bold" fill="#5a6b7c">雲量/雲狀</text>
  <text x="600" y="212" text-anchor="middle" font-size="11" fill="#6f6a63">觀察天空</text>

  <rect x="90" y="255" width="520" height="90" rx="12" fill="#fff8ec" stroke="#f0dca8" stroke-width="2"/>
  <text x="350" y="285" text-anchor="middle" font-size="15" font-weight="bold" fill="#c98f00">💡 測量這些天氣要素，就是預報的第一步</text>
  <text x="350" y="315" text-anchor="middle" font-size="13" fill="#2d2a26">預報員像偵探，蒐集這些「天氣線索」來推測未來天氣</text>
  <text x="350" y="336" text-anchor="middle" font-size="11" fill="#6f6a63">觀測要用同樣的時間、地點、方法才公平</text>
</svg>
