<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eef6f9"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1f7a8c">浮的東西和沉的東西</text>

  <!-- water basin -->
  <path d="M110 120 h480 v210 a20 20 0 0 1 -20 20 h-440 a20 20 0 0 1 -20 -20 Z" fill="#dff1f8" stroke="#7fb0d6" stroke-width="3"/>
  <line x1="110" y1="160" x2="590" y2="160" stroke="#9fcbe4" stroke-width="2"/>
  <text x="128" y="152" font-size="13" fill="#3a7a9a">水面</text>

  <!-- floating items at surface -->
  <rect x="180" y="140" width="46" height="26" rx="4" fill="#c9a05a" stroke="#8a6a30"/>
  <text x="203" y="185" text-anchor="middle" font-size="11" fill="#4d8c4d">木塊</text>
  <rect x="270" y="142" width="40" height="22" rx="6" fill="#f2f2f2" stroke="#cfcfcf"/>
  <text x="290" y="185" text-anchor="middle" font-size="11" fill="#4d8c4d">保麗龍</text>
  <path d="M360 150 a16 8 0 1 0 0.1 0" fill="#e2554d" stroke="#a8352d"/>
  <text x="372" y="185" text-anchor="middle" font-size="11" fill="#4d8c4d">瓶蓋</text>
  <path d="M430 148 q18 -10 34 2 q-14 14 -34 -2 Z" fill="#7fbf6f" stroke="#4d8c4d"/>
  <text x="452" y="185" text-anchor="middle" font-size="11" fill="#4d8c4d">樹葉</text>
  <text x="520" y="150" font-size="15" font-weight="bold" fill="#1f9d55">↑ 浮</text>

  <!-- sinking items at bottom -->
  <rect x="180" y="300" width="34" height="24" rx="4" fill="#8a8a8a" stroke="#5a5a5a"/>
  <text x="197" y="342" text-anchor="middle" font-size="11" fill="#c0392b">石頭</text>
  <g transform="translate(260,306)" stroke="#8a8a8a" stroke-width="3" fill="none"><path d="M-6 -8 v14 a3 3 0 0 0 6 0 v-10 a3 3 0 0 1 6 0 v8"/></g>
  <text x="262" y="342" text-anchor="middle" font-size="11" fill="#c0392b">迴紋針</text>
  <circle cx="345" cy="312" r="12" fill="#e0b84a" stroke="#a8862a"/>
  <text x="345" y="342" text-anchor="middle" font-size="11" fill="#c0392b">硬幣</text>
  <circle cx="420" cy="312" r="10" fill="#bcd8e6" stroke="#5a95b5"/>
  <text x="420" y="342" text-anchor="middle" font-size="11" fill="#c0392b">玻璃珠</text>
  <text x="520" y="318" font-size="15" font-weight="bold" fill="#c0392b">↓ 沉</text>

  <text x="350" y="388" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f7a8c">看看誰浮上來、誰沉下去，它們是什麼做的？</text>
</svg>
