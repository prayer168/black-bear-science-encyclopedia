<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="420" fill="#fffdf9"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">摩擦力的大小，和接觸面有關</text>
  <line x1="350" y1="55" x2="350" y2="360" stroke="#e7ddcd" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- LEFT rough surface -->
  <text x="175" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#c0392b">粗糙面（砂紙）</text>
  <rect x="50" y="220" width="250" height="26" fill="#b5794a"/>
  <g stroke="#8a5a30" stroke-width="3" stroke-linecap="round"><line x1="70" y1="220" x2="66" y2="210"/><line x1="100" y1="220" x2="96" y2="209"/><line x1="130" y1="220" x2="126" y2="211"/><line x1="160" y1="220" x2="156" y2="209"/><line x1="190" y1="220" x2="186" y2="211"/><line x1="220" y1="220" x2="216" y2="209"/><line x1="250" y1="220" x2="246" y2="210"/><line x1="280" y1="220" x2="276" y2="211"/></g>
  <rect x="130" y="175" width="90" height="45" rx="5" fill="#e8a94a" stroke="#c98a3a" stroke-width="2"/>
  <defs>
    <marker id="f2" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#c0392b"/></marker>
    <marker id="p2b" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2f7fc1"/></marker>
  </defs>
  <line x1="130" y1="244" x2="70" y2="244" stroke="#c0392b" stroke-width="7" marker-end="url(#f2)"/>
  <text x="175" y="290" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="bold">摩擦力大</text>
  <text x="175" y="312" text-anchor="middle" font-size="11" fill="#6f6a63">難推動</text>

  <!-- RIGHT smooth surface -->
  <text x="525" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#2f7fc1">光滑面（冰面）</text>
  <rect x="400" y="220" width="250" height="26" fill="#cfe4f5"/>
  <line x1="400" y1="222" x2="650" y2="222" stroke="#a9d3ef" stroke-width="2"/>
  <rect x="480" y="175" width="90" height="45" rx="5" fill="#e8a94a" stroke="#c98a3a" stroke-width="2"/>
  <line x1="480" y1="244" x2="452" y2="244" stroke="#c0392b" stroke-width="3" marker-end="url(#f2)"/>
  <text x="525" y="290" text-anchor="middle" font-size="13" fill="#2f7fc1" font-weight="bold">摩擦力小</text>
  <text x="525" y="312" text-anchor="middle" font-size="11" fill="#6f6a63">輕輕一推就滑走</text>

  <text x="350" y="352" text-anchor="middle" font-size="13" fill="#6b4f3a">接觸面越粗糙，摩擦力越大；越光滑，摩擦力越小</text>
</svg>
