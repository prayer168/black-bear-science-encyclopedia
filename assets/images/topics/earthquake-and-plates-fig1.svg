<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="420" fill="#fdf6e6"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">地球像一顆有裂片外殼的雞蛋</text>
  <!-- cutaway earth -->
  <circle cx="230" cy="230" r="150" fill="#e8a94a"/>
  <!-- core -->
  <circle cx="230" cy="230" r="55" fill="#c0392b"/>
  <text x="230" y="235" text-anchor="middle" font-size="13" fill="#fff">地核（熱）</text>
  <!-- mantle -->
  <circle cx="230" cy="230" r="110" fill="none" stroke="#d97b3a" stroke-width="90" opacity="0.35"/>
  <text x="230" y="140" text-anchor="middle" font-size="12" fill="#8a4a1a">地函</text>
  <!-- crust ring -->
  <circle cx="230" cy="230" r="150" fill="none" stroke="#6b4f3a" stroke-width="10"/>
  <!-- crust cracks (plates) -->
  <g stroke="#3a2c20" stroke-width="3">
    <line x1="230" y1="80" x2="235" y2="120"/><line x1="360" y1="180" x2="330" y2="205"/><line x1="330" y1="300" x2="300" y2="270"/><line x1="120" y1="300" x2="155" y2="265"/><line x1="100" y1="170" x2="145" y2="200"/>
  </g>
  <text x="230" y="400" text-anchor="middle" font-size="12" fill="#6b4f3a">薄薄的地殼裂成好幾塊「板塊」，漂浮在會流動的地函上</text>

  <!-- callout: plates -->
  <rect x="430" y="90" width="240" height="260" rx="12" fill="#fff" stroke="#e7ddcd" stroke-width="2"/>
  <text x="550" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#6b4f3a">板塊會慢慢移動</text>
  <!-- two plates -->
  <rect x="450" y="150" width="90" height="40" rx="4" fill="#8a5f36"/>
  <rect x="560" y="150" width="90" height="40" rx="4" fill="#a86f3f"/>
  <defs><marker id="pl" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2f7fc1"/></marker></defs>
  <line x1="500" y1="210" x2="530" y2="210" stroke="#2f7fc1" stroke-width="4" marker-end="url(#pl)"/>
  <line x1="600" y1="210" x2="570" y2="210" stroke="#2f7fc1" stroke-width="4" marker-end="url(#pl)"/>
  <text x="550" y="245" text-anchor="middle" font-size="11" fill="#2f7fc1">互相擠壓</text>
  <text x="550" y="285" text-anchor="middle" font-size="11" fill="#6f6a63">板塊每年只移動</text>
  <text x="550" y="303" text-anchor="middle" font-size="11" fill="#6f6a63">幾公分，非常慢</text>
  <text x="550" y="330" text-anchor="middle" font-size="11" fill="#c0392b">擠壓的力量累積 → 地震</text>
</svg>
