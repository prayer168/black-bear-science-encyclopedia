<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#f4f6fb"/>
  <text x="350" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#5a4bb0">自己動手造彩虹</text>
  <line x1="350" y1="56" x2="350" y2="342" stroke="#d5d9e6" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- Method A: spray -->
  <text x="175" y="78" text-anchor="middle" font-size="15" font-weight="bold" fill="#3a7bd5">方法A：背對太陽噴水</text>
  <circle cx="60" cy="110" r="18" fill="#f2c60f"/><text x="40" y="150" font-size="11" fill="#c9a10a">太陽在背後</text>
  <!-- child back to sun -->
  <circle cx="150" cy="200" r="18" fill="#6b4f3a"/>
  <rect x="140" y="218" width="20" height="46" rx="8" fill="#8a6a4a"/>
  <!-- spray bottle -->
  <rect x="170" y="215" width="16" height="24" fill="#77c" stroke="#556"/>
  <!-- water mist rainbow -->
  <g opacity="0.9">
    <path d="M210 250 A70 70 0 0 1 300 190" fill="none" stroke="#e23b3b" stroke-width="5"/>
    <path d="M214 256 A62 62 0 0 1 296 200" fill="none" stroke="#f2c60f" stroke-width="5"/>
    <path d="M218 262 A54 54 0 0 1 292 210" fill="none" stroke="#4caf50" stroke-width="5"/>
    <path d="M222 268 A46 46 0 0 1 288 220" fill="none" stroke="#7b41c9" stroke-width="5"/>
  </g>
  <g fill="#9fd0ec"><circle cx="250" cy="250" r="2.5"/><circle cx="270" cy="240" r="2.5"/><circle cx="260" cy="265" r="2.5"/></g>

  <!-- Method B: basin + mirror -->
  <text x="525" y="78" text-anchor="middle" font-size="15" font-weight="bold" fill="#3a7bd5">方法B：水盆＋鏡子</text>
  <ellipse cx="500" cy="300" rx="90" ry="24" fill="#bfe0f5" stroke="#7fb0d6" stroke-width="2"/>
  <rect x="470" y="255" width="10" height="55" fill="#c0c0c0" stroke="#8a8a8a" transform="rotate(18 475 282)"/>
  <line x1="440" y1="120" x2="478" y2="270" stroke="#f2c60f" stroke-width="4"/>
  <text x="425" y="115" font-size="11" fill="#c9a10a">陽光</text>
  <g stroke-width="4">
    <line x1="486" y1="268" x2="640" y2="150" stroke="#e23b3b"/>
    <line x1="486" y1="270" x2="640" y2="168" stroke="#f2c60f"/>
    <line x1="486" y1="272" x2="640" y2="186" stroke="#4caf50"/>
    <line x1="486" y1="274" x2="640" y2="204" stroke="#7b41c9"/>
  </g>
  <text x="600" y="140" font-size="11" fill="#5a4bb0">牆上彩虹</text>

  <!-- warning -->
  <rect x="250" y="352" width="200" height="30" rx="8" fill="#fdecea" stroke="#e0a0a0"/>
  <text x="350" y="372" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">⚠️ 絕對不可直接看太陽、不可聚光！</text>
  <text x="175" y="392" text-anchor="middle" font-size="13" font-weight="bold" fill="#5a4bb0">背對太陽噴水，彩虹就出現！</text>
</svg>
