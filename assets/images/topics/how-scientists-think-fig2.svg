<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eef4ef"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#2f6b4a">觀察、推論、解釋，大不同</text>

  <!-- observation -->
  <rect x="30" y="65" width="205" height="270" rx="12" fill="#fff" stroke="#5a9fd0" stroke-width="2"/>
  <text x="132" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="#2f7fc1">觀察</text>
  <text x="132" y="115" text-anchor="middle" font-size="11" fill="#6f6a63">親眼看到的事實</text>
  <text x="132" y="165" text-anchor="middle" font-size="40">👀</text>
  <rect x="55" y="195" width="155" height="100" rx="8" fill="#eaf4fb"/>
  <!-- yellow sprout -->
  <line x1="132" y1="285" x2="132" y2="230" stroke="#c9b24a" stroke-width="3"/>
  <path d="M132 245 q-14 -8 -22 4 M132 258 q14 -8 22 4" fill="none" stroke="#c9b24a" stroke-width="3"/>
  <text x="132" y="315" text-anchor="middle" font-size="12" fill="#2d2a26">「豆芽是黃的」</text>

  <!-- inference -->
  <rect x="248" y="65" width="205" height="270" rx="12" fill="#fff" stroke="#c98f00" stroke-width="2"/>
  <text x="350" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="#c98f00">推論</text>
  <text x="350" y="115" text-anchor="middle" font-size="11" fill="#6f6a63">根據觀察的「猜測」</text>
  <text x="350" y="175" text-anchor="middle" font-size="44">❓</text>
  <text x="350" y="250" text-anchor="middle" font-size="12" fill="#2d2a26">「可能是缺光」</text>
  <text x="350" y="290" text-anchor="middle" font-size="11" fill="#c0392b">（只是可能，要驗證）</text>

  <!-- explanation -->
  <rect x="466" y="65" width="205" height="270" rx="12" fill="#fff" stroke="#4f9a52" stroke-width="2"/>
  <text x="568" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="#2f7d3a">解釋</text>
  <text x="568" y="115" text-anchor="middle" font-size="11" fill="#6f6a63">背後的原因</text>
  <text x="568" y="175" text-anchor="middle" font-size="40">💡</text>
  <text x="568" y="250" text-anchor="middle" font-size="12" fill="#2d2a26">「沒有光就無法</text>
  <text x="568" y="270" text-anchor="middle" font-size="12" fill="#2d2a26">正常行光合作用」</text>

  <!-- arrows -->
  <g fill="#8a9a7a">
    <path d="M235 200 l15 0 l-5 -6 l12 6 l-12 6 l5 -6 Z"/>
    <path d="M453 200 l15 0 l-5 -6 l12 6 l-12 6 l5 -6 Z"/>
  </g>

  <text x="350" y="366" text-anchor="middle" font-size="13" font-weight="bold" fill="#2f6b4a">把「看到的」和「猜到的」分開，才不會把猜測當成事實。</text>
</svg>
