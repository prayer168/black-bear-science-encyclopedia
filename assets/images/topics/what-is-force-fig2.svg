<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eef0f5"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#3a4a6b">兩種形變：彈得回來 vs 回不去</text>

  <!-- top: recoverable (rubber band) -->
  <rect x="30" y="60" width="640" height="145" rx="12" fill="#eaf7ee" stroke="#c7e0c9" stroke-width="2"/>
  <text x="120" y="90" text-anchor="middle" font-size="15" font-weight="bold" fill="#2f7d3a">可恢復（彈性形變）</text>
  <!-- original -->
  <line x1="70" y1="130" x2="150" y2="130" stroke="#4f9a52" stroke-width="5"/>
  <text x="110" y="160" text-anchor="middle" font-size="11" fill="#2d2a26">橡皮筋原狀</text>
  <text x="185" y="135" font-size="18" fill="#8a6a3f">→拉→</text>
  <!-- stretched -->
  <line x1="240" y1="130" x2="380" y2="130" stroke="#4f9a52" stroke-width="4"/>
  <text x="310" y="160" text-anchor="middle" font-size="11" fill="#2d2a26">拉長</text>
  <text x="410" y="135" font-size="16" fill="#8a6a3f">→放開→</text>
  <!-- back -->
  <line x1="480" y1="130" x2="560" y2="130" stroke="#4f9a52" stroke-width="5"/>
  <text x="600" y="128" font-size="13" font-weight="bold" fill="#2f7d3a">✔ 彈回原狀</text>
  <text x="600" y="148" font-size="10" fill="#6f6a63">橡皮筋、彈簧</text>

  <!-- bottom: unrecoverable (clay) -->
  <rect x="30" y="220" width="640" height="145" rx="12" fill="#fbeee6" stroke="#e6d3b8" stroke-width="2"/>
  <text x="120" y="250" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">不可恢復（塑性形變）</text>
  <circle cx="110" cy="300" r="26" fill="#d9a86a" stroke="#a8763a" stroke-width="2"/>
  <text x="110" y="345" text-anchor="middle" font-size="11" fill="#2d2a26">黏土球</text>
  <text x="185" y="305" font-size="18" fill="#8a6a3f">→壓→</text>
  <ellipse cx="310" cy="300" rx="40" ry="15" fill="#d9a86a" stroke="#a8763a" stroke-width="2"/>
  <text x="310" y="345" text-anchor="middle" font-size="11" fill="#2d2a26">被壓扁</text>
  <text x="410" y="305" font-size="16" fill="#8a6a3f">→放開→</text>
  <ellipse cx="530" cy="300" rx="40" ry="15" fill="#d9a86a" stroke="#a8763a" stroke-width="2"/>
  <text x="620" y="298" font-size="13" font-weight="bold" fill="#c0392b">✘ 回不去</text>
  <text x="620" y="318" font-size="10" fill="#6f6a63">黏土、麵團</text>

  <text x="350" y="388" text-anchor="middle" font-size="12" fill="#3a4a6b">同樣被施力變形，有的彈得回來，有的回不去。</text>
</svg>
