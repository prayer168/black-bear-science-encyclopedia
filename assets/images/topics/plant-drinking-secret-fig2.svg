<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#faf0f0"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#b0405a">芹菜染色與莖橫切</text>

  <!-- cup with red water -->
  <path d="M120 250 L112 360 q0 20 22 20 L216 380 q22 0 22 -20 L230 250 z" fill="#f4c6cf" stroke="#c98a96" stroke-width="2"/>
  <path d="M118 290 L232 290 L226 360 q0 20 -22 20 L138 380 q-22 0 -22 -20 z" fill="#e57a8c" opacity="0.75"/>
  <text x="175" y="345" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">紅色素水</text>

  <!-- celery stalk -->
  <rect x="168" y="90" width="14" height="170" fill="#8fbf50"/>
  <!-- red lines inside stalk -->
  <line x1="172" y1="255" x2="172" y2="100" stroke="#d63a52" stroke-width="2"/>
  <line x1="178" y1="255" x2="178" y2="110" stroke="#d63a52" stroke-width="2"/>
  <!-- leaves with red veins -->
  <ellipse cx="150" cy="90" rx="30" ry="16" fill="#7bb046" transform="rotate(-25 150 90)"/>
  <ellipse cx="200" cy="88" rx="30" ry="16" fill="#7bb046" transform="rotate(25 200 88)"/>
  <g stroke="#d63a52" stroke-width="1.5"><path d="M175 100 l-22 -14"/><path d="M175 100 l22 -14"/></g>
  <text x="175" y="72" text-anchor="middle" font-size="12" fill="#b0405a">葉脈變紅</text>

  <!-- arrow to cross-section -->
  <path d="M270 220 L340 220" stroke="#b0405a" stroke-width="4" marker-end="url(#cs)"/>
  <defs><marker id="cs" markerWidth="12" markerHeight="12" refX="4" refY="4" orient="auto"><path d="M0 8 L8 4 L0 0 z" fill="#b0405a"/></marker></defs>
  <text x="305" y="205" text-anchor="middle" font-size="12" fill="#b0405a">橫切</text>

  <!-- cross section -->
  <circle cx="480" cy="220" r="110" fill="#dff0c8" stroke="#8fbf50" stroke-width="4"/>
  <g fill="#d63a52">
    <circle cx="480" cy="140" r="9"/><circle cx="540" cy="165" r="9"/><circle cx="558" cy="225" r="9"/>
    <circle cx="535" cy="282" r="9"/><circle cx="480" cy="305" r="9"/><circle cx="425" cy="282" r="9"/>
    <circle cx="402" cy="225" r="9"/><circle cx="422" cy="165" r="9"/>
  </g>
  <text x="480" y="225" text-anchor="middle" font-size="13" fill="#3a7030" font-weight="bold">紅點＝運輸管</text>
  <text x="480" y="350" text-anchor="middle" font-size="13" fill="#5a8020">莖切面：染色的管子排成一圈</text>

  <text x="350" y="392" text-anchor="middle" font-size="14" font-weight="bold" fill="#b0405a">紅水順著莖裡的管子往上爬，橫切就看得到！</text>
</svg>
