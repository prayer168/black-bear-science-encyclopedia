<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#f5eee2"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#7a5230">土壤裡藏著什麼？</text>

  <!-- magnified soil clump -->
  <ellipse cx="350" cy="220" rx="230" ry="150" fill="#a9754a"/>
  <ellipse cx="350" cy="220" rx="230" ry="150" fill="none" stroke="#6b4326" stroke-width="3" stroke-dasharray="6 5"/>
  <!-- humus dark top -->
  <path d="M120 130 q230 -40 460 0 q-30 40 -230 40 q-200 0 -230 -40 z" fill="#4b3218" opacity="0.85"/>
  <text x="350" y="120" text-anchor="middle" font-size="13" fill="#4b3218" font-weight="bold">黑黑的腐植質（養分多）</text>

  <!-- sand grains -->
  <g fill="#d8b06a" stroke="#a5813f" stroke-width="1">
    <circle cx="250" cy="230" r="16"/><circle cx="430" cy="250" r="14"/><circle cx="300" cy="290" r="12"/><circle cx="470" cy="200" r="10"/>
  </g>
  <text x="250" y="234" text-anchor="middle" font-size="10" fill="#5a3d12">砂</text>
  <text x="200" y="330" font-size="12" fill="#7a5230" font-weight="bold">粗砂與小石頭</text>

  <!-- clay fine -->
  <g fill="#c98f66"><circle cx="360" cy="220" r="4"/><circle cx="375" cy="235" r="3"/><circle cx="345" cy="240" r="3"/><circle cx="390" cy="215" r="3"/><circle cx="330" cy="225" r="3"/></g>
  <text x="360" y="205" text-anchor="middle" font-size="11" fill="#6b4326" font-weight="bold">細細的黏土</text>

  <!-- air/water gaps -->
  <g fill="#bfe0ef" stroke="#7fb0d6" stroke-width="1"><circle cx="410" cy="290" r="9"/><circle cx="230" cy="270" r="8"/></g>
  <text x="410" y="320" text-anchor="middle" font-size="11" fill="#2a6a8a">縫隙藏空氣和水</text>

  <!-- earthworm -->
  <path d="M470 300 q30 -20 55 -5 q20 12 40 2" fill="none" stroke="#c56a7a" stroke-width="12" stroke-linecap="round"/>
  <text x="540" y="335" text-anchor="middle" font-size="12" fill="#a24a5a" font-weight="bold">蚯蚓等小生物</text>

  <!-- fallen leaf -->
  <path d="M180 190 q20 -18 44 -6 q-6 24 -30 26 q-18 -6 -14 -20 z" fill="#8aa843" stroke="#5f7a26" stroke-width="1.5"/>
  <text x="150" y="185" font-size="11" fill="#5f7a26">落葉</text>

  <text x="350" y="392" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a5230">小小一坨土，藏著砂石、黏土、腐植質、空氣、水和小生物！</text>
</svg>
