<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eef3f7"/>
  <text x="350" y="32" text-anchor="middle" font-size="21" font-weight="bold" fill="#3a6a8a">偽裝為什麼能保命——鳥找不到</text>
  <line x1="350" y1="56" x2="350" y2="345" stroke="#cdd8e0" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- LEFT: on branch, safe -->
  <text x="175" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f9d55">對的背景 → 安全</text>
  <rect x="30" y="95" width="290" height="230" rx="10" fill="#eae0c8"/>
  <path d="M60 260 L280 150" stroke="#9a7a4a" stroke-width="12" stroke-linecap="round"/>
  <g transform="translate(175,205) rotate(-27)"><rect x="-30" y="-3" width="60" height="6" rx="3" fill="#a2824e" stroke="#7a5a2a"/><circle cx="-30" cy="0" r="4" fill="#a2824e" stroke="#7a5a2a"/></g>
  <!-- bird looking, puzzled -->
  <g transform="translate(90,140)"><ellipse rx="18" ry="14" fill="#6a9ac0"/><circle cx="10" cy="-4" r="9" fill="#6a9ac0"/><path d="M18 -4 l10 2 l-10 3 Z" fill="#e0a040"/><circle cx="12" cy="-5" r="2" fill="#fff"/></g>
  <text x="90" y="180" text-anchor="middle" font-size="14">❓</text>
  <text x="175" y="305" text-anchor="middle" font-size="12" fill="#1f7a3a">鳥找不到樹枝上的蟲</text>

  <!-- RIGHT: on white wall, exposed -->
  <text x="525" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">錯的背景 → 露餡</text>
  <rect x="380" y="95" width="290" height="230" rx="10" fill="#ffffff" stroke="#e0e0e0"/>
  <g transform="translate(525,210) rotate(-20)"><rect x="-30" y="-3" width="60" height="6" rx="3" fill="#a2824e" stroke="#7a5a2a"/><circle cx="-30" cy="0" r="4" fill="#a2824e" stroke="#7a5a2a"/><g stroke="#7a5a2a" stroke-width="1.2"><line x1="-10" y1="3" x2="-16" y2="14"/><line x1="8" y1="3" x2="14" y2="13"/></g></g>
  <!-- bird spotting -->
  <g transform="translate(440,140)"><ellipse rx="18" ry="14" fill="#c06a6a"/><circle cx="10" cy="-4" r="9" fill="#c06a6a"/><path d="M18 -4 l10 2 l-10 3 Z" fill="#e0a040"/><circle cx="12" cy="-5" r="2" fill="#fff"/></g>
  <path d="M458 150 l50 40" stroke="#c0392b" stroke-width="2" marker-end="url(#a)"/>
  <text x="440" y="180" text-anchor="middle" font-size="14">❗</text>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0 0 L6 4 L0 8 z" fill="#c0392b"/></marker></defs>
  <text x="525" y="305" text-anchor="middle" font-size="12" fill="#c0392b">白牆上一眼就被看到</text>

  <text x="350" y="386" text-anchor="middle" font-size="14" font-weight="bold" fill="#3a6a8a">藏對地方才有用，跑錯背景就露餡。</text>
</svg>
