<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#f2efe6"/>
  <text x="350" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b5a3a">三大類岩石的身世</text>

  <!-- igneous -->
  <rect x="25" y="60" width="210" height="300" rx="12" fill="#fff" stroke="#e0d6bc" stroke-width="2"/>
  <text x="130" y="88" text-anchor="middle" font-size="16" font-weight="bold" fill="#c0392b">火成岩</text>
  <path d="M80 110 q50 -20 100 0 l-8 30 q-42 -14 -84 0 Z" fill="#e8734b"/>
  <text x="130" y="135" text-anchor="middle" font-size="20">🌋</text>
  <text x="130" y="175" text-anchor="middle" font-size="12" fill="#2d2a26">岩漿冷卻凝固</text>
  <rect x="90" y="195" width="80" height="55" rx="6" fill="#5a5450" stroke="#333"/>
  <g fill="#8a847e"><circle cx="108" cy="215" r="4"/><circle cx="135" cy="225" r="4"/><circle cx="152" cy="212" r="4"/><circle cx="120" cy="238" r="4"/></g>
  <text x="130" y="278" text-anchor="middle" font-size="11" fill="#6f6a63">有礦物結晶顆粒</text>
  <text x="130" y="300" text-anchor="middle" font-size="11" fill="#8a531e">例：玄武岩、花崗岩</text>
  <text x="130" y="330" text-anchor="middle" font-size="10" fill="#6f6a63">澎湖柱狀玄武岩</text>

  <!-- sedimentary -->
  <rect x="245" y="60" width="210" height="300" rx="12" fill="#fff" stroke="#e0d6bc" stroke-width="2"/>
  <text x="350" y="88" text-anchor="middle" font-size="16" font-weight="bold" fill="#2f7d3a">沉積岩</text>
  <text x="350" y="130" text-anchor="middle" font-size="12" fill="#2d2a26">泥沙、生物遺骸堆積壓成</text>
  <g>
    <rect x="290" y="150" width="120" height="14" fill="#d8c69a"/>
    <rect x="290" y="166" width="120" height="14" fill="#c9b489"/>
    <rect x="290" y="182" width="120" height="14" fill="#dccaa0"/>
    <rect x="290" y="198" width="120" height="14" fill="#c4ac7e"/>
    <path d="M330 190 a10 8 0 0 1 20 0 a10 8 0 0 1 -20 0" fill="none" stroke="#7a5a3a" stroke-width="1.5"/>
    <text x="368" y="196" font-size="14">🐚</text>
  </g>
  <text x="350" y="235" text-anchor="middle" font-size="11" fill="#6f6a63">一層層層理、常含化石</text>
  <text x="350" y="262" text-anchor="middle" font-size="11" fill="#8a531e">例：砂岩、石灰岩</text>
  <text x="350" y="292" text-anchor="middle" font-size="10" fill="#6f6a63">貝殼就是這樣被埋進去的</text>

  <!-- metamorphic -->
  <rect x="465" y="60" width="210" height="300" rx="12" fill="#fff" stroke="#e0d6bc" stroke-width="2"/>
  <text x="570" y="88" text-anchor="middle" font-size="16" font-weight="bold" fill="#7d5aa8">變質岩</text>
  <text x="570" y="128" text-anchor="middle" font-size="12" fill="#2d2a26">高溫、高壓改造原岩</text>
  <text x="540" y="160" font-size="18">🔥</text>
  <path d="M560 150 l6 0 M560 156 l6 0" stroke="#c0392b" stroke-width="2"/>
  <path d="M600 145 l0 24 M594 152 l12 10 M606 152 l-12 10" stroke="#2f7fc1" stroke-width="2"/>
  <text x="600" y="140" font-size="9" fill="#2f7fc1">壓</text>
  <rect x="510" y="180" width="120" height="55" rx="6" fill="#e8e4ee" stroke="#9a8ab0"/>
  <path d="M510 195 q60 -8 120 0 M510 210 q60 8 120 0 M510 225 q60 -8 120 0" fill="none" stroke="#9a8ab0" stroke-width="2"/>
  <text x="570" y="262" text-anchor="middle" font-size="11" fill="#6f6a63">常有條帶狀紋理</text>
  <text x="570" y="290" text-anchor="middle" font-size="11" fill="#8a531e">例：大理岩、板岩</text>
  <text x="570" y="320" text-anchor="middle" font-size="10" fill="#6f6a63">石灰岩→大理岩</text>

  <text x="350" y="384" text-anchor="middle" font-size="12" font-weight="bold" fill="#6b5a3a">火燒的、堆疊的、被改造的——長相藏著身世。</text>
</svg>
