<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="420" fill="#fffdf9"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">摩擦力：擋住運動的隱形手</text>
  <!-- surface -->
  <rect x="60" y="250" width="580" height="30" fill="#c99a63"/>
  <g stroke="#a86f3f" stroke-width="2"><line x1="90" y1="250" x2="80" y2="240"/><line x1="150" y1="250" x2="140" y2="240"/><line x1="230" y1="250" x2="220" y2="240"/><line x1="330" y1="250" x2="320" y2="240"/><line x1="430" y1="250" x2="420" y2="240"/><line x1="540" y1="250" x2="530" y2="240"/></g>
  <!-- box being pushed -->
  <rect x="230" y="180" width="110" height="70" rx="6" fill="#e8a94a" stroke="#c98a3a" stroke-width="2"/>
  <text x="285" y="222" text-anchor="middle" font-size="16" fill="#6b4f3a">物體</text>
  <!-- push arrow (right) -->
  <defs>
    <marker id="pu" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2f7fc1"/></marker>
    <marker id="fr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#c0392b"/></marker>
  </defs>
  <line x1="345" y1="215" x2="440" y2="215" stroke="#2f7fc1" stroke-width="6" marker-end="url(#pu)"/>
  <text x="450" y="210" font-size="14" fill="#2f7fc1" font-weight="bold">推力 →</text>
  <!-- friction arrow (left, opposite, at contact surface) -->
  <line x1="230" y1="248" x2="150" y2="248" stroke="#c0392b" stroke-width="6" marker-end="url(#fr)"/>
  <text x="90" y="243" font-size="14" fill="#c0392b" font-weight="bold">← 摩擦力</text>
  <!-- contact zone highlight -->
  <ellipse cx="285" cy="252" rx="60" ry="10" fill="#c0392b" opacity="0.15"/>
  <text x="285" y="290" text-anchor="middle" font-size="12" fill="#c0392b">摩擦力發生在兩個接觸面之間</text>
  <text x="350" y="330" text-anchor="middle" font-size="14" fill="#6b4f3a">摩擦力的方向，總是和物體「想動的方向」相反</text>
  <text x="350" y="360" text-anchor="middle" font-size="12" fill="#3f7d4f">接觸面越粗糙、壓得越重，摩擦力通常越大</text>
</svg>
