<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#0e1226"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffd28a">地球內部很熱，不是火在燒</text>

  <!-- earth cross-section, concentric -->
  <circle cx="300" cy="215" r="150" fill="#7a4a2a"/>
  <circle cx="300" cy="215" r="150" fill="none" stroke="#a86a3a" stroke-width="3"/>
  <circle cx="300" cy="215" r="110" fill="#c0601e"/>
  <circle cx="300" cy="215" r="60" fill="#f0a020"/>
  <circle cx="300" cy="215" r="26" fill="#ffe070"/>
  <!-- crust thin outline -->
  <circle cx="300" cy="215" r="150" fill="none" stroke="#3a7a4a" stroke-width="6" opacity="0.6"/>

  <!-- labels -->
  <g font-size="13">
    <line x1="300" y1="65" x2="300" y2="40" stroke="#888" stroke-width="1.5"/>
    <text x="300" y="34" text-anchor="middle" fill="#9fd0a0">地殼（薄·涼）</text>
    <line x1="380" y1="150" x2="470" y2="120" stroke="#888" stroke-width="1.5"/>
    <text x="475" y="118" fill="#f0b060">地函（熱·熔化岩石）</text>
    <line x1="300" y1="215" x2="470" y2="215" stroke="#888" stroke-width="1.5"/>
    <text x="475" y="219" fill="#ffe070">地核（最熱）</text>
  </g>

  <!-- magma rising hint -->
  <path d="M340 120 q10 -30 26 -50" stroke="#e0781e" stroke-width="5" fill="none" marker-end="url(#a)"/>
  <text x="380" y="70" font-size="12" fill="#e0781e">熔成岩漿上升</text>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="4" refY="2" orient="auto"><path d="M0 8 L4 0 L8 8 z" fill="#e0781e"/></marker></defs>

  <!-- note: not burning -->
  <rect x="430" y="300" width="240" height="56" rx="8" fill="#1a2036" stroke="#3a4560"/>
  <text x="550" y="324" text-anchor="middle" font-size="13" fill="#ff9a6a" font-weight="bold">不是火在燒 🔥✗</text>
  <text x="550" y="344" text-anchor="middle" font-size="11" fill="#c0c8e0">地底幾乎沒有氧氣，燒不起來</text>

  <text x="350" y="386" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffd28a">地球內部本來就很熱，把岩石熔成岩漿。</text>
</svg>
