<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eef7ea"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#4d8c4d">刺激與反應——碰一下就縮起來</text>

  <!-- divider -->
  <line x1="350" y1="60" x2="350" y2="360" stroke="#c7dcc0" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- LEFT: snail touched -->
  <text x="175" y="70" text-anchor="middle" font-size="15" font-weight="bold" fill="#5a7a3a">輕碰蝸牛 → 縮進殼</text>
  <g transform="translate(150,190)">
    <circle r="52" fill="#d9a15a" stroke="#a9743a" stroke-width="3"/>
    <path d="M0 0 a16 16 0 1 1 -0.1 0 M0 0 a32 32 0 1 1 -0.1 0" fill="none" stroke="#a9743a" stroke-width="2.5"/>
    <!-- tiny retracted body -->
    <ellipse cx="-40" cy="30" rx="16" ry="9" fill="#e7c9a0" stroke="#c49a68"/>
  </g>
  <!-- finger -->
  <path d="M120 110 l20 40" stroke="#f0c0a0" stroke-width="14" stroke-linecap="round"/>
  <circle cx="118" cy="106" r="10" fill="#f0c0a0"/>
  <path d="M130 150 q6 12 -4 20" stroke="#a8531e" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
  <text x="110" y="300" text-anchor="middle" font-size="13" fill="#6f6a63">觸角、身體都縮回去</text>

  <!-- RIGHT: earthworm to light -->
  <text x="525" y="70" text-anchor="middle" font-size="15" font-weight="bold" fill="#5a7a3a">遇到光 → 鑽回土</text>
  <!-- soil -->
  <rect x="420" y="230" width="210" height="90" fill="#8a6a4a"/>
  <rect x="420" y="230" width="210" height="14" fill="#6f5238"/>
  <!-- worm diving into soil -->
  <path d="M470 200 Q500 210 520 240 Q535 262 560 275" fill="none" stroke="#c4736a" stroke-width="20" stroke-linecap="round"/>
  <g stroke="#9a4f47" stroke-width="1.6" opacity="0.7"><line x1="490" y1="200" x2="498" y2="220"/><line x1="512" y1="228" x2="522" y2="246"/></g>
  <!-- flashlight beam -->
  <path d="M470 90 L440 180 L520 180 Z" fill="#ffe9a8" opacity="0.75"/>
  <rect x="458" y="72" width="28" height="20" rx="4" fill="#555"/>
  <path d="M540 210 q-20 6 -34 20" stroke="#a8531e" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
  <text x="525" y="305" text-anchor="middle" font-size="13" fill="#fbe7c0">往暗處、往土裡鑽</text>

  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M0 0 L7 4 L0 8 z" fill="#a8531e"/></marker></defs>
  <text x="350" y="388" text-anchor="middle" font-size="14" font-weight="bold" fill="#4d8c4d">碰一下就縮起來，是牠們保護自己的方法。</text>
</svg>
