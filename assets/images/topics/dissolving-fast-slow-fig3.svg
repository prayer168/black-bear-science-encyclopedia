<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="380" fill="#eef8ee"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">糖「溶解」了，它消失了嗎？</text>
  <!-- balance scale -->
  <line x1="350" y1="90" x2="350" y2="130" stroke="#6b4f3a" stroke-width="4"/>
  <line x1="180" y1="130" x2="520" y2="130" stroke="#6b4f3a" stroke-width="4"/>
  <path d="M350 90 l-8 -14 h16 z" fill="#6b4f3a"/>
  <!-- left pan: sugar + water -->
  <line x1="180" y1="130" x2="180" y2="180" stroke="#8a795c" stroke-width="2"/>
  <path d="M145 180 h70 l-10 30 h-50 z" fill="#cfe4f5" stroke="#2f7fc1" stroke-width="2"/>
  <g fill="#c9a35a"><circle cx="165" cy="195" r="2"/><circle cx="180" cy="200" r="2"/><circle cx="195" cy="195" r="2"/></g>
  <text x="180" y="235" text-anchor="middle" font-size="12" fill="#2d2a26">糖水（溶解後）</text>
  <!-- right pan: cup + sugar packet -->
  <line x1="520" y1="130" x2="520" y2="180" stroke="#8a795c" stroke-width="2"/>
  <path d="M485 180 h70 l-10 30 h-50 z" fill="#cfe4f5" stroke="#2f7fc1" stroke-width="2"/>
  <rect x="505" y="160" width="30" height="18" fill="#c9a35a"/>
  <text x="520" y="235" text-anchor="middle" font-size="12" fill="#2d2a26">水＋糖（溶解前）</text>
  <text x="350" y="165" text-anchor="middle" font-size="20" fill="#5aa469">＝</text>
  <rect x="120" y="270" width="460" height="90" rx="12" fill="#fff8e6" stroke="#f2e0a8" stroke-width="2"/>
  <text x="350" y="300" text-anchor="middle" font-size="14" font-weight="bold" fill="#c98f00">💡 糖沒有消失，只是「看不見」了</text>
  <text x="350" y="326" text-anchor="middle" font-size="13" fill="#2d2a26">糖變成很小的顆粒散在水中（嚐起來還是甜的）</text>
  <text x="350" y="348" text-anchor="middle" font-size="13" fill="#2d2a26">溶解前後總重量一樣，這叫「重量守恆」</text>
</svg>
