<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eef4f7"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#3a6a55">土壤沉澱分層實驗</text>

  <!-- step 1: stir -->
  <g>
    <path d="M110 120 L110 300 q0 24 24 24 L166 324 q24 0 24 -24 L214 120 z" fill="#cdeaf2" stroke="#88b8c8" stroke-width="2"/>
    <path d="M110 120 L214 120" stroke="#88b8c8" stroke-width="2"/>
    <ellipse cx="162" cy="220" rx="40" ry="30" fill="#a9754a" opacity="0.5"/>
    <g fill="#8a5a34" opacity="0.6"><circle cx="150" cy="210" r="5"/><circle cx="175" cy="230" r="5"/><circle cx="160" cy="245" r="4"/><circle cx="180" cy="200" r="4"/></g>
    <path d="M162 100 L162 250" stroke="#7a5230" stroke-width="4"/>
    <text x="162" y="360" text-anchor="middle" font-size="14" fill="#3a6a55" font-weight="bold">① 加水搖一搖</text>
  </g>

  <!-- arrow -->
  <path d="M240 220 L300 220" stroke="#3a6a55" stroke-width="4" marker-end="url(#ar)"/>
  <defs><marker id="ar" markerWidth="12" markerHeight="12" refX="4" refY="4" orient="auto"><path d="M0 8 L8 4 L0 0 z" fill="#3a6a55"/></marker></defs>
  <text x="270" y="205" text-anchor="middle" font-size="12" fill="#3a6a55">靜置</text>

  <!-- step 2: settled layers -->
  <g>
    <path d="M360 100 L360 300 q0 24 24 24 L520 324 q24 0 24 -24 L544 100 z" fill="#dff0f5" stroke="#88b8c8" stroke-width="2"/>
    <path d="M360 100 L544 100" stroke="#88b8c8" stroke-width="2"/>
    <!-- water turbid top -->
    <path d="M360 150 L544 150 L544 260 L360 260 z" fill="#c9a98a" opacity="0.5"/>
    <!-- clay layer -->
    <path d="M360 235 L544 235 L544 260 L360 260 z" fill="#b98a63"/>
    <text x="452" y="200" text-anchor="middle" font-size="12" fill="#6b4326">水混濁·細黏土慢慢沉</text>
    <!-- fine sand -->
    <path d="M360 260 L544 260 L544 285 L360 285 z" fill="#cf9f55"/>
    <text x="452" y="277" text-anchor="middle" font-size="12" fill="#5a3d12">中層：細砂</text>
    <!-- coarse sand bottom -->
    <path d="M360 285 L544 285 L544 300 q0 24 24 24 L520 324 q24 0 24 -24 L544 285 z" fill="#b07a3a"/>
    <path d="M360 285 L544 285 L544 300 q0 24 24 24 L520 324 q24 0 24 -24 L544 285" fill="#b07a3a" stroke="none"/>
    <g fill="#8a5a2a"><circle cx="410" cy="305" r="6"/><circle cx="460" cy="308" r="7"/><circle cx="500" cy="304" r="5"/></g>
    <text x="452" y="315" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">底層：粗砂石先沉</text>
    <!-- floating leaves -->
    <path d="M400 150 q10 -8 22 -2 q-4 12 -16 12 q-8 -4 -6 -10 z" fill="#8aa843" stroke="#5f7a26" stroke-width="1"/>
    <path d="M480 145 q10 -8 22 -2 q-4 12 -16 12 q-8 -4 -6 -10 z" fill="#9bb356" stroke="#5f7a26" stroke-width="1"/>
    <text x="452" y="135" text-anchor="middle" font-size="12" fill="#5f7a26" font-weight="bold">爛葉浮在水面</text>
    <text x="452" y="360" text-anchor="middle" font-size="14" fill="#3a6a55" font-weight="bold">② 靜置後分層</text>
  </g>

  <text x="350" y="392" text-anchor="middle" font-size="14" font-weight="bold" fill="#3a6a55">粗顆粒先沉最底、細黏土最後沉在上，爛葉浮起——土壤是多種顆粒組成的。</text>
</svg>
