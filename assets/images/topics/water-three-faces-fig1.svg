<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eaf5ff"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">水的三張臉：固態、液態、氣態</text>
  <!-- ice -->
  <rect x="70" y="120" width="120" height="90" rx="10" fill="#cfe4f5" stroke="#7fb0d6" stroke-width="3"/>
  <text x="130" y="165" text-anchor="middle" font-size="18">🧊</text>
  <text x="130" y="230" text-anchor="middle" font-size="15" font-weight="bold" fill="#2f7fc1">固態（冰）</text>
  <text x="130" y="250" text-anchor="middle" font-size="11" fill="#6f6a63">硬硬的、有固定形狀</text>
  <!-- water -->
  <rect x="290" y="120" width="120" height="90" rx="10" fill="#a9d3ef" stroke="#2f7fc1" stroke-width="3"/>
  <text x="350" y="165" text-anchor="middle" font-size="18">💧</text>
  <text x="350" y="230" text-anchor="middle" font-size="15" font-weight="bold" fill="#2f7fc1">液態（水）</text>
  <text x="350" y="250" text-anchor="middle" font-size="11" fill="#6f6a63">會流動、形狀隨容器</text>
  <!-- vapor -->
  <rect x="510" y="120" width="120" height="90" rx="10" fill="#eef6fc" stroke="#b8d4e8" stroke-width="3" stroke-dasharray="5 4"/>
  <text x="570" y="165" text-anchor="middle" font-size="18">☁️</text>
  <text x="570" y="230" text-anchor="middle" font-size="15" font-weight="bold" fill="#7fb0d6">氣態（水蒸氣）</text>
  <text x="570" y="250" text-anchor="middle" font-size="11" fill="#6f6a63">看不見、飄散到空氣中</text>
  <!-- arrows heat/cool -->
  <defs>
    <marker id="hot" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#e8743b"/></marker>
    <marker id="cold" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2f7fc1"/></marker>
  </defs>
  <line x1="195" y1="150" x2="285" y2="150" stroke="#e8743b" stroke-width="4" marker-end="url(#hot)"/>
  <text x="240" y="140" text-anchor="middle" font-size="11" fill="#e8743b">加熱→融化</text>
  <line x1="285" y1="185" x2="195" y2="185" stroke="#2f7fc1" stroke-width="4" marker-end="url(#cold)"/>
  <text x="240" y="205" text-anchor="middle" font-size="11" fill="#2f7fc1">冷卻→結冰</text>
  <line x1="415" y1="150" x2="505" y2="150" stroke="#e8743b" stroke-width="4" marker-end="url(#hot)"/>
  <text x="460" y="140" text-anchor="middle" font-size="11" fill="#e8743b">加熱→蒸發</text>
  <line x1="505" y1="185" x2="415" y2="185" stroke="#2f7fc1" stroke-width="4" marker-end="url(#cold)"/>
  <text x="460" y="205" text-anchor="middle" font-size="11" fill="#2f7fc1">冷卻→凝結</text>
  <text x="350" y="320" text-anchor="middle" font-size="14" fill="#c0392b">三種都是「水」！只是冷熱（溫度）讓它換了樣子</text>
  <text x="350" y="350" text-anchor="middle" font-size="12" fill="#3f7d4f">加熱：固→液→氣　　冷卻：氣→液→固</text>
</svg>
