<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="300" fill="#1b2340"/>
  <text x="350" y="34" text-anchor="middle" font-size="21" font-weight="bold" fill="#fff">月相變化的順序（約一個月一輪）</text>
  <defs>
    <clipPath id="c1"><circle cx="90" cy="150" r="30"/></clipPath>
    <clipPath id="c2"><circle cx="230" cy="150" r="30"/></clipPath>
    <clipPath id="c3"><circle cx="370" cy="150" r="30"/></clipPath>
    <clipPath id="c4"><circle cx="510" cy="150" r="30"/></clipPath>
    <clipPath id="c5"><circle cx="620" cy="150" r="30"/></clipPath>
  </defs>
  <!-- new moon -->
  <circle cx="90" cy="150" r="30" fill="#2a2f45" stroke="#4a5578" stroke-width="1.5"/>
  <text x="90" y="205" text-anchor="middle" font-size="12" fill="#9fb0d0">新月</text>
  <text x="90" y="222" text-anchor="middle" font-size="10" fill="#6a7aa0">初一</text>
  <!-- first quarter (right half lit) -->
  <circle cx="230" cy="150" r="30" fill="#2a2f45"/><rect x="230" y="120" width="30" height="60" fill="#e9e6d8" clip-path="url(#c2)"/>
  <circle cx="230" cy="150" r="30" fill="none" stroke="#4a5578" stroke-width="1.5"/>
  <text x="230" y="205" text-anchor="middle" font-size="12" fill="#cfe0ff">上弦月</text>
  <text x="230" y="222" text-anchor="middle" font-size="10" fill="#6a7aa0">初七、初八</text>
  <!-- full moon -->
  <circle cx="370" cy="150" r="30" fill="#f4e9b8" stroke="#e0d38a" stroke-width="1.5"/>
  <text x="370" y="205" text-anchor="middle" font-size="12" fill="#f4e9b8">滿月</text>
  <text x="370" y="222" text-anchor="middle" font-size="10" fill="#6a7aa0">十五、十六</text>
  <!-- last quarter (left half lit) -->
  <circle cx="510" cy="150" r="30" fill="#2a2f45"/><rect x="480" y="120" width="30" height="60" fill="#e9e6d8" clip-path="url(#c4)"/>
  <circle cx="510" cy="150" r="30" fill="none" stroke="#4a5578" stroke-width="1.5"/>
  <text x="510" y="205" text-anchor="middle" font-size="12" fill="#cfe0ff">下弦月</text>
  <text x="510" y="222" text-anchor="middle" font-size="10" fill="#6a7aa0">廿二、廿三</text>
  <!-- back to new -->
  <circle cx="620" cy="150" r="30" fill="#2a2f45" stroke="#4a5578" stroke-width="1.5"/>
  <text x="620" y="205" text-anchor="middle" font-size="12" fill="#9fb0d0">新月</text>
  <!-- arrows -->
  <defs><marker id="ma" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7f8fb8"/></marker></defs>
  <g stroke="#7f8fb8" stroke-width="2">
    <line x1="128" y1="150" x2="192" y2="150" marker-end="url(#ma)"/>
    <line x1="268" y1="150" x2="332" y2="150" marker-end="url(#ma)"/>
    <line x1="408" y1="150" x2="472" y2="150" marker-end="url(#ma)"/>
    <line x1="548" y1="150" x2="584" y2="150" marker-end="url(#ma)"/>
  </g>
  <text x="350" y="275" text-anchor="middle" font-size="12" fill="#c0392b">月亮沒有變形！只是被太陽照亮的部分，看起來多或少</text>
</svg>
