<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eef4ef"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#2f6b4a">設計一個「公平」的實驗</text>
  <text x="350" y="58" text-anchor="middle" font-size="13" fill="#6f6a63">題目：陽光會不會影響綠豆生長？</text>

  <!-- group A: light -->
  <rect x="55" y="80" width="250" height="185" rx="12" fill="#fff8e6" stroke="#e0c06a" stroke-width="2"/>
  <text x="180" y="106" text-anchor="middle" font-size="15" font-weight="bold" fill="#c98f00">A 組：有光 ☀️</text>
  <circle cx="180" cy="120" r="14" fill="#ffd45e"/>
  <rect x="150" y="200" width="60" height="45" rx="4" fill="#dbeefb" stroke="#7fb0d6"/>
  <line x1="170" y1="200" x2="170" y2="150" stroke="#4f9a52" stroke-width="3"/>
  <line x1="190" y1="200" x2="190" y2="155" stroke="#4f9a52" stroke-width="3"/>
  <path d="M170 160 q-10 -6 -16 2 M190 165 q10 -6 16 2" fill="none" stroke="#4f9a52" stroke-width="2.5"/>
  <text x="180" y="258" text-anchor="middle" font-size="11" fill="#2f7d3a">矮壯、翠綠</text>

  <!-- group B: no light -->
  <rect x="395" y="80" width="250" height="185" rx="12" fill="#e4e4e0" stroke="#9a9a90" stroke-width="2"/>
  <text x="520" y="106" text-anchor="middle" font-size="15" font-weight="bold" fill="#5a5a52">B 組：遮光 📦</text>
  <rect x="490" y="118" width="60" height="30" rx="3" fill="#a8895f"/>
  <rect x="490" y="200" width="60" height="45" rx="4" fill="#dbeefb" stroke="#7fb0d6"/>
  <line x1="510" y1="200" x2="512" y2="152" stroke="#c9b24a" stroke-width="2"/>
  <line x1="530" y1="200" x2="528" y2="150" stroke="#c9b24a" stroke-width="2"/>
  <text x="520" y="258" text-anchor="middle" font-size="11" fill="#8a7a2a">細長、偏黃</text>

  <!-- variables panel -->
  <rect x="55" y="285" width="590" height="95" rx="12" fill="#fff" stroke="#c7d6c9" stroke-width="2"/>
  <text x="150" y="312" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">🎛️ 操縱變因</text>
  <text x="150" y="332" text-anchor="middle" font-size="12" fill="#2d2a26">有沒有光</text>
  <text x="150" y="352" text-anchor="middle" font-size="10" fill="#6f6a63">（只改這一個！）</text>
  <line x1="255" y1="295" x2="255" y2="370" stroke="#e0e0d8"/>
  <text x="350" y="312" text-anchor="middle" font-size="13" font-weight="bold" fill="#2f7fc1">📏 應變變因</text>
  <text x="350" y="332" text-anchor="middle" font-size="12" fill="#2d2a26">豆芽高度、顏色</text>
  <line x1="450" y1="295" x2="450" y2="370" stroke="#e0e0d8"/>
  <text x="548" y="312" text-anchor="middle" font-size="13" font-weight="bold" fill="#2f7d3a">🔒 控制變因</text>
  <text x="548" y="332" text-anchor="middle" font-size="11" fill="#2d2a26">水、種子、杯子、</text>
  <text x="548" y="350" text-anchor="middle" font-size="11" fill="#2d2a26">溫度都一樣</text>

  <text x="350" y="396" text-anchor="middle" font-size="12" font-weight="bold" fill="#2f6b4a">只改一個變因、其他都一樣，才叫公平，結論才可靠。</text>
</svg>
