<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#f2f0e6"/>
  <text x="350" y="32" text-anchor="middle" font-size="21" font-weight="bold" fill="#5a7a3a">黴菌長什麼樣子</text>

  <!-- bread slice with mold -->
  <rect x="80" y="120" width="200" height="160" rx="24" fill="#e8c88a" stroke="#c0a050" stroke-width="2"/>
  <rect x="100" y="140" width="160" height="120" rx="14" fill="#f0dcae"/>
  <!-- mold patches -->
  <g><circle cx="150" cy="180" r="18" fill="#7aa050" opacity="0.7"/><circle cx="200" cy="210" r="22" fill="#5a8a3a" opacity="0.7"/><circle cx="170" cy="230" r="14" fill="#9ab060" opacity="0.6"/><circle cx="220" cy="170" r="12" fill="#8aa850" opacity="0.6"/></g>
  <g fill="#4a6a2a"><circle cx="150" cy="180" r="2"/><circle cx="200" cy="210" r="2"/><circle cx="170" cy="228" r="2"/></g>
  <text x="180" y="300" text-anchor="middle" font-size="13" fill="#5a7a3a">發霉的麵包（菌落）</text>

  <!-- magnifier zoom -->
  <circle cx="480" cy="185" r="95" fill="#f8fbf0" stroke="#5a7a3a" stroke-width="6"/>
  <line x1="548" y1="253" x2="590" y2="295" stroke="#5a7a3a" stroke-width="10" stroke-linecap="round"/>
  <!-- hyphae -->
  <g stroke="#6a8a3a" stroke-width="2.5" fill="none">
    <path d="M430 250 q10 -40 6 -70"/><path d="M460 255 q6 -50 12 -80"/><path d="M490 252 q0 -46 -4 -76"/><path d="M520 250 q-8 -44 -2 -74"/>
  </g>
  <!-- spores -->
  <g fill="#4a6a2a"><circle cx="436" cy="176" r="6"/><circle cx="472" cy="170" r="6"/><circle cx="486" cy="172" r="6"/><circle cx="518" cy="172" r="6"/></g>
  <g fill="#8aa850" opacity="0.6"><circle cx="450" cy="150" r="4"/><circle cx="500" cy="145" r="4"/><circle cx="470" cy="135" r="3"/></g>
  <text x="480" y="240" text-anchor="middle" font-size="12" fill="#3a6a2a">菌絲＋孢子</text>
  <text x="600" y="130" text-anchor="middle" font-size="11" fill="#5a7a3a">孢子隨</text>
  <text x="600" y="146" text-anchor="middle" font-size="11" fill="#5a7a3a">空氣飄散</text>

  <text x="350" y="384" text-anchor="middle" font-size="14" font-weight="bold" fill="#5a7a3a">毛毛的是好多黴菌，靠孢子飄散繁殖。</text>
</svg>
