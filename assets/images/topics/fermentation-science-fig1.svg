<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#fbf3e6"/>
  <text x="350" y="34" text-anchor="middle" font-size="21" font-weight="bold" fill="#b06a1e">酵母吃糖、放出二氧化碳撐大麵團</text>

  <!-- dough -->
  <ellipse cx="180" cy="240" rx="90" ry="70" fill="#f0dfc0" stroke="#d0b890" stroke-width="2"/>
  <!-- bubbles inside dough -->
  <g fill="#fff" stroke="#e0d0b0"><circle cx="160" cy="220" r="14"/><circle cx="205" cy="245" r="18"/><circle cx="175" cy="270" r="12"/><circle cx="215" cy="210" r="10"/></g>
  <text x="180" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#a06a2a">麵團膨脹</text>

  <!-- zoom circle -->
  <circle cx="440" cy="190" r="100" fill="#fff" stroke="#d0b890" stroke-width="2"/>
  <line x1="266" y1="220" x2="345" y2="200" stroke="#d0b890" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- yeast cells -->
  <g fill="#e0b060" stroke="#b0842a" stroke-width="1.5"><ellipse cx="410" cy="200" rx="16" ry="12"/><ellipse cx="460" cy="175" rx="14" ry="11"/></g>
  <text x="410" y="235" text-anchor="middle" font-size="11" fill="#8a6020">酵母</text>
  <!-- sugar grains -->
  <g fill="#fff" stroke="#c0c0c0"><rect x="470" y="205" width="8" height="8"/><rect x="482" y="215" width="8" height="8"/></g>
  <text x="495" y="228" font-size="11" fill="#888">糖</text>
  <!-- CO2 bubbles -->
  <g fill="#bfe0f5" stroke="#7fb0d6"><circle cx="430" cy="150" r="8"/><circle cx="455" cy="135" r="6"/><circle cx="410" cy="140" r="5"/></g>
  <text x="470" y="130" font-size="11" fill="#3a7a9a">二氧化碳</text>

  <!-- baked bread cross-section -->
  <path d="M560 300 q40 -50 90 0 l-6 44 h-78 Z" fill="#d0a060" stroke="#a07830" stroke-width="2"/>
  <g fill="#f0e4cc"><circle cx="590" cy="315" r="7"/><circle cx="615" cy="305" r="6"/><circle cx="630" cy="322" r="7"/><circle cx="605" cy="328" r="5"/></g>
  <text x="605" y="365" text-anchor="middle" font-size="11" fill="#a07830">麵包孔洞</text>

  <text x="350" y="390" text-anchor="middle" font-size="14" font-weight="bold" fill="#b06a1e">酵母吃糖放出二氧化碳，把麵團撐大。</text>
</svg>
