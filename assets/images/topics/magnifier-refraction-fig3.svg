<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#fdeeea"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#c0392b">聚光很燙——安全警示</text>

  <!-- sun -->
  <circle cx="120" cy="90" r="30" fill="#ffd24a"/>
  <g stroke="#ffd24a" stroke-width="3"><line x1="120" y1="60" x2="120" y2="44"/><line x1="150" y1="90" x2="168" y2="90"/><line x1="140" y1="68" x2="152" y2="56"/></g>
  <!-- rays to lens -->
  <g stroke="#f2b30a" stroke-width="2.5"><line x1="140" y1="110" x2="300" y2="180"/><line x1="150" y1="100" x2="300" y2="160"/><line x1="150" y1="120" x2="300" y2="200"/></g>
  <!-- magnifier -->
  <ellipse cx="310" cy="180" rx="16" ry="46" fill="#cfe4f2" stroke="#5a95c8" stroke-width="2"/>
  <line x1="322" y1="220" x2="342" y2="250" stroke="#8a6a4a" stroke-width="6"/>
  <!-- converge to hot spot on paper -->
  <g stroke="#f2b30a" stroke-width="2.5"><line x1="322" y1="160" x2="430" y2="300"/><line x1="322" y1="180" x2="430" y2="300"/><line x1="322" y1="200" x2="430" y2="300"/></g>
  <rect x="360" y="300" width="140" height="50" fill="#e8dcc0"/>
  <circle cx="430" cy="300" r="8" fill="#fff3b0" stroke="#e0a000"/>
  <g fill="#8a8a8a" opacity="0.7"><circle cx="428" cy="285" r="6"/><circle cx="438" cy="275" r="5"/></g>
  <text x="430" y="335" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="bold">高溫·冒煙點燃</text>

  <!-- prohibition signs -->
  <g transform="translate(560,110)">
    <circle r="34" fill="#fff" stroke="#c0392b" stroke-width="5"/>
    <text x="0" y="8" text-anchor="middle" font-size="30">👁</text>
    <line x1="-24" y1="24" x2="24" y2="-24" stroke="#c0392b" stroke-width="5"/>
  </g>
  <text x="560" y="165" text-anchor="middle" font-size="12" fill="#c0392b">不可對眼睛</text>
  <g transform="translate(560,240)">
    <circle r="34" fill="#fff" stroke="#c0392b" stroke-width="5"/>
    <text x="0" y="8" text-anchor="middle" font-size="26">🔥</text>
    <line x1="-24" y1="24" x2="24" y2="-24" stroke="#c0392b" stroke-width="5"/>
  </g>
  <text x="560" y="295" text-anchor="middle" font-size="12" fill="#c0392b">不可點火·遠離易燃物</text>

  <text x="350" y="384" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">聚光溫度很高——絕不可對眼睛、皮膚或點火玩！</text>
</svg>
