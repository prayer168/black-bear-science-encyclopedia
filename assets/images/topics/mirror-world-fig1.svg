<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eaf2f7"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#2a6a9a">光反射進眼睛，看見鏡中影像</text>

  <!-- mirror in middle -->
  <rect x="345" y="70" width="12" height="260" fill="#bfe0ef" stroke="#5a9ac8" stroke-width="2"/>
  <rect x="357" y="70" width="6" height="260" fill="#8ab8d0"/>
  <text x="351" y="60" text-anchor="middle" font-size="14" fill="#2a6a9a" font-weight="bold">鏡子</text>

  <!-- real person left -->
  <circle cx="150" cy="170" r="26" fill="#f2c79a"/>
  <rect x="128" y="196" width="44" height="80" rx="12" fill="#e0774a"/>
  <line x1="172" y1="215" x2="205" y2="185" stroke="#f2c79a" stroke-width="10" stroke-linecap="round"/>
  <text x="150" y="300" text-anchor="middle" font-size="13" fill="#7a5230" font-weight="bold">真正的你</text>

  <!-- virtual image right (dashed) -->
  <g opacity="0.55">
  <circle cx="560" cy="170" r="26" fill="#f2c79a" stroke="#999" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="538" y="196" width="44" height="80" rx="12" fill="#e0774a" stroke="#999" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="538" y1="215" x2="505" y2="185" stroke="#f2c79a" stroke-width="10" stroke-linecap="round"/>
  </g>
  <text x="560" y="300" text-anchor="middle" font-size="13" fill="#888" font-weight="bold">鏡中影像（虛像）</text>
  <text x="560" y="320" text-anchor="middle" font-size="11" fill="#888">與你對稱、左右相反</text>

  <!-- light path: person -> mirror -> eye -->
  <path d="M185 160 L345 210" stroke="#f0a020" stroke-width="3" marker-end="url(#m1)"/>
  <path d="M351 210 L185 150" stroke="#3a9ad0" stroke-width="3" marker-end="url(#m2)"/>
  <defs>
    <marker id="m1" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#f0a020"/></marker>
    <marker id="m2" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#3a9ad0"/></marker>
  </defs>
  <text x="250" y="205" font-size="12" fill="#c07a10" font-weight="bold">光去</text>
  <text x="240" y="150" font-size="12" fill="#2a7ab0" font-weight="bold">反射回眼睛</text>
  <circle cx="168" cy="158" r="5" fill="#333"/>

  <text x="350" y="378" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a6a9a">光反彈進眼睛，我們就看見鏡子裡的影像（鏡後沒有真人）。</text>
</svg>
