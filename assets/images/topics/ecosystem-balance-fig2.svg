<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#f7efe6"/>
  <text x="350" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#a8531e">外來種為什麼會爆發？</text>

  <!-- center: exploding invader -->
  <circle cx="350" cy="180" r="52" fill="#cfe0d0" stroke="#4f8a52" stroke-width="3"/>
  <text x="350" y="180" text-anchor="middle" font-size="34">🐢</text>
  <text x="350" y="210" text-anchor="middle" font-size="11" fill="#2f6b3a">外來種（巴西龜）</text>
  <!-- lots of small turtles = population boom -->
  <g font-size="16">
    <text x="270" y="120">🐢</text><text x="430" y="120">🐢</text>
    <text x="255" y="200">🐢</text><text x="445" y="200">🐢</text>
    <text x="290" y="245">🐢</text><text x="410" y="245">🐢</text>
  </g>

  <!-- three reason boxes -->
  <rect x="30" y="70" width="180" height="70" rx="10" fill="#fff" stroke="#e6d3b8" stroke-width="2"/>
  <text x="120" y="96" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">沒有天敵</text>
  <text x="120" y="120" text-anchor="middle" font-size="11" fill="#2d2a26">新環境沒有東西</text>
  <text x="120" y="135" text-anchor="middle" font-size="11" fill="#2d2a26">能制衡牠</text>

  <rect x="490" y="70" width="180" height="70" rx="10" fill="#fff" stroke="#e6d3b8" stroke-width="2"/>
  <text x="580" y="96" text-anchor="middle" font-size="14" font-weight="bold" fill="#c98f00">很會繁殖</text>
  <text x="580" y="120" text-anchor="middle" font-size="11" fill="#2d2a26">生很多、長很快</text>
  <text x="580" y="135" text-anchor="middle" font-size="11" fill="#2d2a26">數量暴增</text>

  <rect x="260" y="290" width="180" height="70" rx="10" fill="#fff" stroke="#e6d3b8" stroke-width="2"/>
  <text x="350" y="316" text-anchor="middle" font-size="14" font-weight="bold" fill="#7d5aa8">搶食物與棲地</text>
  <text x="350" y="340" text-anchor="middle" font-size="11" fill="#2d2a26">把本地生物的</text>
  <text x="350" y="355" text-anchor="middle" font-size="11" fill="#2d2a26">食物與家搶光</text>

  <!-- connectors -->
  <g stroke="#b98b5a" stroke-width="2" stroke-dasharray="4 3">
    <line x1="210" y1="105" x2="300" y2="150"/>
    <line x1="490" y1="105" x2="400" y2="150"/>
    <line x1="350" y1="290" x2="350" y2="232"/>
  </g>

  <!-- result -->
  <rect x="40" y="300" width="180" height="66" rx="10" fill="#fbeaea" stroke="#e6c7c7" stroke-width="2"/>
  <text x="130" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">本地生物 ↓ 大減</text>
  <text x="130" y="348" text-anchor="middle" font-size="20">🐸🐟 ↓</text>
  <rect x="480" y="300" width="180" height="66" rx="10" fill="#fbeaea" stroke="#e6c7c7" stroke-width="2"/>
  <text x="570" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">生物多樣性 ↓</text>
  <text x="570" y="348" text-anchor="middle" font-size="11" fill="#2d2a26">生態失去平衡、變脆弱</text>

  <text x="350" y="388" text-anchor="middle" font-size="12" fill="#a8531e">沒有天敵 ＋ 很會生 ＋ 搶資源 → 外來種爆發（並非所有外來生物都會入侵）。</text>
</svg>
