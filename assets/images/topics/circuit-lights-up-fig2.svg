<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="420" fill="#fffdf9"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">通路會亮，斷路不會亮</text>
  <line x1="350" y1="55" x2="350" y2="380" stroke="#e7ddcd" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- LEFT closed circuit -->
  <text x="175" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#5aa469">通路（接通）</text>
  <rect x="70" y="110" width="210" height="160" rx="10" fill="none" stroke="#c0392b" stroke-width="5"/>
  <rect x="140" y="255" width="70" height="30" rx="3" fill="#f4b400" stroke="#c98f00" stroke-width="2"/>
  <circle cx="175" cy="110" r="24" fill="#fff2b0" stroke="#c98f00" stroke-width="3"/>
  <g stroke="#f4b400" stroke-width="2.5" stroke-linecap="round"><line x1="175" y1="76" x2="175" y2="66"/><line x1="205" y1="88" x2="212" y2="81"/></g>
  <!-- closed switch -->
  <line x1="280" y1="165" x2="280" y2="205" stroke="#c0392b" stroke-width="5"/>
  <circle cx="280" cy="165" r="4" fill="#6b4f3a"/><circle cx="280" cy="205" r="4" fill="#6b4f3a"/>
  <text x="175" y="320" text-anchor="middle" font-size="14" font-weight="bold" fill="#5aa469">✔ 燈泡亮</text>
  <text x="175" y="342" text-anchor="middle" font-size="11" fill="#6f6a63">電流繞成完整一圈</text>

  <!-- RIGHT open circuit -->
  <text x="525" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#b5462a">斷路（斷開）</text>
  <path d="M420 205 L420 110 L630 110 L630 165" fill="none" stroke="#8a795c" stroke-width="5"/>
  <path d="M630 205 L630 270 L420 270 L420 240" fill="none" stroke="#8a795c" stroke-width="5"/>
  <rect x="490" y="255" width="70" height="30" rx="3" fill="#e0d3b8" stroke="#b8a878" stroke-width="2"/>
  <circle cx="525" cy="110" r="24" fill="#eee" stroke="#b8a878" stroke-width="3"/>
  <!-- open switch (gap) -->
  <line x1="630" y1="165" x2="630" y2="185" stroke="#8a795c" stroke-width="5"/>
  <line x1="630" y1="240" x2="618" y2="215" stroke="#8a795c" stroke-width="5"/>
  <circle cx="630" cy="165" r="4" fill="#6b4f3a"/><circle cx="630" cy="240" r="4" fill="#6b4f3a"/>
  <text x="655" y="205" font-size="11" fill="#b5462a">缺口</text>
  <text x="525" y="320" text-anchor="middle" font-size="14" font-weight="bold" fill="#b5462a">✘ 燈泡不亮</text>
  <text x="525" y="342" text-anchor="middle" font-size="11" fill="#6f6a63">圈斷掉，電流過不去</text>

  <text x="350" y="400" text-anchor="middle" font-size="13" fill="#6b4f3a">只要圈上任何一處斷開，電流就無法流通，燈泡就熄了</text>
</svg>
