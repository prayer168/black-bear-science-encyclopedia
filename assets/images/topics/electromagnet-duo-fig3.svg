<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="380" fill="#eaf5ff"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">電磁鐵 vs 一般磁鐵，還有應用</text>
  <!-- comparison -->
  <rect x="40" y="70" width="300" height="130" rx="12" fill="#fff" stroke="#e7ddcd" stroke-width="2"/>
  <text x="190" y="96" text-anchor="middle" font-size="14" font-weight="bold" fill="#6b4f3a">一般磁鐵（永久磁鐵）</text>
  <text x="60" y="128" font-size="12" fill="#2d2a26">• 磁力一直都在</text>
  <text x="60" y="152" font-size="12" fill="#2d2a26">• 不能隨意開關或調強弱</text>
  <text x="60" y="176" font-size="12" fill="#2d2a26">• 例：冰箱磁鐵</text>

  <rect x="360" y="70" width="300" height="130" rx="12" fill="#fff8e6" stroke="#f2e0a8" stroke-width="2"/>
  <text x="510" y="96" text-anchor="middle" font-size="14" font-weight="bold" fill="#c98f00">電磁鐵</text>
  <text x="380" y="128" font-size="12" fill="#2d2a26">• 通電才有磁力，可「開關」</text>
  <text x="380" y="152" font-size="12" fill="#2d2a26">• 磁力可調強弱、可改變磁極</text>
  <text x="380" y="176" font-size="12" fill="#2d2a26">• 例：電鈴、馬達、起重機</text>

  <!-- applications -->
  <g text-anchor="middle" font-size="11" fill="#2d2a26">
    <text x="130" y="250" font-size="28">🏗️</text><text x="130" y="285">廢鐵起重機</text><text x="130" y="303" font-size="10" fill="#6f6a63">通電吸鐵、斷電放下</text>
    <text x="290" y="250" font-size="28">🔔</text><text x="290" y="285">電鈴</text><text x="290" y="303" font-size="10" fill="#6f6a63">電磁鐵反覆吸放敲鈴</text>
    <text x="430" y="250" font-size="28">⚙️</text><text x="430" y="285">馬達</text><text x="430" y="303" font-size="10" fill="#6f6a63">電生磁使線圈轉動</text>
    <text x="570" y="250" font-size="28">🚄</text><text x="570" y="285">磁浮列車</text><text x="570" y="303" font-size="10" fill="#6f6a63">用電磁力浮起前進</text>
  </g>
  <text x="350" y="345" text-anchor="middle" font-size="13" fill="#3f7d4f">電與磁是好搭檔：電流能產生磁力，這是很多電器運作的祕密</text>
</svg>
