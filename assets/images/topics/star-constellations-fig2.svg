<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#161c34"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffe07a">用北斗七星找北極星</text>

  <!-- big dipper bottom-left -->
  <g fill="#fff8d0">
    <circle cx="120" cy="300" r="4"/><circle cx="165" cy="285" r="4.5"/><circle cx="210" cy="290" r="4"/><circle cx="248" cy="305" r="4.5"/>
    <circle cx="245" cy="255" r="5.5"/><circle cx="195" cy="250" r="4"/><circle cx="150" cy="265" r="4"/>
  </g>
  <polyline points="120,300 165,285 210,290 248,305 245,255 195,250 150,265 210,290" fill="none" stroke="#7a8ac0" stroke-width="1.5"/>
  <text x="180" y="335" text-anchor="middle" font-size="12" fill="#9ab0e0">北斗七星</text>
  <!-- pointer stars: the two front bowl stars 245,255 & 248,305 -->
  <circle cx="245" cy="255" r="8" fill="none" stroke="#ff9a5a" stroke-width="2"/>
  <circle cx="248" cy="305" r="8" fill="none" stroke="#ff9a5a" stroke-width="2"/>
  <text x="300" y="300" font-size="11" fill="#ff9a5a">指極星（兩顆）</text>

  <!-- extension arrow to polaris -->
  <line x1="246" y1="280" x2="540" y2="120" stroke="#ff9a5a" stroke-width="2.5" stroke-dasharray="8 5" marker-end="url(#p)"/>
  <text x="400" y="180" font-size="12" fill="#ffb87a" transform="rotate(-28 400 180)">往勺口延伸約五倍</text>
  <defs><marker id="p" markerWidth="12" markerHeight="12" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#ff9a5a"/></marker></defs>

  <!-- polaris -->
  <circle cx="560" cy="110" r="6" fill="#fffbe0"/>
  <g stroke="#fffbe0" stroke-width="1.5"><line x1="560" y1="98" x2="560" y2="90"/><line x1="560" y1="122" x2="560" y2="130"/><line x1="548" y1="110" x2="540" y2="110"/><line x1="572" y1="110" x2="580" y2="110"/></g>
  <text x="560" y="80" text-anchor="middle" font-size="14" fill="#ffe07a" font-weight="bold">北極星</text>
  <text x="600" y="115" font-size="11" fill="#c8d4f0">（亮度普通）</text>

  <!-- horizon & north -->
  <line x1="440" y1="340" x2="680" y2="340" stroke="#5a6a9a" stroke-width="2"/>
  <line x1="560" y1="116" x2="560" y2="340" stroke="#4a5a8a" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="560" y="362" text-anchor="middle" font-size="15" fill="#ffb87a" font-weight="bold">北 ↑</text>

  <text x="350" y="384" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffe07a">順著勺口兩星延伸，找到指北方的北極星。</text>
</svg>
