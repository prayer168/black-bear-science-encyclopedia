<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eef6f9"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1f7a8c">加鹽讓水變「濃」，浮力變大</text>

  <!-- left cup: fresh water, egg sinks -->
  <g>
    <path d="M110 120 h150 l-14 200 h-122 Z" fill="#dff1f8" stroke="#7fb0d6" stroke-width="2"/>
    <ellipse cx="185" cy="120" rx="75" ry="12" fill="#cfe8f2" stroke="#7fb0d6"/>
    <ellipse cx="185" cy="300" rx="26" ry="20" fill="#f5e6c8" stroke="#c9a24a" stroke-width="2"/>
    <text x="185" y="350" text-anchor="middle" font-size="15" font-weight="bold" fill="#3a7a9a">清水·密度小</text>
    <text x="185" y="372" text-anchor="middle" font-size="13" fill="#c0392b">蛋沉底</text>
  </g>

  <!-- arrow + salt -->
  <text x="350" y="180" text-anchor="middle" font-size="30">🧂</text>
  <text x="350" y="210" text-anchor="middle" font-size="14" fill="#6f6a63">加鹽·攪拌</text>
  <line x1="300" y1="230" x2="400" y2="230" stroke="#1f7a8c" stroke-width="3" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M0 0 L7 4 L0 8 z" fill="#1f7a8c"/></marker></defs>

  <!-- right cup: salt water, egg floats -->
  <g>
    <path d="M440 120 h150 l-14 200 h-122 Z" fill="#cfe6ef" stroke="#5a95b5" stroke-width="2"/>
    <ellipse cx="515" cy="120" rx="75" ry="12" fill="#bcd8e6" stroke="#5a95b5"/>
    <ellipse cx="515" cy="150" rx="26" ry="20" fill="#f5e6c8" stroke="#c9a24a" stroke-width="2"/>
    <g fill="#ffffff" opacity="0.5"><circle cx="480" cy="220" r="3"/><circle cx="540" cy="250" r="3"/><circle cx="500" cy="280" r="3"/></g>
    <text x="515" y="350" text-anchor="middle" font-size="15" font-weight="bold" fill="#2a6a8a">濃鹽水·密度大</text>
    <text x="515" y="372" text-anchor="middle" font-size="13" fill="#1f9d55">蛋浮起</text>
  </g>

  <text x="350" y="392" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f7a8c">水愈濃、密度愈大，浮力就愈大。</text>
</svg>
