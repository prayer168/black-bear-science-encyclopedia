<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="420" fill="#eef8ee"/>
  <text x="350" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">昆蟲偵探判斷流程卡</text>

  <!-- magnifier + observer hint -->
  <circle cx="90" cy="120" r="40" fill="none" stroke="#6b4f3a" stroke-width="8"/>
  <line x1="118" y1="148" x2="150" y2="180" stroke="#6b4f3a" stroke-width="10" stroke-linecap="round"/>
  <text x="90" y="128" text-anchor="middle" font-size="26">🐞</text>

  <!-- step 1 -->
  <rect x="210" y="80" width="380" height="66" rx="14" fill="#fff" stroke="#5aa469" stroke-width="2.5"/>
  <text x="235" y="112" font-size="16" font-weight="bold" fill="#5aa469">①</text>
  <text x="265" y="108" font-size="16" fill="#2d2a26">身體分成幾段？</text>
  <text x="265" y="132" font-size="13" fill="#6f6a63">頭、胸、腹 → 三段？</text>

  <!-- arrow -->
  <defs><marker id="fa" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5aa469"/></marker></defs>
  <line x1="400" y1="150" x2="400" y2="176" stroke="#5aa469" stroke-width="4" marker-end="url(#fa)"/>

  <!-- step 2 -->
  <rect x="210" y="182" width="380" height="66" rx="14" fill="#fff" stroke="#e8743b" stroke-width="2.5"/>
  <text x="235" y="214" font-size="16" font-weight="bold" fill="#e8743b">②</text>
  <text x="265" y="210" font-size="16" fill="#2d2a26">有幾隻腳？</text>
  <text x="265" y="234" font-size="13" fill="#6f6a63">六隻，而且長在胸部？</text>

  <line x1="400" y1="252" x2="400" y2="278" stroke="#e8743b" stroke-width="4" marker-end="url(#fa)"/>

  <!-- result -->
  <rect x="180" y="284" width="440" height="60" rx="14" fill="#5aa469"/>
  <text x="400" y="322" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">三段身體 ＋ 六隻腳 = 昆蟲！</text>

  <text x="350" y="384" text-anchor="middle" font-size="13" fill="#6b4f3a">只要有一個不符合（如八隻腳、身體兩段），就不是昆蟲</text>
  <text x="350" y="406" text-anchor="middle" font-size="12" fill="#b5462a">👀 只用眼睛和放大鏡觀察，不抓取、不傷害小動物</text>
</svg>
