<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#fff6e6"/>
  <text x="350" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#c97a1e">乾燥容易靜電、潮溼不容易</text>
  <line x1="350" y1="56" x2="350" y2="345" stroke="#e6d6b8" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- LEFT dry: success -->
  <text x="175" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#e07a1e">乾燥 → 明顯</text>
  <circle cx="90" cy="115" r="18" fill="#ffd24a"/><text x="118" y="120" font-size="12" fill="#c9a10a">☀ 低溼度</text>
  <ellipse cx="175" cy="170" rx="36" ry="44" fill="#f2a0b8" stroke="#d06888" stroke-width="2"/>
  <text x="175" y="175" text-anchor="middle" font-size="11" fill="#8a3050">氣球</text>
  <g fill="#fff" stroke="#ccc">
    <rect x="150" y="240" width="12" height="9" transform="rotate(15 156 244)"/>
    <rect x="185" y="245" width="12" height="9" transform="rotate(-15 191 249)"/>
    <rect x="168" y="270" width="10" height="8"/>
  </g>
  <path d="M162 240 l6 -26" stroke="#1f9d55" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="175" y="300" text-anchor="middle" font-size="13" fill="#1f9d55" font-weight="bold">✔ 吸得起紙片</text>

  <!-- RIGHT humid: fail -->
  <text x="525" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a6ab0">潮溼 → 不明顯</text>
  <g fill="#7fb0d6"><circle cx="440" cy="110" r="6"/><circle cx="470" cy="125" r="5"/><circle cx="455" cy="140" r="4"/></g>
  <text x="500" y="120" font-size="12" fill="#2a6ab0">💧 高溼度</text>
  <ellipse cx="525" cy="170" rx="36" ry="44" fill="#f2a0b8" stroke="#d06888" stroke-width="2"/>
  <text x="525" y="175" text-anchor="middle" font-size="11" fill="#8a3050">氣球</text>
  <g fill="#fff" stroke="#ccc">
    <rect x="500" y="300" width="12" height="9"/>
    <rect x="525" y="302" width="12" height="9"/>
    <rect x="548" y="300" width="10" height="8"/>
  </g>
  <text x="525" y="335" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="bold">✘ 紙片不動</text>
  <text x="525" y="255" text-anchor="middle" font-size="11" fill="#2a6ab0">水氣把靜電帶走</text>

  <text x="350" y="386" text-anchor="middle" font-size="14" font-weight="bold" fill="#c97a1e">愈乾燥，靜電愈明顯。</text>
</svg>
