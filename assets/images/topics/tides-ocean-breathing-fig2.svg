<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#0f1b3a"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffe08a">月球引力拉出兩個「漲潮」</text>

  <!-- ocean bulge (ellipse) around earth -->
  <ellipse cx="300" cy="210" rx="150" ry="95" fill="#2f6fb0" opacity="0.55"/>
  <!-- earth -->
  <circle cx="300" cy="210" r="80" fill="#3a7a4a" stroke="#2a5a36" stroke-width="2"/>
  <circle cx="300" cy="210" r="80" fill="url(#none)"/>
  <path d="M255 175 q30 -10 50 8 q-10 24 -40 16 z" fill="#4a9a5a" opacity="0.8"/>
  <path d="M300 250 q30 -6 40 16 q-24 16 -46 4 z" fill="#4a9a5a" opacity="0.8"/>

  <!-- bulges labels -->
  <text x="470" y="205" font-size="14" font-weight="bold" fill="#7fd0ff">朝月漲潮</text>
  <text x="70" y="205" font-size="14" font-weight="bold" fill="#7fd0ff">背月漲潮</text>
  <text x="300" y="90" text-anchor="middle" font-size="13" fill="#9fb8e0">退潮</text>
  <text x="300" y="345" text-anchor="middle" font-size="13" fill="#9fb8e0">退潮</text>

  <!-- moon -->
  <circle cx="600" cy="210" r="34" fill="#d8d8d0" stroke="#b0b0a8" stroke-width="2"/>
  <circle cx="590" cy="200" r="6" fill="#b8b8b0"/><circle cx="608" cy="220" r="4" fill="#b8b8b0"/>
  <text x="600" y="270" text-anchor="middle" font-size="14" fill="#e0e0d8">月球</text>
  <!-- gravity arrows -->
  <g stroke="#ffd24a" stroke-width="2.5">
    <line x1="450" y1="210" x2="500" y2="210" marker-end="url(#a)"/>
  </g>
  <text x="470" y="235" text-anchor="middle" font-size="12" fill="#ffd24a">引力</text>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M0 0 L7 4 L0 8 z" fill="#ffd24a"/></marker></defs>

  <text x="350" y="386" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffe08a">月球把海水拉成兩個鼓包，就是兩處漲潮。</text>
</svg>
