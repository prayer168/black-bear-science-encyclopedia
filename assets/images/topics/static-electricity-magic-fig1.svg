<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#fff6e6"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#c97a1e">摩擦生靜電，頭髮站起來</text>

  <!-- head -->
  <circle cx="350" cy="270" r="70" fill="#ffe0c0" stroke="#e0a878" stroke-width="2"/>
  <circle cx="325" cy="265" r="6" fill="#5a4030"/><circle cx="375" cy="265" r="6" fill="#5a4030"/>
  <path d="M330 295 q20 14 40 0" stroke="#5a4030" stroke-width="3" fill="none"/>
  <!-- hairs standing up, spreading -->
  <g stroke="#7a4a2a" stroke-width="3" stroke-linecap="round">
    <line x1="300" y1="205" x2="285" y2="130"/>
    <line x1="322" y1="200" x2="315" y2="120"/>
    <line x1="345" y1="198" x2="345" y2="115"/>
    <line x1="368" y1="200" x2="378" y2="120"/>
    <line x1="392" y1="205" x2="410" y2="130"/>
  </g>
  <!-- repel arrows between hairs -->
  <g stroke="#c0392b" stroke-width="2">
    <path d="M300 150 l-18 6" marker-end="url(#a)"/>
    <path d="M392 150 l18 6" marker-end="url(#a)"/>
  </g>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0 0 L6 4 L0 8 z" fill="#c0392b"/></marker></defs>
  <text x="350" y="100" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="bold">同種靜電互相排斥→張開</text>

  <!-- balloon rubbing -->
  <g transform="translate(150,230)">
    <ellipse cx="0" cy="0" rx="46" ry="56" fill="#f2a0b8" stroke="#d06888" stroke-width="2"/>
    <path d="M0 56 l-8 14 h16 Z" fill="#d06888"/>
    <text x="0" y="6" text-anchor="middle" font-size="13" fill="#8a3050">氣球</text>
  </g>
  <path d="M196 220 q40 -10 96 20" stroke="#c97a1e" stroke-width="2.5" fill="none" stroke-dasharray="6 4" marker-end="url(#a2)"/>
  <text x="200" y="200" font-size="13" fill="#c97a1e">摩擦</text>
  <defs><marker id="a2" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0 0 L6 4 L0 8 z" fill="#c97a1e"/></marker></defs>

  <text x="350" y="388" text-anchor="middle" font-size="14" font-weight="bold" fill="#c97a1e">頭髮帶了同種靜電，彼此推開就站起來。</text>
</svg>
