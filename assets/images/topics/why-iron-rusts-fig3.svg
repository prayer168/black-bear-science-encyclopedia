<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="380" fill="#eef8ee"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">防鏽妙招：擋住水或氧氣</text>
  <!-- 1 paint -->
  <g>
    <rect x="50" y="80" width="130" height="120" rx="12" fill="#fff" stroke="#e7ddcd" stroke-width="2"/>
    <rect x="90" y="120" width="50" height="14" fill="#9aa4ad"/>
    <rect x="90" y="120" width="50" height="14" fill="#e8743b" opacity="0.6"/>
    <text x="115" y="165" text-anchor="middle" font-size="13" fill="#2d2a26">上油漆</text>
    <text x="115" y="185" text-anchor="middle" font-size="10" fill="#6f6a63">隔絕水與空氣</text>
  </g>
  <!-- 2 oil/grease -->
  <g>
    <rect x="200" y="80" width="130" height="120" rx="12" fill="#fff" stroke="#e7ddcd" stroke-width="2"/>
    <rect x="240" y="120" width="50" height="14" fill="#9aa4ad"/>
    <path d="M240 118 q25 -8 50 0" stroke="#f4c542" stroke-width="4" fill="none"/>
    <text x="265" y="165" text-anchor="middle" font-size="13" fill="#2d2a26">塗油</text>
    <text x="265" y="185" text-anchor="middle" font-size="10" fill="#6f6a63">在表面形成保護層</text>
  </g>
  <!-- 3 galvanize/plating -->
  <g>
    <rect x="350" y="80" width="130" height="120" rx="12" fill="#fff" stroke="#e7ddcd" stroke-width="2"/>
    <rect x="390" y="120" width="50" height="14" fill="#9aa4ad"/>
    <rect x="388" y="118" width="54" height="18" fill="none" stroke="#7fb0d6" stroke-width="3"/>
    <text x="415" y="165" text-anchor="middle" font-size="13" fill="#2d2a26">鍍鋅/鍍層</text>
    <text x="415" y="185" text-anchor="middle" font-size="10" fill="#6f6a63">包一層保護金屬</text>
  </g>
  <!-- 4 stainless -->
  <g>
    <rect x="500" y="80" width="150" height="120" rx="12" fill="#fff" stroke="#e7ddcd" stroke-width="2"/>
    <rect x="545" y="120" width="60" height="14" rx="3" fill="#c0ccd6"/>
    <text x="575" y="165" text-anchor="middle" font-size="13" fill="#2d2a26">用不鏽鋼</text>
    <text x="575" y="185" text-anchor="middle" font-size="10" fill="#6f6a63">加了鉻，較不易鏽</text>
  </g>
  <!-- keep dry -->
  <rect x="120" y="230" width="460" height="110" rx="12" fill="#fff8e6" stroke="#f2e0a8" stroke-width="2"/>
  <text x="350" y="262" text-anchor="middle" font-size="15" font-weight="bold" fill="#c98f00">最簡單的一招：保持乾燥！</text>
  <text x="350" y="292" text-anchor="middle" font-size="13" fill="#2d2a26">腳踏車淋雨後擦乾、鐵器收在乾燥處</text>
  <text x="350" y="318" text-anchor="middle" font-size="13" fill="#2d2a26">沒有水，鐵就很難生鏽</text>
</svg>
