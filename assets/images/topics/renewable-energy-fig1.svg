<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eef4ee"/>
  <text x="350" y="32" text-anchor="middle" font-size="21" font-weight="bold" fill="#3a7a5a">再生 vs 非再生能源</text>

  <!-- left renewable -->
  <rect x="20" y="55" width="320" height="300" rx="12" fill="#eaf6ec" stroke="#5aa070" stroke-width="2"/>
  <text x="180" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a7a4a">再生能源 ♻️</text>
  <!-- sun -->
  <circle cx="90" cy="130" r="22" fill="#ffd24a"/><g stroke="#ffd24a" stroke-width="3"><line x1="90" y1="155" x2="90" y2="165"/><line x1="65" y1="112" x2="57" y2="105"/></g>
  <text x="90" y="180" text-anchor="middle" font-size="12" fill="#3a7a4a">太陽</text>
  <!-- wind turbine -->
  <line x1="200" y1="175" x2="200" y2="120" stroke="#888" stroke-width="4"/><circle cx="200" cy="120" r="5" fill="#666"/>
  <g stroke="#7ab0d0" stroke-width="4"><line x1="200" y1="120" x2="200" y2="98"/><line x1="200" y1="120" x2="219" y2="131"/><line x1="200" y1="120" x2="181" y2="131"/></g>
  <text x="200" y="192" text-anchor="middle" font-size="12" fill="#3a7a4a">風</text>
  <!-- water -->
  <path d="M270 130 q10 20 0 34 q-10 -14 0 -34z" fill="#5a9ac8"/>
  <path d="M280 145 q8 16 0 28 q-8 -12 0 -28z" fill="#7ab0d8"/>
  <text x="285" y="192" text-anchor="middle" font-size="12" fill="#3a7a4a">流水</text>
  <!-- geothermal -->
  <path d="M100 240 q10 -18 24 -6 q-4 12 -12 14 q-10 20 -12 -8z" fill="#c07a4a"/>
  <g stroke="#e08a5a" stroke-width="2" fill="none"><path d="M115 230 q-4 -10 2 -18"/></g>
  <text x="115" y="285" text-anchor="middle" font-size="12" fill="#3a7a4a">地熱</text>
  <rect x="180" y="240" width="140" height="70" rx="8" fill="#d8f0d8" stroke="#7aa070"/>
  <text x="250" y="272" text-anchor="middle" font-size="14" fill="#2a7a4a" font-weight="bold">用不完</text>
  <text x="250" y="294" text-anchor="middle" font-size="14" fill="#2a7a4a" font-weight="bold">較乾淨</text>

  <!-- right non-renewable -->
  <rect x="360" y="55" width="320" height="300" rx="12" fill="#f4ece4" stroke="#b09070" stroke-width="2"/>
  <text x="520" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#8a6030">非再生能源</text>
  <!-- coal -->
  <path d="M420 130 l24 0 l8 20 l-40 0z" fill="#4a4a4a"/><text x="432" y="175" text-anchor="middle" font-size="12" fill="#6a5a4a">煤</text>
  <!-- oil drum -->
  <rect x="490" y="120" width="34" height="44" rx="4" fill="#3a4a3a"/><text x="507" y="145" text-anchor="middle" font-size="11" fill="#fff">油</text><text x="507" y="180" text-anchor="middle" font-size="12" fill="#6a5a4a">石油</text>
  <!-- gas -->
  <rect x="560" y="122" width="30" height="42" rx="10" fill="#6a8ab0"/><text x="575" y="180" text-anchor="middle" font-size="12" fill="#6a5a4a">天然氣</text>
  <!-- factory smoke -->
  <rect x="440" y="255" width="30" height="45" fill="#888"/>
  <g fill="#aaa" opacity="0.8"><circle cx="455" cy="248" r="10"/><circle cx="470" cy="238" r="8"/><circle cx="485" cy="230" r="7"/></g>
  <rect x="510" y="255" width="140" height="46" rx="8" fill="#f0dcd0" stroke="#c09070"/>
  <text x="580" y="273" text-anchor="middle" font-size="13" fill="#a04a2a" font-weight="bold">會用完</text>
  <text x="580" y="293" text-anchor="middle" font-size="13" fill="#a04a2a" font-weight="bold">燃燒排碳</text>

  <text x="350" y="384" text-anchor="middle" font-size="14" font-weight="bold" fill="#3a7a5a">再生能源用不完又乾淨；非再生能源會用完又排碳。</text>
</svg>
