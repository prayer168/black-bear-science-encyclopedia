<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#161c34"/>
  <text x="350" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffe07a">公轉讓晚上面對不同星空</text>

  <!-- sun center -->
  <circle cx="350" cy="210" r="26" fill="#ffd24a"/>
  <g stroke="#ffd24a" stroke-width="3"><line x1="350" y1="176" x2="350" y2="166"/><line x1="384" y1="210" x2="394" y2="210"/><line x1="350" y1="244" x2="350" y2="254"/><line x1="316" y1="210" x2="306" y2="210"/></g>
  <text x="350" y="214" text-anchor="middle" font-size="11" fill="#a06010" font-weight="bold">太陽</text>
  <!-- orbit -->
  <ellipse cx="350" cy="210" rx="150" ry="110" fill="none" stroke="#4a5a8a" stroke-width="1.5" stroke-dasharray="5 5"/>

  <!-- four earths -->
  <!-- summer (left) -->
  <g transform="translate(200,210)"><circle r="16" fill="#5aa0e0"/><path d="M-16 0 A16 16 0 0 0 16 0 L16 -16 A16 16 0 0 0 -16 -16z" fill="#2a3a5a" opacity="0.5"/><text x="0" y="34" text-anchor="middle" font-size="11" fill="#c8d4f0">夏</text></g>
  <path d="M180 210 L70 210" stroke="#ff9a5a" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#s4)"/>
  <text x="60" y="200" text-anchor="end" font-size="12" fill="#ff9a5a">夏夜看天蠍座</text>
  <!-- winter (right) -->
  <g transform="translate(500,210)"><circle r="16" fill="#5aa0e0"/><text x="0" y="34" text-anchor="middle" font-size="11" fill="#c8d4f0">冬</text></g>
  <path d="M520 210 L630 210" stroke="#7ab0e0" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#s4)"/>
  <text x="640" y="200" font-size="12" fill="#7ab0e0">冬夜看獵戶座</text>
  <!-- spring (top) -->
  <g transform="translate(350,100)"><circle r="14" fill="#5aa0e0"/><text x="0" y="-22" text-anchor="middle" font-size="11" fill="#c8d4f0">春</text></g>
  <!-- autumn (bottom) -->
  <g transform="translate(350,320)"><circle r="14" fill="#5aa0e0"/><text x="0" y="30" text-anchor="middle" font-size="11" fill="#c8d4f0">秋</text></g>

  <defs><marker id="s4" markerWidth="11" markerHeight="11" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#ff9a5a"/></marker></defs>

  <text x="350" y="384" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffe07a">地球公轉，每季晚上面對不同的星空。</text>
</svg>
