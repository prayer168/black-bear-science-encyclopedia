<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#fdf3f6"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#b0417a">邀請卡的祕密任務——傳粉</text>

  <!-- flower A left -->
  <g>
    <circle cx="150" cy="240" r="40" fill="#f6a8c8" stroke="#d6699b" stroke-width="2"/>
    <circle cx="150" cy="240" r="16" fill="#f2c94c" stroke="#c99a1a" stroke-width="2"/>
    <line x1="150" y1="280" x2="150" y2="350" stroke="#5fa35f" stroke-width="5"/>
    <text x="150" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#a8531e">A 花（雄蕊有花粉）</text>
  </g>
  <!-- flower B right -->
  <g>
    <circle cx="550" cy="240" r="40" fill="#f6a8c8" stroke="#d6699b" stroke-width="2"/>
    <ellipse cx="550" cy="240" rx="10" ry="16" fill="#7fbf6f" stroke="#4d8c4d" stroke-width="2"/>
    <line x1="550" y1="280" x2="550" y2="350" stroke="#5fa35f" stroke-width="5"/>
    <text x="550" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#a8531e">B 花（雌蕊收花粉）</text>
  </g>

  <!-- bee path arrow -->
  <path d="M180 210 C300 120 400 120 520 210" fill="none" stroke="#e0952a" stroke-width="3" stroke-dasharray="8 5" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#e0952a"/>
    </marker>
  </defs>

  <!-- bee -->
  <g transform="translate(350,120)">
    <ellipse cx="0" cy="0" rx="26" ry="18" fill="#f7d046" stroke="#8a6d1a" stroke-width="2"/>
    <path d="M-12 -16 v32 M2 -17 v34" stroke="#4a3c12" stroke-width="4"/>
    <ellipse cx="-24" cy="-6" rx="16" ry="10" fill="#ffffff" opacity="0.8" stroke="#bbb"/>
    <circle cx="24" cy="-2" r="9" fill="#3a2f10"/>
    <circle cx="20" cy="12" r="4" fill="#f2c94c"/><circle cx="10" cy="16" r="4" fill="#f2c94c"/>
    <text x="0" y="-30" text-anchor="middle" font-size="12" fill="#8a6d1a">身上沾花粉</text>
  </g>

  <text x="350" y="378" text-anchor="middle" font-size="15" font-weight="bold" fill="#b0417a">蜜蜂當快遞，把花粉從雄蕊送到雌蕊。</text>
</svg>
