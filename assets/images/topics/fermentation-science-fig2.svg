<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#fbf3e6"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#b06a1e">有酵母才會脹，只有糖不會</text>
  <line x1="350" y1="56" x2="350" y2="330" stroke="#e6d6bc" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- left: with yeast, big -->
  <text x="175" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f9d55">加酵母 → 脹大</text>
  <ellipse cx="175" cy="220" rx="95" ry="75" fill="#f0dfc0" stroke="#d0b890" stroke-width="2"/>
  <g fill="#fff" stroke="#e0d0b0"><circle cx="150" cy="200" r="14"/><circle cx="200" cy="230" r="16"/><circle cx="170" cy="255" r="12"/></g>
  <text x="175" y="315" text-anchor="middle" font-size="12" fill="#4a7a3a">酵母＋糖·放溫暖處</text>
  <text x="175" y="335" text-anchor="middle" font-size="11" fill="#888">（還沒烤）</text>

  <!-- right: only sugar, small -->
  <text x="525" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#c0392b">只有糖 → 不脹</text>
  <ellipse cx="525" cy="245" rx="52" ry="42" fill="#f0dfc0" stroke="#d0b890" stroke-width="2"/>
  <text x="525" y="315" text-anchor="middle" font-size="12" fill="#a03030">只有糖·沒有酵母</text>
  <text x="525" y="335" text-anchor="middle" font-size="11" fill="#888">（還沒烤）</text>

  <text x="350" y="378" text-anchor="middle" font-size="14" font-weight="bold" fill="#b06a1e">有酵母才脹大——不是糖受熱撐大的。</text>
</svg>
