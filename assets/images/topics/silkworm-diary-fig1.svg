<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#f2f6ea"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#5a7a3a">蠶的一生四階段</text>

  <!-- 1 egg (top) -->
  <g transform="translate(350,95)">
    <ellipse cx="0" cy="0" rx="30" ry="22" fill="#fff" stroke="#c0b070" stroke-width="2"/>
    <g fill="#8a7a5a"><circle cx="-8" cy="-4" r="3"/><circle cx="6" cy="2" r="3"/><circle cx="-2" cy="8" r="3"/><circle cx="10" cy="-6" r="3"/></g>
    <text x="0" y="42" text-anchor="middle" font-size="14" fill="#7a6a30" font-weight="bold">① 卵</text>
  </g>
  <!-- 2 larva (right) -->
  <g transform="translate(560,205)">
    <path d="M-40 0 q10 -16 40 -14 q30 -2 40 14 q-10 14 -40 12 q-30 2 -40 -12z" fill="#f5f0e0" stroke="#d0c8a8" stroke-width="2"/>
    <g stroke="#d0c8a8" stroke-width="1.5"><line x1="-24" y1="-8" x2="-24" y2="8"/><line x1="-8" y1="-11" x2="-8" y2="11"/><line x1="8" y1="-11" x2="8" y2="11"/><line x1="24" y1="-8" x2="24" y2="8"/></g>
    <circle cx="36" cy="-2" r="4" fill="#8a7a5a"/>
    <text x="0" y="42" text-anchor="middle" font-size="14" fill="#7a6a30" font-weight="bold">② 幼蟲（蠶寶寶）</text>
    <path d="M-30 20 q10 8 20 0" fill="#6ba03a"/>
  </g>
  <!-- 3 cocoon/pupa (bottom) -->
  <g transform="translate(350,310)">
    <ellipse cx="0" cy="0" rx="30" ry="20" fill="#fdf3d0" stroke="#e0c870" stroke-width="2"/>
    <g stroke="#e8d890" stroke-width="1" fill="none"><path d="M-24 -6 q24 -6 48 0"/><path d="M-24 6 q24 6 48 0"/></g>
    <text x="0" y="42" text-anchor="middle" font-size="14" fill="#7a6a30" font-weight="bold">③ 蛹（繭）</text>
  </g>
  <!-- 4 moth (left) -->
  <g transform="translate(140,205)">
    <ellipse cx="0" cy="0" rx="8" ry="18" fill="#e8e0d0" stroke="#b0a888" stroke-width="1.5"/>
    <path d="M-8 -8 q-30 -14 -34 6 q10 14 34 4z" fill="#f0ead8" stroke="#c0b898" stroke-width="1.5"/>
    <path d="M8 -8 q30 -14 34 6 q-10 14 -34 4z" fill="#f0ead8" stroke="#c0b898" stroke-width="1.5"/>
    <g stroke="#8a7a5a" stroke-width="1.5"><path d="M-3 -16 q-6 -8 -12 -10"/><path d="M3 -16 q6 -8 12 -10"/></g>
    <text x="0" y="42" text-anchor="middle" font-size="14" fill="#7a6a30" font-weight="bold">④ 成蟲（蛾）</text>
  </g>

  <!-- cycle arrows -->
  <g fill="none" stroke="#5a8a3a" stroke-width="3">
    <path d="M395 105 q120 30 150 80" marker-end="url(#sc)"/>
    <path d="M540 250 q-80 55 -160 55" marker-end="url(#sc)"/>
    <path d="M300 315 q-120 -20 -155 -85" marker-end="url(#sc)"/>
    <path d="M155 165 q80 -50 165 -68" marker-end="url(#sc)"/>
  </g>
  <defs><marker id="sc" markerWidth="11" markerHeight="11" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#5a8a3a"/></marker></defs>
  <text x="350" y="210" text-anchor="middle" font-size="13" fill="#5a7a3a">完全變態</text>

  <text x="350" y="386" text-anchor="middle" font-size="14" font-weight="bold" fill="#5a7a3a">卵→蠶寶寶→繭（蛹）→蛾，這就是蠶的一生。</text>
</svg>
