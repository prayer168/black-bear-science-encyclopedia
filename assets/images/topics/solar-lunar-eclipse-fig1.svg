<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#0f1a33"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffe08a">日食——月亮擋住太陽</text>

  <!-- sun left -->
  <circle cx="90" cy="200" r="52" fill="#ffcf40"/>
  <circle cx="90" cy="200" r="52" fill="none" stroke="#ffe89a" stroke-width="3"/>
  <g stroke="#ffd94a" stroke-width="3">
    <line x1="90" y1="130" x2="90" y2="115"/><line x1="150" y1="160" x2="164" y2="150"/>
    <line x1="150" y1="240" x2="164" y2="250"/><line x1="90" y1="270" x2="90" y2="285"/>
  </g>
  <text x="90" y="290" text-anchor="middle" font-size="14" fill="#ffe08a">太陽</text>

  <!-- moon middle -->
  <circle cx="360" cy="200" r="20" fill="#d8d8dc" stroke="#9a9aa0" stroke-width="2"/>
  <text x="360" y="160" text-anchor="middle" font-size="14" fill="#e6e6ea">月亮（新月）</text>

  <!-- shadow cone from moon to earth -->
  <path d="M360 182 L560 172 M360 218 L560 228" stroke="#5a6a8a" stroke-width="1.5" stroke-dasharray="4 4"/>
  <path d="M360 185 L590 195 L360 215 Z" fill="#1a2440" opacity="0.75"/>

  <!-- earth right -->
  <circle cx="600" cy="200" r="46" fill="#3a7bd5"/>
  <path d="M575 180 q18 -6 34 2 q-8 14 -28 10z" fill="#4caf50"/>
  <path d="M585 220 q16 4 30 -4" stroke="#4caf50" stroke-width="8" fill="none"/>
  <circle cx="590" cy="200" r="10" fill="#12203a" opacity="0.85"/>
  <text x="600" y="270" text-anchor="middle" font-size="14" fill="#bcd4ff">地球（影子區＝看到日食）</text>

  <text x="350" y="388" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffe08a">月亮擋住太陽，影子落在地球上＝日食（白天）。</text>
</svg>
