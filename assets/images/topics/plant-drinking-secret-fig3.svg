<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#f0f6ea"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#3a7030">根、莖、葉的分工合作</text>

  <!-- central plant -->
  <rect x="343" y="150" width="14" height="150" fill="#5f9432"/>
  <ellipse cx="350" cy="120" rx="52" ry="30" fill="#7bb046"/>
  <ellipse cx="300" cy="165" rx="40" ry="20" fill="#6ba03a" transform="rotate(-18 300 165)"/>
  <ellipse cx="400" cy="165" rx="40" ry="20" fill="#6ba03a" transform="rotate(18 400 165)"/>
  <rect x="0" y="300" width="700" height="100" fill="#a9754a"/>
  <g stroke="#8a5a34" stroke-width="5" fill="none">
    <path d="M350 300 q-24 30 -46 66"/><path d="M350 300 q24 30 46 66"/><path d="M350 302 q0 40 -4 90"/>
  </g>

  <!-- leaf box -->
  <rect x="470" y="70" width="210" height="80" rx="10" fill="#eafadf" stroke="#7bb046" stroke-width="2"/>
  <text x="575" y="96" text-anchor="middle" font-size="15" font-weight="bold" fill="#3a7030">葉</text>
  <text x="575" y="118" text-anchor="middle" font-size="12" fill="#4a7030">行光合作用製造養分</text>
  <text x="575" y="138" text-anchor="middle" font-size="12" fill="#4a7030">蒸散放出水蒸氣</text>
  <line x1="402" y1="130" x2="470" y2="110" stroke="#7bb046" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- stem box -->
  <rect x="470" y="185" width="210" height="70" rx="10" fill="#eaf4f9" stroke="#5a9ac8" stroke-width="2"/>
  <text x="575" y="211" text-anchor="middle" font-size="15" font-weight="bold" fill="#2a6aa0">莖</text>
  <text x="575" y="233" text-anchor="middle" font-size="12" fill="#2a6aa0">運輸水分養分、支撐、舉高葉子</text>
  <line x1="357" y1="220" x2="470" y2="220" stroke="#5a9ac8" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- root box -->
  <rect x="470" y="290" width="210" height="70" rx="10" fill="#f6ede2" stroke="#a5713f" stroke-width="2"/>
  <text x="575" y="316" text-anchor="middle" font-size="15" font-weight="bold" fill="#8a5a2a">根</text>
  <text x="575" y="338" text-anchor="middle" font-size="12" fill="#8a5a2a">吸收水分養分、固定植物</text>
  <line x1="360" y1="340" x2="470" y2="325" stroke="#a5713f" stroke-width="1.5" stroke-dasharray="4 3"/>

  <text x="350" y="392" text-anchor="middle" font-size="14" font-weight="bold" fill="#3a7030">根、莖、葉各司其職，合作讓植物活得好。</text>
</svg>
