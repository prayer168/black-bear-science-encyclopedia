<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="380" fill="#1e2540"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#fff">光是「直線」前進的</text>
  <!-- light source -->
  <circle cx="90" cy="180" r="30" fill="#f4d060"/>
  <text x="90" y="185" text-anchor="middle" font-size="11" fill="#6b4f3a" font-weight="bold">光源</text>
  <!-- straight rays -->
  <g stroke="#f4d060" stroke-width="2.5">
    <line x1="120" y1="160" x2="620" y2="90"/>
    <line x1="120" y1="180" x2="620" y2="180"/>
    <line x1="120" y1="200" x2="620" y2="270"/>
  </g>
  <text x="380" y="150" text-anchor="middle" font-size="13" fill="#f4d060">光線走的是「直線」，不會轉彎</text>
  <!-- opaque wall with hole to show straight -->
  <rect x="350" y="60" width="14" height="240" fill="#5a4a3a"/>
  <rect x="350" y="172" width="14" height="18" fill="#1e2540"/>
  <text x="357" y="320" text-anchor="middle" font-size="11" fill="#c9b99a">中間開個小洞，只有對準的直線光穿得過</text>
  <text x="350" y="352" text-anchor="middle" font-size="12" fill="#9fb0d0">例子：手電筒、雷射筆、陽光穿過雲縫都是直的</text>
</svg>
