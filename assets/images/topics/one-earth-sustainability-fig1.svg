<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eaf5ff"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">自然資源分兩種：會用完 vs 用不完</text>
  <line x1="350" y1="55" x2="350" y2="360" stroke="#e7ddcd" stroke-width="2" stroke-dasharray="6 6"/>
  <!-- non-renewable -->
  <text x="175" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#b5462a">用完就沒了（不可再生）</text>
  <g font-size="12" fill="#2d2a26" text-anchor="middle">
    <text x="110" y="130" font-size="26">🛢️</text><text x="110" y="160">石油</text>
    <text x="180" y="130" font-size="26">⛏️</text><text x="180" y="160">煤炭</text>
    <text x="250" y="130" font-size="26">💎</text><text x="250" y="160">礦產</text>
  </g>
  <text x="175" y="210" text-anchor="middle" font-size="12" fill="#b5462a">形成要幾百萬年，用掉就很難補回</text>
  <rect x="70" y="230" width="210" height="60" rx="10" fill="#fbeaea" stroke="#e0b0b0"/>
  <text x="175" y="255" text-anchor="middle" font-size="12" fill="#8a2030">❗ 要「節約使用」</text>
  <text x="175" y="278" text-anchor="middle" font-size="11" fill="#6f6a63">省電、省油、減少浪費</text>
  <!-- renewable -->
  <text x="525" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#3f7d4f">用不完（可再生）</text>
  <g font-size="12" fill="#2d2a26" text-anchor="middle">
    <text x="460" y="130" font-size="26">☀️</text><text x="460" y="160">太陽能</text>
    <text x="530" y="130" font-size="26">💨</text><text x="530" y="160">風力</text>
    <text x="600" y="130" font-size="26">💧</text><text x="600" y="160">水力</text>
  </g>
  <text x="525" y="210" text-anchor="middle" font-size="12" fill="#3f7d4f">來自太陽、風、水，源源不絕</text>
  <rect x="420" y="230" width="210" height="60" rx="10" fill="#eef8ee" stroke="#cde8cd"/>
  <text x="525" y="255" text-anchor="middle" font-size="12" fill="#3a5a10">💡 多發展「綠色能源」</text>
  <text x="525" y="278" text-anchor="middle" font-size="11" fill="#6f6a63">較乾淨、不易枯竭</text>
  <text x="350" y="345" text-anchor="middle" font-size="13" fill="#c0392b">地球只有一個，資源有限，要聰明地用、留給未來</text>
</svg>
