<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#1a2038"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffe07a">把亮星連連看，就成了星座</text>

  <!-- scattered dim stars -->
  <g fill="#c8d0e8"><circle cx="120" cy="120" r="1.5"/><circle cx="230" cy="90" r="1.5"/><circle cx="400" cy="70" r="2"/><circle cx="560" cy="130" r="1.5"/><circle cx="650" cy="200" r="1.5"/><circle cx="90" cy="230" r="2"/><circle cx="300" cy="250" r="1.5"/><circle cx="470" cy="240" r="1.5"/><circle cx="600" cy="280" r="1.5"/></g>

  <!-- big dipper (bright) -->
  <g fill="#fff8d0">
    <circle cx="130" cy="150" r="4"/><circle cx="175" cy="140" r="4.5"/><circle cx="220" cy="150" r="4"/><circle cx="260" cy="170" r="4.5"/>
    <circle cx="255" cy="215" r="4"/><circle cx="205" cy="220" r="5"/><circle cx="165" cy="200" r="4"/>
  </g>
  <polyline points="130,150 175,140 220,150 260,170 255,215 205,220 165,200 220,150" fill="none" stroke="#7a8ac0" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="195" y="255" text-anchor="middle" font-size="13" fill="#9ab0e0">北斗七星（像大勺子）</text>

  <!-- orion-like figure (bright) -->
  <g fill="#fff8d0">
    <circle cx="460" cy="120" r="4"/><circle cx="520" cy="120" r="4"/>
    <circle cx="480" cy="170" r="3.5"/><circle cx="495" cy="170" r="3.5"/><circle cx="510" cy="170" r="3.5"/>
    <circle cx="455" cy="220" r="4.5"/><circle cx="525" cy="220" r="4"/>
  </g>
  <polyline points="460,120 480,170 455,220" fill="none" stroke="#7a8ac0" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polyline points="520,120 510,170 525,220" fill="none" stroke="#7a8ac0" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polyline points="480,170 495,170 510,170" fill="none" stroke="#7a8ac0" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="490" y="255" text-anchor="middle" font-size="13" fill="#9ab0e0">獵人（獵戶座）</text>

  <rect x="180" y="300" width="340" height="34" rx="17" fill="#2a3050" stroke="#5a6a9a" stroke-width="1.5"/>
  <text x="350" y="323" text-anchor="middle" font-size="14" fill="#c8d4f0">天上其實沒有線，是人想像連出來的</text>

  <text x="350" y="368" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffe07a">星星有亮有暗，把亮星連連看就成了星座。</text>
  <text x="350" y="390" text-anchor="middle" font-size="11" fill="#8a96c0">（大點＝較亮的星，小點＝較暗的星）</text>
</svg>
