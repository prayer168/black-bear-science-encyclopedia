<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eef4f0"/>
  <text x="350" y="32" text-anchor="middle" font-size="21" font-weight="bold" fill="#2a8a5a">沉澱與過濾怎麼分離雜質</text>
  <line x1="350" y1="56" x2="350" y2="345" stroke="#cfe0d0" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- LEFT: sedimentation -->
  <text x="175" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#3a8a6a">沉澱（靜置）</text>
  <path d="M120 110 h110 l-14 190 h-82 Z" fill="#dff1f8" stroke="#7fb0d6" stroke-width="2"/>
  <ellipse cx="175" cy="110" rx="55" ry="10" fill="#cfe8f2" stroke="#7fb0d6"/>
  <!-- clearer top, muddy bottom -->
  <path d="M126 230 h98 l-8 68 h-82 Z" fill="#c9a06a" opacity="0.85"/>
  <g fill="#8a6a3a"><circle cx="160" cy="270" r="3"/><circle cx="185" cy="285" r="3"/><circle cx="150" cy="290" r="3"/><circle cx="200" cy="278" r="3"/></g>
  <text x="175" y="180" text-anchor="middle" font-size="11" fill="#3a7a9a">上層較清</text>
  <text x="175" y="325" text-anchor="middle" font-size="12" fill="#8a6a3a">泥沙沉到杯底</text>

  <!-- RIGHT: filtration -->
  <text x="525" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#3a8a6a">過濾（濾紙）</text>
  <!-- funnel -->
  <path d="M470 110 h110 l-38 60 h-34 Z" fill="#e8eef2" stroke="#a8b8c8" stroke-width="2"/>
  <!-- muddy water in funnel -->
  <path d="M478 116 h94 l-14 22 h-66 Z" fill="#c9a06a" opacity="0.8"/>
  <g fill="#8a6a3a"><circle cx="510" cy="124" r="2.5"/><circle cx="540" cy="128" r="2.5"/></g>
  <!-- filter paper hint -->
  <line x1="488" y1="150" x2="562" y2="150" stroke="#c0a070" stroke-width="2"/>
  <text x="600" y="150" font-size="10" fill="#a08050">雜質留濾紙</text>
  <!-- drip -->
  <line x1="525" y1="170" x2="525" y2="230" stroke="#7fc0d8" stroke-width="3" stroke-dasharray="2 5"/>
  <!-- receiving cup with clear water -->
  <path d="M485 240 h80 l-10 60 h-60 Z" fill="#dff1f8" stroke="#7fb0d6" stroke-width="2"/>
  <path d="M489 265 h72 l-6 33 h-60 Z" fill="#bfe4ef"/>
  <text x="525" y="325" text-anchor="middle" font-size="12" fill="#3a7a9a">流下清澈的水</text>

  <text x="350" y="384" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a8a5a">靜置讓泥沙沉底，過濾把雜質攔在濾紙上。</text>
</svg>
