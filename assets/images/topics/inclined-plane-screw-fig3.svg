<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#f2f0ea"/>
  <text x="350" y="30" text-anchor="middle" font-size="21" font-weight="bold" fill="#6a5a3a">螺絲、盤山公路、楔子</text>

  <!-- 1 screw = wrapped incline -->
  <rect x="20" y="55" width="220" height="290" rx="12" fill="#eef0fb" stroke="#7a7ac0" stroke-width="2"/>
  <text x="130" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#5a5aa0">螺絲＝捲起來的斜面</text>
  <!-- triangle incline -->
  <polygon points="55,150 165,150 55,110" fill="#c0c0e0" stroke="#7a7ac0" stroke-width="2"/>
  <text x="95" y="140" font-size="11" fill="#5a5aa0">斜面</text>
  <text x="130" y="175" text-anchor="middle" font-size="16" fill="#5a5aa0">↓ 繞在柱子上</text>
  <!-- screw -->
  <rect x="115" y="195" width="30" height="120" fill="#b0b0c0" stroke="#8888a0" stroke-width="1.5"/>
  <g stroke="#7a7a98" stroke-width="3"><line x1="115" y1="205" x2="145" y2="212"/><line x1="115" y1="222" x2="145" y2="229"/><line x1="115" y1="239" x2="145" y2="246"/><line x1="115" y1="256" x2="145" y2="263"/><line x1="115" y1="273" x2="145" y2="280"/><line x1="115" y1="290" x2="145" y2="297"/></g>
  <path d="M115 315 l15 20 l15 -20z" fill="#9898b0"/>
  <text x="130" y="330" text-anchor="middle" font-size="10" fill="#5a5aa0">螺紋是斜面</text>

  <!-- 2 mountain road -->
  <rect x="255" y="55" width="190" height="290" rx="12" fill="#eef7ea" stroke="#5aa070" stroke-width="2"/>
  <text x="350" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#2a7a4a">盤山公路</text>
  <polygon points="290,320 350,120 410,320" fill="#b8d0a0" stroke="#7aa060" stroke-width="2"/>
  <g fill="none" stroke="#8a6a4a" stroke-width="5"><path d="M300 300 q60 -6 100 0"/><path d="M310 260 q45 -6 80 0"/><path d="M320 220 q35 -6 60 0"/><path d="M330 180 q22 -6 40 0"/></g>
  <text x="350" y="338" text-anchor="middle" font-size="11" fill="#2a7a4a">繞圈把陡山變緩坡</text>

  <!-- 3 wedge -->
  <rect x="460" y="55" width="220" height="290" rx="12" fill="#fdf0e8" stroke="#e0a060" stroke-width="2"/>
  <text x="570" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#a06830">楔子（刀、斧）</text>
  <!-- axe/knife -->
  <polygon points="530,130 610,130 570,230" fill="#c0c8d0" stroke="#8a929a" stroke-width="2"/>
  <text x="570" y="160" text-anchor="middle" font-size="11" fill="#5a6a72">兩個斜面</text>
  <!-- splitting arrows -->
  <path d="M560 230 l-20 26" stroke="#a06830" stroke-width="3" marker-end="url(#w)"/>
  <path d="M580 230 l20 26" stroke="#a06830" stroke-width="3" marker-end="url(#w)"/>
  <defs><marker id="w" markerWidth="10" markerHeight="10" refX="5" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#a06830"/></marker></defs>
  <text x="570" y="300" text-anchor="middle" font-size="11" fill="#a06830">斜面把東西撐開切開</text>

  <text x="350" y="384" text-anchor="middle" font-size="14" font-weight="bold" fill="#6a5a3a">螺絲、盤山公路、刀刃，都是斜面變來的。</text>
</svg>
