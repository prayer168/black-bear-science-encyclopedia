<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eef8ee"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">葉脈的兩種密碼</text>

  <!-- left: net veins -->
  <rect x="30" y="60" width="300" height="290" rx="12" fill="#fff" stroke="#e7ddcd" stroke-width="2"/>
  <text x="180" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#2f7d3a">網狀脈</text>
  <path d="M180 115 C250 140 265 240 190 315 C140 290 115 200 180 115 Z" fill="#bfe3b6" stroke="#4f9a52" stroke-width="2.5"/>
  <path d="M175 125 C178 200 182 270 188 310" fill="none" stroke="#2f7d3a" stroke-width="2.5"/>
  <path d="M176 150 C205 158 222 172 235 195 M176 150 C150 158 138 172 128 193" fill="none" stroke="#4f9a52" stroke-width="1.5"/>
  <path d="M179 195 C210 203 226 216 240 240 M179 195 C152 203 140 216 130 240" fill="none" stroke="#4f9a52" stroke-width="1.5"/>
  <path d="M183 240 C208 248 222 260 232 278 M183 240 C160 248 148 260 140 278" fill="none" stroke="#4f9a52" stroke-width="1.5"/>
  <path d="M205 175 C215 200 210 225 205 245 M150 175 C142 200 148 225 155 245" fill="none" stroke="#8ec585" stroke-width="1"/>
  <text x="180" y="338" text-anchor="middle" font-size="13" fill="#2d2a26">脈像網子分岔又相連</text>
  <text x="180" y="356" text-anchor="middle" font-size="12" fill="#c98f00">例：榕樹、桑、楓　→ 雙子葉</text>

  <!-- right: parallel veins -->
  <rect x="370" y="60" width="300" height="290" rx="12" fill="#fff" stroke="#e7ddcd" stroke-width="2"/>
  <text x="520" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#2f7d3a">平行脈</text>
  <path d="M520 110 C548 180 548 250 520 320 C492 250 492 180 520 110 Z" fill="#bfe3b6" stroke="#4f9a52" stroke-width="2.5"/>
  <path d="M520 118 L520 315" stroke="#2f7d3a" stroke-width="2.5"/>
  <path d="M509 128 C505 200 505 250 511 308" fill="none" stroke="#4f9a52" stroke-width="1.5"/>
  <path d="M531 128 C535 200 535 250 529 308" fill="none" stroke="#4f9a52" stroke-width="1.5"/>
  <path d="M500 150 C495 210 496 250 503 300" fill="none" stroke="#4f9a52" stroke-width="1.3"/>
  <path d="M540 150 C545 210 544 250 537 300" fill="none" stroke="#4f9a52" stroke-width="1.3"/>
  <text x="520" y="338" text-anchor="middle" font-size="13" fill="#2d2a26">脈大致平行、少交叉</text>
  <text x="520" y="356" text-anchor="middle" font-size="12" fill="#c98f00">例：竹、玉米、狗尾草　→ 單子葉</text>
</svg>
