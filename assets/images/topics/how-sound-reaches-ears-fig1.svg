<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="380" fill="#fffdf9"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">聲音是「振動」產生，靠介質傳到耳朵</text>
  <!-- vibrating source: drum -->
  <ellipse cx="120" cy="200" rx="40" ry="30" fill="#c9a35a" stroke="#8a5f36" stroke-width="3"/>
  <ellipse cx="120" cy="185" rx="40" ry="14" fill="#e8d5b0"/>
  <path d="M90 175 q6 -8 12 0 M108 172 q6 -8 12 0 M126 175 q6 -8 12 0" stroke="#c0392b" stroke-width="2" fill="none"/>
  <text x="120" y="255" text-anchor="middle" font-size="12" fill="#2d2a26">鼓面振動</text>
  <!-- sound waves (arcs) travelling to ear -->
  <g stroke="#2f7fc1" stroke-width="2.5" fill="none">
    <path d="M180 200 q20 -30 0 -60 M180 200 q20 30 0 60"/>
    <path d="M230 200 q30 -42 0 -84 M230 200 q30 42 0 84"/>
    <path d="M290 200 q38 -52 0 -104 M290 200 q38 52 0 104"/>
    <path d="M360 200 q46 -62 0 -124 M360 200 q46 62 0 124"/>
  </g>
  <text x="300" y="150" text-anchor="middle" font-size="12" fill="#2f7fc1">聲波（振動）在空氣中傳開</text>
  <!-- ear -->
  <path d="M520 165 q40 -30 60 10 q10 40 -20 55 q-25 12 -30 -10 q10 -5 8 -18 q-8 8 -18 -2 q-8 -18 0 -35 z" fill="#f0c8a8" stroke="#c9906a" stroke-width="2"/>
  <text x="545" y="255" text-anchor="middle" font-size="12" fill="#2d2a26">耳朵接收</text>
  <text x="350" y="330" text-anchor="middle" font-size="13" fill="#c0392b">物體振動→帶動空氣（固體/液體/氣體）振動傳遞→耳朵聽到</text>
</svg>
