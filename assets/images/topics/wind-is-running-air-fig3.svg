<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eaf4fb"/>
  <text x="350" y="32" text-anchor="middle" font-size="21" font-weight="bold" fill="#2a7ab0">看風向、比風力、用風力</text>

  <!-- weather vane -->
  <text x="130" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#3a8ac0">風向計</text>
  <line x1="130" y1="90" x2="130" y2="200" stroke="#8a8a8a" stroke-width="4"/>
  <path d="M90 110 h50 l20 -12 l-20 -12 h-50 l-14 12 Z" fill="#e2554d" stroke="#a8352d"/>
  <text x="130" y="225" text-anchor="middle" font-size="11" fill="#6a6a6a">箭頭指風的來向</text>

  <!-- three flags: light / strong / gale -->
  <text x="410" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#3a8ac0">旗子看風的大小</text>
  <g>
    <line x1="300" y1="100" x2="300" y2="200" stroke="#8a6a4a" stroke-width="4"/>
    <path d="M300 104 q20 10 34 2 q-8 14 0 22 q-16 -6 -34 2 Z" fill="#7fbf5f" stroke="#5a9a3a"/>
    <text x="315" y="220" text-anchor="middle" font-size="11" fill="#4a7a3a">微風</text>
  </g>
  <g>
    <line x1="400" y1="100" x2="400" y2="200" stroke="#8a6a4a" stroke-width="4"/>
    <path d="M400 104 q30 6 52 0 q-10 16 0 26 q-22 -6 -52 0 Z" fill="#f2c94c" stroke="#c99a1a"/>
    <text x="425" y="220" text-anchor="middle" font-size="11" fill="#b0851a">大風</text>
  </g>
  <g>
    <line x1="510" y1="100" x2="510" y2="200" stroke="#8a6a4a" stroke-width="4"/>
    <path d="M510 106 h64 l-8 22 h-56 Z" fill="#e2554d" stroke="#a8352d"/>
    <text x="540" y="220" text-anchor="middle" font-size="11" fill="#a8352d">強風</text>
  </g>

  <!-- windmill + sailboat -->
  <text x="200" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="#3a8ac0">風車</text>
  <g transform="translate(150,320)">
    <line x1="0" y1="0" x2="0" y2="-10" stroke="#8a6a4a" stroke-width="6"/>
    <g fill="#5a95c8" stroke="#3a6a90"><path d="M0 -40 l14 14 l-14 8 Z"/><path d="M40 -40 l-14 14 l8 14 Z" transform="rotate(90 0 -40)"/></g>
    <circle cx="0" cy="-40" r="6" fill="#f2c94c"/>
  </g>
  <text x="480" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="#3a8ac0">帆船</text>
  <g transform="translate(430,320)">
    <path d="M0 0 h100 l-16 24 h-68 Z" fill="#c0504d" stroke="#8a3833"/>
    <line x1="50" y1="0" x2="50" y2="-56" stroke="#8a6a4a" stroke-width="4"/>
    <path d="M50 -54 q40 20 0 48 Z" fill="#f0f0f0" stroke="#bbb"/>
    <path d="M14 -20 h30" stroke="#5a95c8" stroke-width="3" marker-end="url(#w)"/>
  </g>
  <defs><marker id="w" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M0 0 L7 4 L0 8 z" fill="#5a95c8"/></marker></defs>

  <text x="350" y="384" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a7ab0">風向計看方向，旗子看大小，風車帆船用風力。</text>
</svg>
