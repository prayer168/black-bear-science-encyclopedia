<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="380" fill="#fffdf9"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">電磁鐵：電流通過線圈就有磁力</text>
  <!-- iron core -->
  <rect x="200" y="180" width="240" height="34" rx="6" fill="#9aa4ad"/>
  <text x="320" y="245" text-anchor="middle" font-size="12" fill="#2d2a26">鐵釘（鐵芯）</text>
  <!-- coil wraps -->
  <g stroke="#c98a3a" stroke-width="5" fill="none">
    <path d="M215 180 q10 -20 20 0 q10 20 20 0 q10 -20 20 0 q10 20 20 0 q10 -20 20 0 q10 20 20 0 q10 -20 20 0 q10 20 20 0"/>
  </g>
  <text x="320" y="150" text-anchor="middle" font-size="12" fill="#c98a3a">纏繞的電線（線圈）</text>
  <!-- battery -->
  <rect x="120" y="290" width="70" height="34" rx="4" fill="#f4b400" stroke="#c98f00" stroke-width="2"/>
  <text x="155" y="312" text-anchor="middle" font-size="11" fill="#6b4f3a">電池</text>
  <!-- wires -->
  <path d="M190 300 L215 300 L215 200" stroke="#c0392b" stroke-width="3" fill="none"/>
  <path d="M425 200 L470 200 L470 300 L190 300" stroke="#c0392b" stroke-width="3" fill="none" opacity="0"/>
  <path d="M425 214 L470 214 L470 320 L190 320" stroke="#c0392b" stroke-width="3" fill="none"/>
  <!-- attracted paperclips at ends -->
  <text x="450" y="205" font-size="16">📎📎</text>
  <text x="480" y="200" font-size="11" fill="#5aa469">吸起迴紋針</text>
  <text x="350" y="345" text-anchor="middle" font-size="13" fill="#c0392b">電流通過線圈時，鐵芯就變成磁鐵；電流一停，磁力就消失</text>
</svg>
