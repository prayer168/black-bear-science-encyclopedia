<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <defs>
    <linearGradient id="wsky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#bfe0f5"/><stop offset="1" stop-color="#eef7fb"/></linearGradient>
  </defs>
  <rect width="700" height="400" fill="url(#wsky)"/>
  <text x="350" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#2f5b7c">預報是怎麼做出來的</text>

  <!-- satellite (space) -->
  <g>
    <rect x="60" y="60" width="34" height="24" rx="3" fill="#c9c4b0" stroke="#8a8470"/>
    <rect x="40" y="66" width="16" height="12" fill="#3a5b9c"/><rect x="98" y="66" width="16" height="12" fill="#3a5b9c"/>
    <text x="77" y="105" text-anchor="middle" font-size="11" fill="#2f5b7c">氣象衛星</text>
    <text x="77" y="120" text-anchor="middle" font-size="10" fill="#6f6a63">（太空·雲圖）</text>
  </g>
  <!-- balloon (high altitude) -->
  <g>
    <circle cx="220" cy="80" r="22" fill="#f6d0d0" stroke="#d08a8a"/>
    <path d="M212 100 l8 12 l8 -12 Z" fill="#c98f00"/>
    <rect x="215" y="112" width="10" height="8" fill="#8a6a3f"/>
    <text x="220" y="140" text-anchor="middle" font-size="11" fill="#2f5b7c">探空氣球</text>
    <text x="220" y="155" text-anchor="middle" font-size="10" fill="#6f6a63">（高空）</text>
  </g>
  <!-- radar -->
  <g>
    <path d="M360 130 l-14 -40 l28 0 Z" fill="#a9c1d6" stroke="#6a8aa6"/>
    <circle cx="360" cy="86" r="6" fill="#fff" stroke="#6a8aa6"/>
    <text x="360" y="150" text-anchor="middle" font-size="11" fill="#2f5b7c">氣象雷達</text>
    <text x="360" y="165" text-anchor="middle" font-size="10" fill="#6f6a63">（偵測雨區）</text>
  </g>
  <!-- ground station -->
  <g>
    <rect x="470" y="95" width="44" height="34" rx="3" fill="#fff" stroke="#8a8470" stroke-width="1.5"/>
    <line x1="470" y1="103" x2="514" y2="103" stroke="#8a8470"/><line x1="470" y1="111" x2="514" y2="111" stroke="#8a8470"/><line x1="470" y1="119" x2="514" y2="119" stroke="#8a8470"/>
    <text x="492" y="150" text-anchor="middle" font-size="11" fill="#2f5b7c">地面測站</text>
    <text x="492" y="165" text-anchor="middle" font-size="10" fill="#6f6a63">（氣溫雨量風）</text>
  </g>

  <!-- arrows to computer -->
  <g stroke="#2f7fc1" stroke-width="2.5" fill="none" marker-end="url(#wa)">
    <path d="M90 125 C160 190 280 210 340 235"/>
    <path d="M225 160 C260 195 300 215 345 235"/>
    <path d="M360 170 C360 195 358 215 358 233"/>
    <path d="M492 170 C440 200 400 218 375 235"/>
  </g>
  <defs><marker id="wa" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#2f7fc1"/></marker></defs>

  <!-- computer analysis -->
  <rect x="290" y="240" width="130" height="70" rx="10" fill="#fff" stroke="#5a8ac0" stroke-width="2"/>
  <text x="355" y="268" text-anchor="middle" font-size="24">💻</text>
  <text x="355" y="298" text-anchor="middle" font-size="12" font-weight="bold" fill="#2f5b7c">分析資料趨勢</text>

  <!-- arrow to forecast -->
  <path d="M420 275 l60 0" stroke="#2f5b7c" stroke-width="3" marker-end="url(#wa2)"/>
  <defs><marker id="wa2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#2f5b7c"/></marker></defs>

  <!-- forecast -->
  <rect x="490" y="240" width="150" height="70" rx="10" fill="#fff8ec" stroke="#f0dca8" stroke-width="2"/>
  <text x="540" y="278" text-anchor="middle" font-size="24">🌤️</text>
  <text x="575" y="270" font-size="20">☔</text>
  <text x="565" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#c98f00">天氣預報</text>

  <text x="350" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="#2f5b7c">蒐集地面、高空、太空的線索，推測未來天氣。</text>
  <text x="350" y="372" text-anchor="middle" font-size="11" fill="#2f5b7c">預報員沒有水晶球，靠的是科學觀測與分析。</text>
</svg>
