<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eef2f8"/>
  <text x="350" y="34" text-anchor="middle" font-size="21" font-weight="bold" fill="#3a5aa0">光的折射——筷子為什麼「折斷」</text>

  <!-- glass cup -->
  <path d="M240 150 h180 v180 a16 16 0 0 1 -16 16 h-148 a16 16 0 0 1 -16 -16 Z" fill="#dbeefb" stroke="#7fb0d6" stroke-width="2" opacity="0.7"/>
  <line x1="240" y1="230" x2="420" y2="230" stroke="#9fcbe4" stroke-width="2"/>
  <text x="252" y="222" font-size="12" fill="#3a7a9a">水面</text>

  <!-- chopstick: above water straight, below shifted -->
  <line x1="300" y1="90" x2="330" y2="230" stroke="#c9a05a" stroke-width="8" stroke-linecap="round"/>
  <!-- apparent (shifted) part in water -->
  <line x1="330" y1="230" x2="365" y2="340" stroke="#c9a05a" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
  <!-- true position dashed -->
  <line x1="330" y1="230" x2="345" y2="340" stroke="#b0a080" stroke-width="3" stroke-dasharray="5 4"/>
  <text x="380" y="300" font-size="11" fill="#8a7a5a">看起來的位置</text>
  <text x="300" y="335" font-size="11" fill="#8a7a5a">實際位置</text>

  <!-- eye and light ray -->
  <g transform="translate(600,150)"><ellipse rx="24" ry="14" fill="#fff" stroke="#888"/><circle r="7" fill="#3a5aa0"/></g>
  <text x="600" y="185" text-anchor="middle" font-size="12" fill="#555">眼睛</text>
  <!-- ray from underwater bends at surface to eye -->
  <path d="M345 300 L370 230 L578 158" fill="none" stroke="#e0902a" stroke-width="2.5" marker-end="url(#a)"/>
  <circle cx="370" cy="230" r="4" fill="#e0902a"/>
  <text x="470" y="205" font-size="13" font-weight="bold" fill="#c07a1e">折射（轉彎）</text>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M0 0 L7 4 L0 8 z" fill="#e0902a"/></marker></defs>

  <text x="350" y="384" text-anchor="middle" font-size="14" font-weight="bold" fill="#3a5aa0">光從水進空氣時轉彎，筷子看起來折斷了。</text>
</svg>
