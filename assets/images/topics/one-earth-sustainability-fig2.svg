<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#fffdf9"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">3R：減量、重複、回收</text>
  <!-- three R circles -->
  <g>
    <circle cx="150" cy="160" r="70" fill="#eef8ee" stroke="#5aa469" stroke-width="3"/>
    <text x="150" y="145" text-anchor="middle" font-size="20" font-weight="bold" fill="#5aa469">Reduce</text>
    <text x="150" y="170" text-anchor="middle" font-size="15" fill="#3f7d4f">減量</text>
    <text x="150" y="195" text-anchor="middle" font-size="11" fill="#2d2a26">少買少用少浪費</text>
    <text x="150" y="255" text-anchor="middle" font-size="11" fill="#6f6a63">自備水壺、購物袋</text>

    <circle cx="350" cy="160" r="70" fill="#e4f0fa" stroke="#2f7fc1" stroke-width="3"/>
    <text x="350" y="145" text-anchor="middle" font-size="20" font-weight="bold" fill="#2f7fc1">Reuse</text>
    <text x="350" y="170" text-anchor="middle" font-size="15" fill="#2f6fb0">重複使用</text>
    <text x="350" y="195" text-anchor="middle" font-size="11" fill="#2d2a26">重複用、修理再用</text>
    <text x="350" y="255" text-anchor="middle" font-size="11" fill="#6f6a63">舊物再利用、二手</text>

    <circle cx="550" cy="160" r="70" fill="#fdf1e8" stroke="#e8743b" stroke-width="3"/>
    <text x="550" y="145" text-anchor="middle" font-size="20" font-weight="bold" fill="#e8743b">Recycle</text>
    <text x="550" y="170" text-anchor="middle" font-size="15" fill="#c85a24">回收</text>
    <text x="550" y="195" text-anchor="middle" font-size="11" fill="#2d2a26">分類回收再製造</text>
    <text x="550" y="255" text-anchor="middle" font-size="11" fill="#6f6a63">紙、塑膠、鐵鋁分類</text>
  </g>
  <!-- priority order -->
  <defs><marker id="r3" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#6b4f3a"/></marker></defs>
  <line x1="228" y1="160" x2="272" y2="160" stroke="#6b4f3a" stroke-width="2" marker-end="url(#r3)"/>
  <line x1="428" y1="160" x2="472" y2="160" stroke="#6b4f3a" stroke-width="2" marker-end="url(#r3)"/>
  <text x="350" y="320" text-anchor="middle" font-size="13" fill="#c0392b">優先順序：先「減量」最有效，再重複使用，最後才回收</text>
  <text x="350" y="350" text-anchor="middle" font-size="12" fill="#3f7d4f">每個人的小行動，加起來就是保護地球的大力量</text>
</svg>
