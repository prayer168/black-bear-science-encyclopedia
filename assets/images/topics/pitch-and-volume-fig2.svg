<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#f0ecfa"/>
  <text x="350" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#5a4a8a">橡皮筋琴的祕密</text>

  <!-- left: volume -->
  <rect x="30" y="55" width="300" height="300" rx="12" fill="#fff" stroke="#ddd3ef" stroke-width="2"/>
  <text x="180" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#c0392b">決定音量的：撥的力氣</text>
  <!-- light pluck -->
  <text x="105" y="115" text-anchor="middle" font-size="12" fill="#6f6a63">輕撥</text>
  <path d="M60 155 Q105 142 150 155" fill="none" stroke="#e58fb4" stroke-width="3"/>
  <line x1="60" y1="155" x2="60" y2="200" stroke="#b98b5a" stroke-width="4"/>
  <line x1="150" y1="155" x2="150" y2="200" stroke="#b98b5a" stroke-width="4"/>
  <text x="105" y="180" text-anchor="middle" font-size="12" fill="#a85a7a">小聲</text>
  <!-- hard pluck -->
  <text x="245" y="115" text-anchor="middle" font-size="12" fill="#6f6a63">用力撥</text>
  <path d="M200 155 Q245 118 290 155" fill="none" stroke="#c0392b" stroke-width="3"/>
  <line x1="200" y1="155" x2="200" y2="200" stroke="#b98b5a" stroke-width="4"/>
  <line x1="290" y1="155" x2="290" y2="200" stroke="#b98b5a" stroke-width="4"/>
  <text x="245" y="180" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">大聲</text>
  <text x="180" y="255" text-anchor="middle" font-size="13" fill="#2d2a26">振幅大 → 大聲</text>
  <text x="180" y="290" text-anchor="middle" font-size="12" fill="#6f6a63">力氣大小＝振動幅度大小</text>
  <text x="180" y="315" text-anchor="middle" font-size="12" fill="#6f6a63">＝聲音大小</text>

  <!-- right: pitch -->
  <rect x="370" y="55" width="300" height="300" rx="12" fill="#fff" stroke="#ddd3ef" stroke-width="2"/>
  <text x="520" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#2f7fc1">決定音調的：長短·鬆緊·粗細</text>
  <!-- long/thick/loose = low -->
  <line x1="405" y1="120" x2="635" y2="120" stroke="#8a6338" stroke-width="6"/>
  <text x="650" y="124" font-size="13" fill="#2f5b7c">低</text>
  <text x="500" y="140" text-anchor="middle" font-size="11" fill="#6f6a63">長、粗、鬆 → 振動慢 → 低音</text>
  <!-- short/thin/tight = high -->
  <line x1="450" y1="185" x2="590" y2="185" stroke="#b98b5a" stroke-width="3"/>
  <text x="605" y="189" font-size="13" font-weight="bold" fill="#c0392b">高</text>
  <text x="500" y="205" text-anchor="middle" font-size="11" fill="#6f6a63">短、細、緊 → 振動快 → 高音</text>

  <rect x="400" y="235" width="240" height="100" rx="10" fill="#eaf2fb" stroke="#c7ddf0" stroke-width="1.5"/>
  <text x="520" y="262" text-anchor="middle" font-size="14" font-weight="bold" fill="#2f7fc1">口訣</text>
  <text x="520" y="290" text-anchor="middle" font-size="14" fill="#2d2a26">短、緊、細，振得快，</text>
  <text x="520" y="315" text-anchor="middle" font-size="14" font-weight="bold" fill="#2f7fc1">音就高！</text>

  <text x="350" y="382" text-anchor="middle" font-size="12" fill="#5a4a8a">實驗時：一次只改一個因素（控制變因）。</text>
</svg>
