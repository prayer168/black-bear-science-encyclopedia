<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#fdf7ea"/>
  <text x="350" y="32" text-anchor="middle" font-size="21" font-weight="bold" fill="#b08010">用尺量長度的正確做法</text>

  <!-- correct -->
  <rect x="20" y="55" width="330" height="290" rx="12" fill="#eef7ea" stroke="#5aa070" stroke-width="2"/>
  <text x="185" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a7a4a">正確 ✓</text>
  <!-- ruler -->
  <rect x="50" y="180" width="260" height="30" fill="#ffe9a8" stroke="#c0a040" stroke-width="1.5"/>
  <g stroke="#8a6a20" stroke-width="1" font-size="9"><line x1="60" y1="180" x2="60" y2="196"/><line x1="110" y1="180" x2="110" y2="196"/><line x1="160" y1="180" x2="160" y2="196"/><line x1="210" y1="180" x2="210" y2="196"/><line x1="260" y1="180" x2="260" y2="196"/></g>
  <text x="60" y="228" text-anchor="middle" font-size="12" fill="#c0402a" font-weight="bold">0</text>
  <text x="260" y="228" text-anchor="middle" font-size="12" fill="#2a7a4a" font-weight="bold">12</text>
  <!-- pencil aligned at 0 -->
  <rect x="60" y="160" width="200" height="14" rx="6" fill="#e08a5a"/><path d="M260 167 l16 0 l-7 -7 l0 14z" fill="#8a5a2a"/>
  <!-- eye straight -->
  <circle cx="160" cy="110" r="12" fill="#fff" stroke="#333" stroke-width="2"/><circle cx="160" cy="110" r="5" fill="#333"/>
  <line x1="160" y1="122" x2="160" y2="158" stroke="#3a7a4a" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="185" y="115" font-size="11" fill="#2a7a4a">平視</text>
  <text x="185" y="290" text-anchor="middle" font-size="13" fill="#2a7a4a">從0對準、平視 → 12 公分</text>

  <!-- wrong -->
  <rect x="370" y="55" width="310" height="290" rx="12" fill="#fdeeee" stroke="#d68a8a" stroke-width="2"/>
  <text x="525" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#b04a4a">錯誤 ✗</text>
  <rect x="400" y="180" width="250" height="30" fill="#ffe9a8" stroke="#c0a040" stroke-width="1.5"/>
  <g stroke="#8a6a20" stroke-width="1"><line x1="410" y1="180" x2="410" y2="196"/><line x1="450" y1="180" x2="450" y2="196"/><line x1="490" y1="180" x2="490" y2="196"/><line x1="530" y1="180" x2="530" y2="196"/><line x1="620" y1="180" x2="620" y2="196"/></g>
  <text x="450" y="228" text-anchor="middle" font-size="12" fill="#c0402a" font-weight="bold">1</text>
  <!-- pencil starting at 1 -->
  <rect x="450" y="160" width="170" height="14" rx="6" fill="#e08a5a"/>
  <text x="450" y="150" text-anchor="middle" font-size="20" fill="#c04040">✗</text>
  <!-- slanted eye -->
  <circle cx="560" cy="100" r="12" fill="#fff" stroke="#333" stroke-width="2"/><circle cx="562" cy="102" r="5" fill="#333"/>
  <line x1="560" y1="112" x2="500" y2="160" stroke="#c04040" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="600" y="110" font-size="11" fill="#b04a4a">斜看</text>
  <text x="525" y="285" text-anchor="middle" font-size="13" fill="#b04a4a">從1開始／斜看 → 量錯了</text>
  <text x="525" y="308" text-anchor="middle" font-size="11" fill="#b04a4a">（從1量到終點要記得減1）</text>

  <text x="350" y="380" text-anchor="middle" font-size="14" font-weight="bold" fill="#b08010">從 0 開始、眼睛平視，才量得準。</text>
</svg>
