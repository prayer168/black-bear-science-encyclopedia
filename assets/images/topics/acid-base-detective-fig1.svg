<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="380" fill="#fffdf9"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">水溶液分成：酸性、中性、鹼性</text>
  <!-- scale bar -->
  <defs>
    <linearGradient id="ph" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8433b"/><stop offset="0.5" stop-color="#5aa469"/><stop offset="1" stop-color="#2f6fb0"/>
    </linearGradient>
  </defs>
  <rect x="80" y="120" width="540" height="30" rx="8" fill="url(#ph)"/>
  <text x="140" y="110" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">酸性</text>
  <text x="350" y="110" text-anchor="middle" font-size="15" font-weight="bold" fill="#3f7d4f">中性</text>
  <text x="560" y="110" text-anchor="middle" font-size="15" font-weight="bold" fill="#2f6fb0">鹼性</text>
  <!-- examples -->
  <g font-size="12" fill="#2d2a26" text-anchor="middle">
    <text x="120" y="185">🍋 檸檬汁</text><text x="120" y="205">🧃 醋</text><text x="120" y="225">🥤 汽水</text>
    <text x="350" y="185">💧 純水</text><text x="350" y="205">🧂 鹽水</text>
    <text x="560" y="185">🧼 肥皂水</text><text x="560" y="205">🧴 小蘇打水</text><text x="560" y="225">🧽 清潔劑</text>
  </g>
  <!-- litmus color hint -->
  <rect x="80" y="270" width="540" height="70" rx="10" fill="#fff8e6" stroke="#f2e0a8"/>
  <text x="350" y="296" text-anchor="middle" font-size="13" font-weight="bold" fill="#c98f00">🔍 用「指示劑」就能檢測</text>
  <text x="350" y="320" text-anchor="middle" font-size="12" fill="#2d2a26">石蕊試紙：遇酸變紅、遇鹼變藍　｜　紫甘藍汁：遇酸偏紅、遇鹼偏綠黃</text>
</svg>
