<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#eaf4fb"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#2a7ab0">風就是空氣在流動</text>

  <!-- flowing air arrows (left to right) -->
  <g stroke="#7fb8e0" stroke-width="4" fill="none" opacity="0.85">
    <path d="M60 130 q60 -16 120 0 q60 16 120 0" marker-end="url(#a)"/>
    <path d="M60 200 q60 -16 120 0 q60 16 120 0" marker-end="url(#a)"/>
    <path d="M60 270 q60 -16 120 0 q60 16 120 0" marker-end="url(#a)"/>
  </g>
  <defs><marker id="a" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#7fb8e0"/></marker></defs>
  <text x="150" y="110" font-size="15" font-weight="bold" fill="#3a8ac0">流動的空氣＝風</text>

  <!-- flag being blown -->
  <line x1="420" y1="120" x2="420" y2="300" stroke="#8a6a4a" stroke-width="6"/>
  <path d="M420 125 q40 6 80 0 q-20 18 0 34 q-40 -6 -80 0 Z" fill="#e2554d" stroke="#a8352d" stroke-width="2"/>
  <!-- tree bending -->
  <path d="M560 300 q10 -80 30 -110" stroke="#7a5a3a" stroke-width="10" fill="none"/>
  <circle cx="600" cy="175" r="34" fill="#7fbf5f" stroke="#5a9a3a" stroke-width="2"/>
  <path d="M600 150 q20 -6 34 4" stroke="#5a9a3a" stroke-width="3" fill="none"/>
  <!-- kite -->
  <g transform="translate(360,90)">
    <path d="M0 0 l24 24 l-24 24 l-24 -24 Z" fill="#f2c94c" stroke="#c99a1a" stroke-width="2"/>
    <path d="M0 48 q6 20 -6 34 q18 -6 12 -20" stroke="#c99a1a" stroke-width="2" fill="none"/>
  </g>

  <rect x="60" y="320" width="580" height="14" fill="#c9a06a"/>
  <text x="350" y="384" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a7ab0">看不見的空氣跑過去，就是風。</text>
</svg>
