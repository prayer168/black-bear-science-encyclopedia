<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#141a30"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffe07a">星星東升西落、繞北極星轉</text>

  <!-- polaris center -->
  <circle cx="350" cy="200" r="6" fill="#fffbe0"/>
  <g stroke="#fffbe0" stroke-width="1.5"><line x1="350" y1="188" x2="350" y2="180"/><line x1="350" y1="212" x2="350" y2="220"/><line x1="338" y1="200" x2="330" y2="200"/><line x1="362" y1="200" x2="370" y2="200"/></g>
  <text x="350" y="170" text-anchor="middle" font-size="13" fill="#ffe07a" font-weight="bold">北極星（幾乎不動）</text>

  <!-- concentric star trails -->
  <g fill="none" stroke="#5a6aa0" stroke-width="1.5" stroke-dasharray="6 6">
    <circle cx="350" cy="200" r="55"/><circle cx="350" cy="200" r="95"/><circle cx="350" cy="200" r="135"/>
  </g>
  <!-- stars on trails -->
  <g fill="#fff8d0">
    <circle cx="405" cy="200" r="3.5"/><circle cx="350" cy="105" r="4"/><circle cx="485" cy="200" r="3.5"/><circle cx="280" cy="140" r="3.5"/><circle cx="420" cy="290" r="3.5"/>
  </g>
  <!-- rotation arrows -->
  <path d="M400 165 a45 45 0 0 1 -14 -50" fill="none" stroke="#7a8ac0" stroke-width="2" marker-end="url(#ra)"/>
  <defs><marker id="ra" markerWidth="10" markerHeight="10" refX="4" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#7a8ac0"/></marker></defs>

  <!-- east / west labels -->
  <text x="620" y="205" font-size="14" fill="#ff9a5a" font-weight="bold">東升</text>
  <path d="M600 220 q-20 20 -10 40" fill="none" stroke="#ff9a5a" stroke-width="2" marker-end="url(#ra)"/>
  <text x="70" y="205" font-size="14" fill="#7ab0e0" font-weight="bold">西落</text>

  <rect x="150" y="330" width="400" height="36" rx="18" fill="#242a48" stroke="#4a5a8a" stroke-width="1.5"/>
  <text x="350" y="354" text-anchor="middle" font-size="13" fill="#c8d4f0">看起來在轉，其實是地球在自轉</text>

  <text x="350" y="392" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffe07a">星星東升西落，北極星幾乎不動。</text>
</svg>
