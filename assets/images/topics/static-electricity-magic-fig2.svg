<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="400" fill="#fff6e6"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#c97a1e">帶靜電的氣球吸小紙片</text>

  <!-- balloon top -->
  <g transform="translate(350,120)">
    <ellipse cx="0" cy="0" rx="60" ry="72" fill="#f2a0b8" stroke="#d06888" stroke-width="2"/>
    <path d="M0 72 l-10 16 h20 Z" fill="#d06888"/>
    <text x="0" y="6" text-anchor="middle" font-size="14" fill="#8a3050">帶靜電</text>
    <!-- static marks -->
    <text x="-40" y="-40" font-size="16" fill="#c0392b">＋</text>
    <text x="34" y="-30" font-size="16" fill="#c0392b">＋</text>
    <text x="0" y="-56" font-size="16" fill="#c0392b">＋</text>
  </g>

  <!-- table -->
  <rect x="120" y="330" width="460" height="14" fill="#c9a06a"/>
  <!-- paper bits flying up toward balloon -->
  <g fill="#fff" stroke="#ccc">
    <rect x="300" y="250" width="14" height="10" transform="rotate(20 307 255)"/>
    <rect x="360" y="240" width="14" height="10" transform="rotate(-15 367 245)"/>
    <rect x="330" y="285" width="12" height="9" transform="rotate(35 336 289)"/>
    <rect x="390" y="285" width="12" height="9" transform="rotate(-25 396 289)"/>
    <rect x="280" y="315" width="12" height="9"/>
    <rect x="420" y="318" width="12" height="9"/>
  </g>
  <!-- attraction arrows -->
  <g stroke="#1f9d55" stroke-width="2.5">
    <path d="M307 250 l6 -40" marker-end="url(#a)"/>
    <path d="M367 240 l-4 -40" marker-end="url(#a)"/>
  </g>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="4" refY="2" orient="auto"><path d="M0 8 L4 0 L8 8 z" fill="#1f9d55"/></marker></defs>
  <text x="470" y="250" font-size="15" font-weight="bold" fill="#1f9d55">吸引↑</text>
  <text x="300" y="360" text-anchor="middle" font-size="12" fill="#8a6a4a">又輕又小的紙片</text>

  <text x="350" y="388" text-anchor="middle" font-size="14" font-weight="bold" fill="#c97a1e">摩擦過的氣球，把小紙片吸上來！</text>
</svg>
