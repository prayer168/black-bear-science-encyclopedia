<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">
  <rect width="700" height="380" fill="#eaf5ff"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b4f3a">自製「種子直升機」觀察下降</text>
  <!-- paper helicopter falling -->
  <g>
    <path d="M330 90 q-40 -20 -70 -5 q30 15 70 5" fill="#f4d9a8" stroke="#c9a35a" stroke-width="1.5"/>
    <path d="M330 90 q40 -20 70 -5 q-30 15 -70 5" fill="#f4d9a8" stroke="#c9a35a" stroke-width="1.5"/>
    <rect x="326" y="90" width="8" height="50" fill="#c9a35a"/>
    <circle cx="330" cy="145" r="6" fill="#8a5f36"/>
  </g>
  <!-- spinning arrows -->
  <path d="M290 110 q10 20 40 25" stroke="#2f7fc1" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
  <path d="M370 110 q-10 20 -40 25" stroke="#2f7fc1" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
  <text x="330" y="175" text-anchor="middle" font-size="12" fill="#2f7fc1">邊轉邊慢慢落下</text>
  <!-- compare longer wing -->
  <text x="530" y="120" text-anchor="middle" font-size="12" fill="#2d2a26">改變翅膀長短，</text>
  <text x="530" y="140" text-anchor="middle" font-size="12" fill="#2d2a26">看它轉得快不快、</text>
  <text x="530" y="160" text-anchor="middle" font-size="12" fill="#2d2a26">飄得遠不遠</text>
  <rect x="120" y="230" width="460" height="120" rx="12" fill="#fff" stroke="#cde8cd" stroke-width="2"/>
  <text x="350" y="260" text-anchor="middle" font-size="13" font-weight="bold" fill="#3f7d4f">像楓樹種子的「旋轉翅膀」，讓種子飄得更久更遠</text>
  <text x="350" y="288" text-anchor="middle" font-size="12" fill="#2d2a26">操縱變因：翅膀長短　應變變因：落下時間/距離</text>
  <text x="350" y="312" text-anchor="middle" font-size="12" fill="#2d2a26">控制變因：從同高度放、同樣的紙、同一個地方</text>
  <text x="350" y="336" text-anchor="middle" font-size="11" fill="#c0392b">在安全的地方進行，不從危險高處往下丟</text>
</svg>
